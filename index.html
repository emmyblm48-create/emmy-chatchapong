  <style>
    :root {
      --primary-pink: #ff85a2;
      --soft-pink: #ffe4e1;
      --gold: #ffd700;
      --silver: #C0C0C0;
      --bronze: #cd7f32;
      --bg-color: #fffdf5;
      --violet-border: #e0c3fc;
    }

    body { 
      font-family: 'Quicksand', 'Kanit', sans-serif; 
      background-color: var(--bg-color); 
      margin: 0; 
      padding: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    
    .navbar {
    display: flex;
    justify-content: space-between; /* กระจายชื่อ เมนู และปุ่ม */
    align-items: center;
    padding: 10px 20px;
    background-color: #fff; /* หรือสีขาวอมชมพู */
}

.nav-links {
    display: flex;
    gap: 20px; /* ระยะห่างระหว่างเมนู */
}

.nav-link {
    text-decoration: none;
    color: #ff85a2; /* สีชมพู BLM48 */
    font-weight: bold;
    font-size: 14px;
    transition: 0.3s; 
}

.nav-link:hover {
    color: #ffb5c7; /* สีชมพูอ่อนตอนเอาเมาส์ไปวาง */
    transform: translateY(-2px); /* ลอยขึ้นนิดนึงดูนุ่มนวล */
}

/* ปรับแต่งปุ่มไอคอนที่มีอยู่แล้ว */
.nav-icons {
    display: flex;
    gap: 10px;
}

    /* Navbar */
    .navbar {
      background: white;
      padding: 15px 20px;
      border-bottom: 2px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .brand { font-size: 24px; font-weight: bold; color: var(--primary-pink); letter-spacing: 1px; }
    .nav-btns { display: flex; gap: 15px; }
    .nav-icon { background: none; border: none; color: #ffb3c1; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
    .nav-icon:hover { color: var(--primary-pink); transform: scale(1.1); }
    
    /* กำหนดความกว้างของ Scrollbar */
::-webkit-scrollbar {
  width: 8px;
  height: 8px;
}

/* ส่วนพื้นหลังของ Scrollbar */
::-webkit-scrollbar-track {
  background: #fff5f7; 
  border-radius: 10px;
}

/* ส่วนตัวเลื่อน (Handle) */
::-webkit-scrollbar-thumb {
  background: #ffb6c1; /* ชมพูอ่อนเข้ากับธีม */
  border-radius: 10px;
  border: 2px solid #fff5f7;
}

/* เมื่อเอาเมาส์ไปวางบนตัวเลื่อน */
::-webkit-scrollbar-thumb:hover {
  background: #ff85a2; /* ชมพูเข้มขึ้นเล็กน้อย */
}
    
    /* Dark Mode Classes */
body.dark-mode {
  --bg-color: #1a1a1a;
  background-color: var(--bg-color);
  color: #eee;
}
body.dark-mode .navbar, 
body.dark-mode .user-profile-bar, 
body.dark-mode .member-card, 
body.dark-mode .modal-box, 
body.dark-mode #sidebar {
  background-color: #2d2d2d;
  border-color: #444;
  color: white;
}
body.dark-mode .name-text, body.dark-mode .section-title { color: #fff; }
body.dark-mode .wallet-item { background: #3d3d3d; color: #ccc; border-color: #444; }

    /* Profile Bar */
    .user-profile-bar { max-width: 900px; margin: 20px auto; background: white; border-radius: 24px; padding: 20px; box-shadow: 0 10px 25px rgba(255, 133, 162, 0.1); border: 2px solid var(--soft-pink); }
    .user-info-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
    .profile-img-container { position: relative; width: 70px; height: 70px; }
    .user-avatar-img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary-pink); }
    .edit-photo-btn { position: absolute; bottom: 0; right: 0; width: 24px; height: 24px; background: var(--primary-pink); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; border: 2px solid white; }
    .user-name { font-weight: 700; color: var(--primary-pink); font-size: 20px; display: flex; align-items: center; gap: 8px; }
    .role-badge { font-size: 10px; padding: 2px 8px; border-radius: 5px; background: #f0f0f0; color: #888; text-transform: uppercase; }
    .oshi-list { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
    .tag { font-size: 11px; padding: 4px 12px; border-radius: 20px; color: white; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .tag-kami { background: var(--primary-pink); box-shadow: 0 2px 5px rgba(255,133,162,0.3); }
    .tag-oshi { background: #87ceeb; box-shadow: 0 2px 5px rgba(135,206,235,0.3); }

    .wallet { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
    .wallet-item { background: #fffcfd; border: 1px solid #ffeef2; padding: 12px 5px; border-radius: 15px; font-size: 13px; text-align: center; font-weight: 700; color: #555; }
    
    .bonus-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-bonus { height: 48px; border: none; border-radius: 14px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; color: white; }
    .btn-monthly { background: var(--primary-pink); box-shadow: 0 4px 12px rgba(255,133,162,0.3); }
    .btn-redeem { background: #4dabf7; box-shadow: 0 4px 12px rgba(77,171,247,0.3); }
    .btn-locked { background: #ccc !important; cursor: not-allowed; opacity: 0.7; }

    /* Ranking & Lists */
    .section-title { font-family: 'Kanit'; font-weight: 600; color: #444; margin: 30px 0 15px 20px; font-size: 18px; border-left: 5px solid var(--primary-pink); padding-left: 12px; }
    .ranking-wrapper { width: 100%; overflow-x: auto; padding-bottom: 15px; -webkit-overflow-scrolling: touch; }
    .horizontal-list { display: flex; gap: 18px; padding: 10px 20px; min-width: max-content; align-items: flex-end; }

    /* Member Card */
    .member-card { width: 170px; text-align: center; background: white; padding: 25px 15px; border-radius: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: 2.5px solid transparent; transition: 0.3s ease; }
    .member-card:hover { transform: translateY(-8px); box-shadow: 0 12px 25px rgba(0,0,0,0.08); }
    .rank-1 { height: 310px; border-color: var(--gold); background: linear-gradient(to bottom, #fffef0, #ffffff); }
    .rank-2 { height: 280px; border-color: var(--silver); }
    .rank-3 { height: 260px; border-color: var(--bronze); }
    .rank-other { height: 240px; border-color: #f5f5f5; }

    .img-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto 12px; border-radius: 50%; padding: 4px; background: white; border: 3px solid var(--violet-border); cursor: pointer; }
    .rank-1 .img-wrapper { width: 115px; height: 115px; border-color: var(--gold); }
    .img-wrapper img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    
    .rank-badge { position: absolute; bottom: -5px; right: -5px; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2.5px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.1); font-size: 13px; }
    .rank-1 .rank-badge { background: var(--gold); color: white; width: 38px; height: 38px; }
    .rank-2 .rank-badge { background: var(--silver); color: white; }
    .rank-3 .rank-badge { background: var(--bronze); color: white; }
    .rank-other .rank-badge { background: #eee; color: #888; }

    .name-text { font-weight: 700; color: #333; font-size: 16px; text-transform: uppercase; margin-bottom: 2px; }
    .gen-text { font-size: 10px; color: #bbb; letter-spacing: 1px; margin-bottom: 8px; font-weight: 500; }
    .cookie-text { font-size: 16px; color: var(--primary-pink); font-weight: 800; margin-bottom: 12px; }

    .btn-group { display: flex; justify-content: center; gap: 5px; }
    .btn-action { border: none; border-radius: 8px; padding: 6px 10px; font-size: 10px; font-family: 'Kanit'; cursor: pointer; font-weight: 600; transition: 0.2s; }
    .btn-kami { background: #fff0f3; color: var(--primary-pink); }
    .btn-oshi { background: #eef9ff; color: #0077b6; }
    .btn-give { background: #fffceb; color: #b08d00; }
    .btn-action:hover { filter: brightness(0.95); transform: scale(1.05); }
    
    /* Modals & Stats */
    #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(6px); z-index: 1000; overflow-y: auto; padding: 40px 10px; box-sizing: border-box; }
    .modal-box { background: white; width: 100%; max-width: 380px; margin: 0 auto; padding: 30px 20px; border-radius: 35px; text-align: center; position: relative; }
    
    .stats-header { margin-bottom: 25px; }
    .stats-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary-pink); margin-bottom: 15px; object-fit: cover; }
    .stats-name { font-size: 24px; font-weight: 800; color: var(--primary-pink); margin-bottom: 5px; }
    .stats-summary { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; padding: 15px; background: #fff5f7; border-radius: 20px; }
    .stat-item { flex: 1; }
    .stat-label { font-size: 11px; color: #888; display: block; margin-bottom: 3px; }
    .stat-val { font-size: 18px; font-weight: 700; color: #444; }

    .top-fans-list { text-align: left; margin-top: 25px; }
    .top-fans-title { font-weight: 700; color: #555; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; padding-left: 5px; }
    .fan-row { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid #f9f9f9; }
    .fan-rank { width: 25px; font-weight: 800; color: #ccc; font-size: 14px; }
    .fan-row:nth-child(1) .fan-rank { color: var(--gold); font-size: 18px; }
    .fan-row:nth-child(2) .fan-rank { color: var(--silver); }
    .fan-row:nth-child(3) .fan-rank { color: var(--bronze); }
    .fan-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #eee; object-fit: cover; }
    .fan-info { flex: 1; }
    .fan-name { font-size: 14px; font-weight: 700; color: #444; }
    .fan-cookies { font-size: 12px; color: var(--primary-pink); font-weight: 600; }

    /* Login Form */
    .login-input { width: 100%; padding: 14px; margin: 10px 0; border: 1.5px solid #eee; border-radius: 12px; font-family: 'Kanit'; box-sizing: border-box; outline: none; transition: 0.3s; }
    .login-input:focus { border-color: var(--primary-pink); box-shadow: 0 0 0 3px rgba(255,133,162,0.1); }

    /* Float Button */
    .btn-refresh-float { position: fixed; bottom: 25px; right: 25px; width: 55px; height: 55px; background: var(--primary-pink); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 15px rgba(255,133,162,0.4); cursor: pointer; z-index: 99; border: none; font-size: 1.2rem; transition: 0.3s; }
    .btn-refresh-float:active { transform: scale(0.9) rotate(45deg); }
    
    /* ค่าเริ่มต้นของ Sidebar ให้ซ่อนไว้ทางซ้าย */
#sidebar {
  position: fixed;
  left: -280px; /* ซ่อนไว้ */
  top: 0;
  width: 280px;
  height: 100%;
  background: white;
  z-index: 2000; /* ต้องสูงกว่า Navbar */
  transition: 0.3s ease-in-out;
  box-shadow: 5px 0 15px rgba(0,0,0,0.1);
  padding: 20px;
  box-sizing: border-box;
}

/* คลาสที่จะเพิ่มเข้าไปเมื่อกดปุ่ม เพื่อให้ Sidebar แสดงผล */
#sidebar.active {
  left: 0 !important;
}

/* ตัวบังหน้าจอเวลาเมนูเปิด */
#sidebar-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(2px);
  z-index: 1999;
}

    /* Responsive */
    @media (max-width: 600px) {
      .wallet { grid-template-columns: 1fr 1fr; }
      .wallet-item:last-child { grid-column: span 2; }
      .member-card { width: 150px; padding: 20px 10px; }
      .rank-1 { height: 280px; }
      .img-wrapper { width: 85px; height: 85px; }
      .rank-1 .img-wrapper { width: 100px; height: 100px; }
    }
    
    #app-loading-screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(circle, #ffffff 0%, #fff5f7 100%);
  z-index: 10000;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.loader-content {
  text-align: center;
}

.loader-brand {
  font-family: 'Quicksand', sans-serif;
  font-size: 42px;
  font-weight: 700;
  color: #ff85a2;
  letter-spacing: 4px;
  margin-bottom: 20px;
  text-shadow: 0 4px 10px rgba(255, 133, 162, 0.2);
}

.loader-circle {
  font-size: 30px;
  color: #d2691e; /* สีคุกกี้ */
  width: 80px;
  height: 80px;
  background: white;
  border-radius: 50%;
  margin: 0 auto 20px;
  display: flex;
  justify-content: center;
  align-items: center;
  box-shadow: 0 10px 20px rgba(0,0,0,0.05);
  border: 3px solid #ff85a2;
  animation: bounce 1.5s infinite ease-in-out;
}

.loader-text {
  font-family: 'Kanit', sans-serif;
  font-size: 14px;
  color: #ffb6c1;
  letter-spacing: 1px;
}
    
 /* สมมติว่าคลาสของลิสต์คือ .fan-list */
.fan-list {
  max-height: 280px; /* ปรับค่าความสูงให้พอดีกับการแสดงผล 3 คนแรก */
  overflow-y: auto;
  padding-right: 8px; /* เว้นที่ให้ scrollbar เล็กน้อย */
}

/* ปรับแต่ง Scrollbar ให้ดู Minimal (Optional) */
.fan-list::-webkit-scrollbar {
  width: 4px;
}
.fan-list::-webkit-scrollbar-thumb {
  background: #ffb7c5; /* สีชมพูอ่อนให้เข้ากับธีม */
  border-radius: 10px;
}

    /* คุมความสูงของคอนเทนเนอร์รายชื่อแฟนคลับ */
#member-fans-content {
    max-height: 240px; /* ปรับค่านี้ตามความสูงของ fan-row (ประมาณ 3-4 แถว) */
    overflow-y: auto;  /* เปิดการเลื่อนในแนวตั้ง */
    overflow-x: hidden;
    padding-right: 5px; /* กันเนื้อหาโดน scrollbar ทับ */
}

/* ตกแต่ง Scrollbar ให้ดูสวยงาม (Minimalist) */
#member-fans-content::-webkit-scrollbar {
    width: 5px;
}

#member-fans-content::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 10px;
}

#member-fans-content::-webkit-scrollbar-thumb {
    background: #ffb7c5; /* สีชมพูตามธีม */
    border-radius: 10px;
}

#member-fans-content::-webkit-scrollbar-thumb:hover {
    background: #ff8fa3;
}
    
.history-scroll-container {
    max-height: 200px; /* ปรับให้แสดงประมาณ 3-4 แถว */
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 5px;
    margin-top: 10px;
}

/* ใช้ Scrollbar สไตล์เดียวกับ Top Fans เพื่อความสวยงาม */
.history-scroll-container::-webkit-scrollbar {
    width: 4px;
}
.history-scroll-container::-webkit-scrollbar-track {
    background: #f9f9f9;
}
.history-scroll-container::-webkit-scrollbar-thumb {
    background: #ffb7c5;
    border-radius: 10px;
}
    
/* อนิเมชั่นเด้งดึ๋งแบบนุ่มนวล */
@keyframes bounce {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-15px) scale(1.05); }
}

    .cookie-fall { position: fixed; top: -50px; z-index: -1; color: #e6b38a; pointer-events: none; animation: falling linear forwards; opacity: 0.6; }
    @keyframes falling { to { transform: translateY(110vh) rotate(360deg); } }
    
          /* ==========================================
   📸 Item Image Preview & Save Style
   ========================================== */

/* พื้นหลังโปร่งแสงสีเข้มจางๆ ซ้อนเลเยอร์บนสุด */
.preview-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(5px); /* เบลอหลังบ้านให้ดูพรีเมียม */
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000; /* อยู่เหนือทับทุกมิติ */
    animation: fadeIn 0.3s ease;
}

/* กล่องจัดระเบียบรูปภาพและปุ่ม */
.preview-modal-content {
    position: relative;
    max-width: 85%;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

/* ตัวรูปภาพพรีวิว */
.preview-modal-content img {
    max-width: 100%;
    max-height: 65vh;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    object-fit: contain;
}

/* ปุ่มปิดรูปกากบาท */
.preview-close-btn {
    position: absolute;
    top: -40px;
    right: 0;
    color: #fff;
    font-size: 30px;
    font-weight: bold;
    cursor: pointer;
    transition: color 0.2s;
}
.preview-close-btn:hover {
    color: #ff8da1;
}

/* ปุ่มดาวน์โหลดภาพ (Save Image) ซอฟต์พาสเทล */
.save-image-btn {
    background: linear-gradient(135deg, #ff8da1 0%, #ff5376 100%);
    color: #ffffff !important;
    text-decoration: none;
    padding: 12px 28px;
    border-radius: 25px;
    font-family: 'Kanit', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 5px 15px rgba(255, 83, 118, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
}
.save-image-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(255, 83, 118, 0.6);
}
    
    /* 🎒 1. ตัวกล่องครอบใหญ่ (Grid) ปรับให้จัดคอลัมน์อัตโนมัติตามความกว้างจอ */
.inventory-grid {
    display: grid;
    /* 🚩 จุดสำคัญ: ระบบจะคำนวณเองว่าใน 1 แถว ควรมีกี่ชิ้น โดยล็อกความกว้างขั้นต่ำของตัวการ์ดไว้ที่ 100px */
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); 
    gap: 12px;           /* ระยะห่างระหว่างกล่องการ์ด */

    max-height: 380px;   /* ล็อกความสูงรวมไว้ให้เลื่อน Scroll ได้ ไม่ทะลุจอ */
    overflow-y: auto;    /* เปิดให้ถูนิ้วเลื่อนขึ้นลงได้ */
}

/* 📦 2. แผ่นการ์ดเก็บไอเทมแต่ละชิ้น */
.inventory-item {
    position: relative;
    background: #ffffff;
    border: 1px solid #ffe3e7; /* เส้นขอบชมพูอ่อนบางๆ */

    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;

}

.inventory-item:hover {
    transform: translateY(-2px); /* เอฟเฟกต์ยกตัวขึ้นนิดๆ ตอนเอาเมาส์ชี้ */

    margin: 8px 0;
}

/* 🏷️ 4. จำนวนชิ้นที่อยู่มุมบนซ้าย (เช่น x1) */

/* คุมให้ประวัติยาวสูงสุดประมาณ 3-4 รายการแล้วเกิด Scroll ย่อยด้านใน */

<script>
  // --- CONFIG & CONSTANTS ---
const APP_VERSION = '1.0.5'; // ✨ เปลี่ยนเลขเวอร์ชันทุกครั้งที่คุณเอ็มมี่มีการอัปเดตโค้ดสำคัญ

function checkVersion() {
    const savedVersion = localStorage.getItem('bnl_app_version');
    if (savedVersion !== APP_VERSION) {
        // ถ้าเวอร์ชันไม่ตรง ให้เคลียร์ Cache ข้อมูลเดิมทิ้ง
        localStorage.removeItem('bnl_ranking_cache');
        localStorage.removeItem('bnl_topfans_cache');
        localStorage.setItem('bnl_app_version', APP_VERSION);
        
        // สั่งรีโหลดหน้าเว็บแบบ Hard Reload เพื่อดึงไฟล์ใหม่จากเซิร์ฟเวอร์
        window.location.reload(true); 
    }
}
  
  // --- CONFIG & CONSTANTS ---
  let user = getUserSession();
  const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec'; 
  
  // --- ฟังก์ชันควบคุม Sidebar ---
function toggleSidebar() { 
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const isOpen = sidebar.style.left === '0px';
  sidebar.style.left = isOpen ? '-280px' : '0px';
  overlay.style.display = isOpen ? 'none' : 'block';
}

// --- ฟังก์ชัน Dark Mode ---
function toggleDarkMode() {
  document.body.classList.toggle('dark-mode');
  const isDark = document.body.classList.contains('dark-mode');
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
  document.getElementById('dark-mode-btn').innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
}

// --- แสดงประวัติประใจ ---
async function showHistory() {
    const session = localStorage.getItem('bnl_session');
    if (!session) return Swal.fire('เข้าสู่ระบบก่อนนะงับ', 'กรุณาล็อกอินก่อน', 'warning');

    const userData = JSON.parse(session).data;
    const username = userData.username; 

    // 1. เปิดม่าน Overlay หลัก (ใช้ flex เพื่อให้กล่องอยู่กึ่งกลางสวยๆ แบบรูปแรก)
    const modalOverlay = document.getElementById('modal-overlay');
    if(modalOverlay) modalOverlay.style.display = 'flex';
    
    // 2. 🚩 ดักปิดฟอร์มอื่นเพื่อแก้บั๊กซ้อนกันเป็นแซนด์วิช
    document.getElementById('inventory-form').style.display = 'none';
    document.getElementById('stats-form').style.display = 'none';
    document.getElementById('login-form').style.display = 'none';
    
    // 3. 🚩 เปลี่ยนจากเปิด stats-form มาเปิดกล่องประวัติตัวจริง (history-form) แทนค่ะ!
    const historyForm = document.getElementById('history-form');
    if(historyForm) historyForm.style.display = 'block';
    
    // 4. 🚩 เปลี่ยนเป้าหมายกล่องเขียนข้อมูลจาก stats-content มาเป็น history-content
    const historyContent = document.getElementById('history-content');
    if(historyContent) historyContent.innerHTML = "<p style='text-align:center; color:#aaa; font-family:\"Kanit\"; padding:20px;'>กำลังดึงข้อมูลให้นะคะ...</p>";

    try {
        const response = await fetch(`${scriptURL}?action=getMyHistory&username=${username}`);
        const res = await response.json();
        
        // 5. 🚩 ตรวจสอบและพ่นข้อมูลลงกล่อง historyContent ตัวจริง
        if (res.status === "success" && historyContent) {
            let html = ``; // เอาหัวข้อ H2 ออกเพราะใน HTML หลักของเอ็มมี่มี "My History" อยู่แล้ว
            
            // ==========================================
            // 🛒 หมวดหมู่ที่ 1: ประวัติการช้อปปิ้ง
            // ==========================================
            html += `
                <div style="text-align:left; margin-top:15px;">
                    <h4 style="border-bottom: 2px solid var(--soft-pink); padding-bottom:5px; margin-bottom: 10px;">🛒 ประวัติการช้อปปิ้ง</h4>
                    <div class="history-scroll-container">`;
            
            if (res.purchaseHistory && res.purchaseHistory.length > 0) {
                res.purchaseHistory.forEach(log => {
                    html += `
                        <div class="fan-row">
                            <div class="fan-info">
                                <div class="fan-name">${log.action}: ${log.target}</div>
                                <div style="font-size:10px; color:#aaa;">${new Date(log.timestamp).toLocaleString()}</div>
                            </div>
                            <div class="fan-cookies" style="color:#4dabf7">${log.amount}</div>
                        </div>`;
                });
            } else {
                html += `<p style="font-size:12px; color:#ccc; text-align:center; padding:15px 0;">ยังไม่มีประวัติการซื้อไอเทมงับ</p>`;
            }
            html += `
                    </div> </div>`;

            // ==========================================
            // 💖 หมวดหมู่ที่ 2: ประวัติการส่งกำลังใจ
            // ==========================================
            html += `
                <div style="text-align:left; margin-top:20px;">
                    <h4 style="border-bottom: 2px solid var(--soft-pink); padding-bottom:5px; margin-bottom: 10px;">💖 ประวัติการส่งกำลังใจ</h4>
                    <div class="history-scroll-container">`;
            
            if (res.giveLogs && res.giveLogs.length > 0) {
                res.giveLogs.forEach(log => {
                    html += `
                        <div class="fan-row">
                            <div class="fan-info">
                                <div class="fan-name">ปาให้: ${log.member}</div>
                                <div style="font-size:10px; color:#aaa;">${new Date(log.timestamp).toLocaleString()}</div>
                            </div>
                            <div class="fan-cookies">${log.amount} 🍪</div>
                        </div>`;
                });
            } else {
                html += `<p style="font-size:12px; color:#ccc; text-align:center; padding:15px 0;">ยังไม่เคยปาคุกกี้เลยงับ</p>`;
            }
            html += `
                    </div> </div>`;
            
            // พ่นลงกล่องประวัติ
            historyContent.innerHTML = html;
        }
    } catch (e) {
        console.error(e);
        if(historyContent) historyContent.innerHTML = "เกิดข้อผิดพลาดในการโหลดข้อมูลประวัติ";
    }
}

  function closeModal() {
    // ซ่อนม่าน Overlay หลัก
    document.getElementById('modal-overlay').style.display = 'none';
    
    // สั่งซ่อนทุกกล่องฟอร์มด้านในเพื่อ Reset สถานะสำหรับรอบหน้า
    document.getElementById('history-form').style.display = 'none';
    document.getElementById('inventory-form').style.display = 'none';
    document.getElementById('stats-form').style.display = 'none';
    document.getElementById('login-form').style.display = 'none';
}
  
// --- ปิด Splash Screen เมื่อโหลดข้อมูลเสร็จ ---
function hideSplashScreen() {
  const splash = document.getElementById('splash-screen'); // หรือ ID ที่คุณใช้
  if (splash) {
    splash.style.display = 'none';
  } else {
    console.warn("หา splash-screen ไม่เจอค่ะ!");
  }
}

// โหลดการตั้งค่าธีมเมื่อเริ่มแอป
window.onload = () => {
  if (localStorage.getItem('theme') === 'dark') toggleDarkMode();
  // สมมติว่าดึงข้อมูลเสร็จแล้ว
  setTimeout(hideSplashScreen, 2000); 
};
   
  // ใช้หุ้มข้อมูลเพื่อลด Global Variable รบกวนกัน
  let currentRankingData = JSON.parse(localStorage.getItem('bnl_ranking_cache')) || [];
  let currentTopFansData = JSON.parse(localStorage.getItem('bnl_topfans_cache')) || {};

  // --- Session Management ---
  function saveUserSession(userData) {
    const expiry = new Date().getTime() + (90 * 24 * 60 * 60 * 1000); 
    localStorage.setItem('bnl_session', JSON.stringify({ data: userData, expiry: expiry }));
  }

  function getUserSession() {
    const sessionStr = localStorage.getItem('bnl_session');
    if (!sessionStr) return null;
    const session = JSON.parse(sessionStr);
    if (new Date().getTime() > session.expiry) {
      localStorage.removeItem('bnl_session');
      return null;
    }
    return session.data;
  }

  function isUserMember() {
    return user && user.role && user.role.toUpperCase().trim() === 'MEMBER';
  }
  
  // แยกการ Sync User ออกมาทำงานเบื้องหลัง
  async function syncUserData() {
    if (!user) return;
    try {
      const resp = await fetch(`${scriptURL}?action=getUserInfo&username=${encodeURIComponent(user.username)}&_=${Date.now()}`);
      const res = await resp.json();
      if (res.status === "success") {
        user = res.data; 
        saveUserSession(user); 
        updateUI(); // อัปเดตยอดเงิน/ข้อมูลในหน้าจอแบบไม่กวนใจ
      }
    } catch (e) { console.error("Sync Error:", e); }
  }

  // ปรับการโหลดข้อมูลให้ทำงานพร้อมกัน (Parallel) และใช้ระบบ Cache
  async function loadData() {
    try {
      // ยิง Request พร้อมกัน ไม่ต้องรอทีละตัว
      const [rankingResp, topFansResp] = await Promise.all([
        fetch(`${scriptURL}?_=${Date.now()}`),
        fetch(`${scriptURL}?action=getTopFans&_=${Date.now()}`)
      ]);

      currentRankingData = await rankingResp.json();
      currentTopFansData = await topFansResp.json();

      // บันทึกลง Cache เพื่อให้เปิดเว็บครั้งหน้าโหลดได้ทันที
      localStorage.setItem('bnl_ranking_cache', JSON.stringify(currentRankingData));
      localStorage.setItem('bnl_topfans_cache', JSON.stringify(currentTopFansData));

      renderRanking(currentRankingData);
      renderGlobalFans(currentTopFansData);
    } catch(e) { console.error("Load Error:", e); }
  }

function renderRanking(data) {
  const list = document.getElementById('ranking-list');
  if (!list) return;
  list.innerHTML = '';
  const isMember = isUserMember();
  
  // กรองข้อมูลและใช้ยอดรายเดือน (monthly_cookies) ในการจัดอันดับ
  data.filter(m => m.name).forEach((m, i) => {
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
    let badgeContent = i + 1;
    if (i === 0) badgeContent = '<i class="fas fa-crown"></i>';
    else if (i === 1 || i === 2) badgeContent = '<i class="fas fa-medal"></i>';

    const card = document.createElement('div');
    card.className = `member-card ${rankClass}`;
    
    card.innerHTML = `
      <div class="img-wrapper" onclick="showStats('${m.name}')">
        <img src="${getImg(m.profile_img)}" loading="lazy">
        <div class="rank-badge">${badgeContent}</div>
      </div>
      <div class="name-text" style="margin-bottom: 10px;">${m.name}</div>

      <div class="cookie-text" style="margin-bottom: 15px;">
        <i class="fas fa-cookie-bite" style="color: #d2691e;"></i> 
        ${Number(m.monthly_cookies || 0).toLocaleString()}
      </div>

      <div class="btn-group">
        <button class="btn-action btn-kami ${isMember ? 'btn-locked' : ''}" onclick="setOshi('kami', '${m.name}')">KAMI</button>
        <button class="btn-action btn-oshi ${isMember ? 'btn-locked' : ''}" onclick="setOshi('oshi', '${m.name}')">OSHI</button>
        <button class="btn-action btn-give ${isMember ? 'btn-locked' : ''}" onclick="giveCookie('${m.name}')">SEND</button>
      </div>
    `;
    list.appendChild(card);
  });
}

function renderGlobalFans(rawData) {
  const list = document.getElementById('global-fan-list');
  if (!list) return;
  list.innerHTML = '';

  let fansArray = [];
  if (Array.isArray(rawData)) {
    fansArray = rawData;
  } else if (rawData && typeof rawData === 'object') {
    fansArray = Object.values(rawData).flat(); // รวมข้อมูลจากทุกเมมเบอร์เป็นก้อนเดียว
  }

  if (fansArray.length === 0) {
    list.innerHTML = '<div style="padding:20px; color:#ccc; font-size:13px; width:100%; text-align:center;">ยังไม่มีข้อมูลแฟนคลับ...</div>';
    return;
  }

  // --- ส่วนสำคัญ: รวมยอด (Group By User) ---
  const groupedFans = fansArray.reduce((acc, current) => {
    const key = current.username; // ใช้ username เป็นหลักในการรวม
    if (!acc[key]) {
      acc[key] = { ...current, total: 0 };
    }
    acc[key].total += Number(current.total || 0); // รวมยอดคุกกี้เข้าด้วยกัน
    return acc;
  }, {});

  // แปลงกลับเป็น Array และเรียงลำดับจากมากไปน้อย
  const finalFans = Object.values(groupedFans).sort((a, b) => b.total - a.total);

  // --- แสดงผล ---
  finalFans.forEach((f, i) => {
    const isTop3 = i < 3;
    const rankColor = i === 0 ? '#ffd700' : i === 1 ? '#c0c0c0' : i === 2 ? '#cd7f32' : '#ffeef2';
    const rankIcon = i === 0 ? '<i class="fas fa-crown"></i>' : (i + 1);

    const card = document.createElement('div');
    card.className = 'fan-card';
    card.style = `
      position: relative; min-width: 120px; background: white; 
      padding: 20px 15px; border-radius: 25px; text-align: center;  
      border: 2px solid ${rankColor}; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      margin: 10px 5px; flex-shrink: 0;
    `;

    card.innerHTML = `
      <div style="position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
        background: ${rankColor}; color: ${isTop3 ? '#fff' : '#ff85a2'};
        padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: bold;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1); white-space: nowrap;">
        ${isTop3 ? rankIcon + ' ' : ''}อันดับ ${i + 1}
      </div>
      <img src="${getImg(f.img)}" style="width:65px; height:65px; border-radius:50%; border:3px solid #fef5f7; margin-top:5px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/150'">
      <div style="font-weight:700; font-size:14px; color:#444; margin-top:8px; white-space: nowrap; overflow:hidden; text-overflow:ellipsis;">
        ${f.name || f.username}
      </div>
      <div style="font-size:12px; color:#ff85a2; font-weight:700; margin-top:4px;">
        <i class="fas fa-cookie-bite" style="color: #d2691e;"></i> ${Number(f.total).toLocaleString()}
      </div>
    `;
    list.appendChild(card);
  });
}

      });
    } 
}

 async function giveCookie(memberName) {
  if (!user) return openLogin();
  if (isUserMember()) return Swal.fire('ขออภัย', 'เมมเบอร์ไม่สามารถปาคุกกี้ได้ค่ะ', 'warning');

  const { value: amount } = await Swal.fire({
    title: `ปาคุกกี้ให้ ${memberName}`,
    input: 'number',
    inputLabel: `ยอดคุกกี้ของคุณ: ${Number(user.cookie).toLocaleString()} ชิ้น`,
    inputPlaceholder: 'ใส่จำนวนที่ต้องการส่ง...',
    showCancelButton: true,
    confirmButtonColor: '#ff85a2',
    cancelButtonText: 'ยกเลิก',
    confirmButtonText: 'ถัดไป'
  }); 

  if (amount) {
    const numAmount = parseInt(amount);
    if (numAmount <= 0) return Swal.fire('ผิดพลาด', 'กรุณาใส่จำนวนที่มากกว่า 0', 'error');
    if (numAmount > user.cookie) return Swal.fire('คุกกี้ไม่พอ', 'ยอดคุกกี้ของคุณไม่เพียงพอครับ', 'error');

    // --- เพิ่ม Alert ยืนยันขั้นสุดท้าย ---
    const confirmResult = await Swal.fire({
      title: 'ยืนยันการส่ง?',
      text: `ส่งคุกกี้จำนวน ${numAmount.toLocaleString()} ชิ้น ให้กับ ${memberName}`,
      icon: 'question',
      showCancelButton: true,
      confirmButtonColor: '#ff85a2',
      confirmButtonText: 'ยืนยันการส่ง',
      cancelButtonText: 'เปลี่ยนใจแล้ว'

async function setOshi(type, memberName) {
  if (!user) return openLogin();
  const username = user.username;
  const searchName = memberName.toLowerCase();
  
  // ใช้ข้อมูลจาก Object user ที่เราจัดระเบียบไว้แล้วใน doGet
  const currentKamioshi = (user.kamioshi || "").toString().toLowerCase();
  const oshiArray = Array.isArray(user.oshi) ? user.oshi.map(s => s.toLowerCase()) : [];
  const isAlreadyOshi = oshiArray.includes(searchName);

  let action = "";
  let confirmText = "";
  let subTitle = "";

  // --- 1. วิเคราะห์สถานะเพื่อกำหนด Action (Toggle Logic) ---
  if (type === 'kami') {
    if (currentKamioshi === searchName) {
      action = "removeOshi";
      confirmText = `ลบ ${memberName} ออกจาก "คามิโอชิ" ใช่หรือไม่?`;
      subTitle = "ยกเลิกการติดตาม";
    } else {
      action = "setKamioshi";
      confirmText = `ตั้งให้ ${memberName} เป็น "คามิโอชิ" ของคุณใช่หรือไม่?`;
      subTitle = "ยืนยันรายการ";
    }
  } else {
    // ถ้าจะเพิ่มเป็นโอชิ แต่ดันเป็นคามิอยู่แล้ว ให้หยุดทันที
    if (currentKamioshi === searchName) {
      return Swal.fire('ข้อมูลซ้ำซ้อน', `${memberName} เป็นคามิโอชิของคุณอยู่แล้วค่ะ`, 'warning');
    }

    if (isAlreadyOshi) {
      action = "removeOshi";
      confirmText = `เลิกติดตาม (Un-Oshi) ${memberName} ใช่หรือไม่?`;
      subTitle = "ยกเลิกการติดตาม";
    } else {
      action = "setOshi";
      confirmText = `ติดตาม (Oshi) ${memberName} เพิ่มในลิสต์ใช่หรือไม่?`;
      subTitle = "ยืนยันรายการ";
    }
  }

  // --- 2. แสดง Alert ยืนยันเพียงครั้งเดียว ---
  const finalConfirm = await Swal.fire({
    title: subTitle,
    text: confirmText,
    icon: 'question',
    showCancelButton: true,
    confirmButtonColor: '#ff85a2',
    confirmButtonText: 'ตกลง',
    cancelButtonText: 'ยกเลิก'
  });

  if (!finalConfirm.isConfirmed) return;

  // --- 3. ส่งข้อมูลไปที่ Apps Script (ใช้ POST แบบเดียวกับที่ App Script รอรับ) ---
  Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

  try {
    const resp = await fetch(scriptURL, {
      method: 'POST',
      body: JSON.stringify({
        action: action,
        type: type,
        username: username,
        memberName: memberName
      })
    });

    const res = await resp.json();
    if (res.status === "success") {
      await syncUserData(); // สำคัญมาก: ต้องดึงข้อมูลล่าสุดกลับมาเก็บในตัวแปร user
      Swal.fire({ 
        icon: 'success', 
        title: 'สำเร็จ!', 
        text: res.message, 
        timer: 1500, 
        showConfirmButton: false 
      });
    } else {
      Swal.fire('ผิดพลาด', res.message, 'error');
    }
  } catch (e) {
    console.error(e);
    Swal.fire('Error', 'การเชื่อมต่อขัดข้อง หรือ Script URL ไม่ถูกต้อง', 'error');
  }
}

      throw new Error("อัปโหลดไม่สำเร็จ: " + data.error.message);

            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 400; // ขนาดที่พอดีสำหรับรูปโปรไฟล์
                const scaleSize = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scaleSize;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/jpeg', 0.8); // บีบอัดคุณภาพเหลือ 80%
            };
        };
    });
}

window.handleImageUpload = async function(event, username) {
    const finalUsername = username || (window.user ? window.user.username : null);

    if (!finalUsername || finalUsername === 'undefined') {
        Swal.fire('ไม่พบชื่อผู้ใช้', 'กรุณาเข้าสู่ระบบใหม่อีกครั้งนะงับ', 'error');
        return;
    }

    const file = event.target.files[0];
    if (!file) return;

    const result = await Swal.fire({
        title: 'เปลี่ยนรูปโปรไฟล์?',
        text: `คุณต้องการใช้รูปนี้ใช่หรือไม่?`, 
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#ff85a2',
        confirmButtonText: 'ตกลง',
        cancelButtonText: 'ยกเลิก'
    });

    if (result.isConfirmed) {
        Swal.fire({
            title: 'กำลังประมวลผล...',
            allowOutsideClick: false,
            didOpen: () => { Swal.showLoading(); }
        });

        try {
            // บีบอัดรูปก่อนส่ง
            const compressedFile = await compressImage(file);

            // 1. อัปโหลดไป ImgBB
            const imageUrl = await uploadToStorage(compressedFile); 
            
            // 2. อัปเดตลง Firebase และ Google Sheets แบบพร้อมกัน (Parallel) เพื่อความรวดเร็ว
            const updates = {};
            updates['/users/' + finalUsername + '/profile_img'] = imageUrl;
            
            await Promise.all([
                update(ref(database), updates),
                sendToGoogleSheets(finalUsername, imageUrl)
            ]);

            Swal.fire('สำเร็จ!', 'อัปเดตรูปโปรไฟล์เรียบร้อยแล้วค่ะ', 'success');
            
            if (typeof window.syncUserData === 'function') {
                window.syncUserData();
            }

        } catch (error) {
            Swal.fire('เกิดข้อผิดพลาด!', 'ระบบขัดข้องนิดหน่อย ลองใหม่อีกครั้งนะงับ', 'error');
            console.error(error);
        }
    }
};

  async function sendToGoogleSheets(username, url) { 
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec';
    await fetch(scriptURL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'updateProfileImage',
        username: username,
        imageUrl: url
      })
    });
  }
