<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emmy.CS Site</title>
    <!-- ใช้ฟอนต์ที่ดูสะอาดและทันสมัย -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome สำหรับไอคอนโซเชียล -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --withwish-pink: #f06292; /* สีชมพูหลักสไตล์ withmywish */
            --withwish-bg: #fff5f8;
            --text-dark: #333;
            --mint-green: #4db6ac;
        }

        body {
            font-family: 'Kanit', 'Montserrat', sans-serif;
            margin: 0;
            background-color: #fff;
            color: var(--text-dark);
        }

        /* Top Bar & Social Links */
        .top-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 30px 5%; /* เพิ่ม Padding บน-ล่าง จาก 15px เป็น 30px หรือมากกว่าตามชอบ */
    position: relative;
    min-height: 80px; /* เพิ่มความสูงขั้นต่ำเพื่อให้ดูโปร่งขึ้น */
}

        .social-icons a {
            color: var(--text-dark);
            margin-right: 15px;
            font-size: 1.2rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-icons a:hover { color: var(--withwish-pink); }

        /* Branding Section */
        .branding {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    width: auto;
    padding: 0; /* ล้าง Padding ออกเพื่อให้คำนวณกึ่งกลางง่ายขึ้น */
    background-color: transparent;
}

        .branding h1 {
            color: var(--withwish-pink);
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
        }

        .branding p {
            color: #888;
            font-size: 1.1rem;
            margin-top: 5px;
        }

        /* Header / Banner Area */
        .hero-banner {
    margin-top: 20px; /* เพิ่มระยะห่างด้านบน */
    background-color: #ffebee;
    padding: 40px 0;
    text-align: center;
}

        .hero-banner h2 {
            color: var(--withwish-pink);
            font-weight: 700;
            font-size: 2.2rem;
            margin: 0;
        }

        /* Portfolio Grid */
        .section-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .section-header h3 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        /* Card Style - เลียนแบบ withmywish */
        .card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
            transition: transform 0.3s;
        }

        .card:hover { transform: translateY(-8px);
    box-shadow: 0 10px 25px rgba(240, 98, 146, 0.2); }

        .card-img {
            height: 220px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Label บนรูป */
        .card-label {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: var(--withwish-pink);
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .card-content { padding: 25px; }

        .card-content h4 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            color: var(--withwish-pink);
            line-height: 1.4;
        }

        .card-content p { color: #666; font-size: 0.95rem; line-height: 1.6; }

        /* Cookie Bar Style Footer */
        .footer-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
            box-sizing: border-box;
            z-index: 1000;
        }

        .cookie-btn {
            background: var(--mint-green);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
      
      /* สไตล์ของกลีบซากุระ */
.sakura {
    position: fixed;
    top: -10%;
    background-color: #ffc0cb; /* สีชมพูซากุระ */
    border-radius: 100% 0 100% 0; /* ทรงกลีบดอกไม้ */
    opacity: 0.8;
    pointer-events: none; /* ไม่ให้ไปขัดขวางการคลิกปุ่มบนเว็บ */
    z-index: 9999;
    animation: fall linear infinite;
}

/* แอนิเมชันการร่วงหล่นและการหมุน */
@keyframes fall {
    0% {
        top: -10%;
        transform: translateX(0) rotate(0deg);
    }
    100% {
        top: 110%;
        transform: translateX(100px) rotate(360deg);
    }
}

        @media (max-width: 768px) {
            .footer-bar { flex-direction: column; text-align: center; gap: 10px; }
        }
    </style>
</head>
<body>

    <!-- Social Top Nav -->
    <div class="top-nav">
        <div class="social-icons">
            <a href="https://www.facebook.com/chatchapong.singkhiporn?locale=th_TH"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/mmchatpong/"><i class="fab fa-instagram"></i></a>
            <a href="https://github.com/emmyblm48-create"><i class="fab fa-github"></i></a>
        </div>
      <div class="branding">
        <h1>EMMY</h1>
        <p>Chatchapong Singkhiporn</p>
    </div>
        <div class="menu-icon"><i class="fas fa-bars"></i></div>
    </div>

    <!-- Section Title -->
    <div class="hero-banner">
        <h2>PORTFOLIO</h2>
    </div>

    <!-- Content Sections -->
    <div class="section-container">
        <div class="section-header">
            <h3>DEVELOPMENT</h3>
            <p>เครื่องมือและซอฟต์แวร์ที่พัฒนาขึ้นเพื่อตอบโจทย์การใช้งาน</p>
        </div>
        <div class="grid-container" id="web-dev-container">
            <!-- Data will be loaded from Supabase -->
        </div>

        <div class="section-header" style="margin-top: 80px;">
            <h3>BLM48 WORKS</h3>
            <p>ผลงานการผลิตสื่อและ Virtual Idol Cover ในฐานะเมมเบอร์สมาชิก Emmy BLM48</p>
        </div>
        <div class="grid-container" id="blm48-container">
            <!-- Data will be loaded from Supabase -->
        </div>
    </div>
  
  <footer style="padding: 50px 20px; text-align: center; color: #bbb; font-size: 12px;">
  <div style="font-weight: 700; color: #888; margin-bottom: 5px;">© 2026 Emmy Chatchapong.All rights reserved.</div>
</footer>

    <script>
        // ใช้ URL และ Key เดิมของคุณ Avat Ekkanyukul
        const SUPABASE_URL = 'https://ysfwhdtwmqwudhtrqavd.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_CQOr7-T4-gKsgSr5xi2fiA_0GeUNX-t';

        async function fetchProjects() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/projects?select=*,categories(name,slug)`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                const projects = await response.json();
                displayProjects(projects);
            } catch (error) {
                console.error('Error:', error);
            }
        }

      
      function displayProjects(projects) {
    const webContainer = document.getElementById('web-dev-container');
    const idolContainer = document.getElementById('blm48-container');

    projects.forEach(project => {
        // สร้างแท็ก <a> ครอบ Card ทั้งหมด เพื่อให้กดไปดูงานได้
        const cardLink = document.createElement('a');
        cardLink.href = project.project_url || '#'; // ใส่ชื่อฟิลด์ลิงก์จาก Supabase (ถ้าไม่มีให้เป็น #)
        cardLink.target = '_blank'; // ให้เปิดแท็บใหม่
        cardLink.style.textDecoration = 'none'; // ลบเส้นใต้ลิงก์
        cardLink.style.color = 'inherit';

        cardLink.innerHTML = `
            <div class="card">
                <div class="card-img" style="background-image: url('${project.thumbnail_url || 'https://via.placeholder.com/400x225'}')">
                    <div class="card-label">${project.categories.name}</div>
                </div>
                <div class="card-content">
                    <h4>${project.title}</h4>
                    <p>${project.description || ''}</p>
                    <div style="font-size: 0.8rem; color: #aaa; margin-top: 15px;">
                        <i class="far fa-calendar-alt"></i> ${new Date(project.created_at).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' })}
                    </div>
                </div>
            </div>
        `;

        if (project.categories.slug === 'web-dev') {
            webContainer.appendChild(cardLink);
        } else if (project.categories.slug === 'blm48-cover') {
            idolContainer.appendChild(cardLink);
        }
    });
}
      
      function createSakura() {
    const section = document.body;
    const petal = document.createElement('span');
    petal.classList.add('sakura');

    // สุ่มขนาดของกลีบ
    const size = Math.random() * 10 + 10 + 'px';
    petal.style.width = size;
    petal.style.height = size;

    // สุ่มตำแหน่งเริ่มต้นตามแนวนอน
    petal.style.left = Math.random() * innerWidth + 'px';

    // สุ่มระยะเวลาการตก (เร็ว-ช้าต่างกัน)
    const duration = Math.random() * 3 + 2 + 's';
    petal.style.animationDuration = duration;

    // สุ่มค่าความโปร่งแสง
    petal.style.opacity = Math.random();

    section.appendChild(petal);

    // ลบกลีบดอกไม้ทิ้งเมื่อตกถึงพื้นเพื่อไม่ให้หนักเว็บ
    setTimeout(() => {
        petal.remove();
    }, 5000);
}

// สร้างกลีบซากุระทุกๆ 200 มิลลิวินาที (ถ้าอยากให้เยอะกว่านี้ให้ลดตัวเลขลง)
setInterval(createSakura, 200);

        window.onload = fetchProjects;
    </script>
</body>
</html>
