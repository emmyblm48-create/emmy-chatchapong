<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>with Emmy* | Make your life better</title>
    <!-- ใช้ฟอนต์ที่ดูสะอาดและทันสมัย -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome สำหรับไอคอนโซเชียล -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --withwish-pink: #f06292; /* สีชมพูหลักสไตล์ withmywish */
            --withwish-bg: #fff5f8;
            --text-dark: #333;
            --mint-green: #4db6ac;
        }

        body {
            font-family: 'Kanit', 'Montserrat', sans-serif;
            margin: 0;
            background-color: #fff;
            color: var(--text-dark);
        }

        /* Top Bar & Social Links */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            border-bottom: 1px solid #eee;
        }

        .social-icons a {
            color: var(--text-dark);
            margin-right: 15px;
            font-size: 1.2rem;
            text-decoration: none;
            transition: color 0.3s;
        }

        .social-icons a:hover { color: var(--withwish-pink); }

        /* Branding Section */
        .branding {
            text-align: center;
            padding: 40px 20px;
            background-color: #fff;
        }

        .branding h1 {
            color: var(--withwish-pink);
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
        }

        .branding p {
            color: #888;
            font-size: 1.1rem;
            margin-top: 5px;
        }

        /* Header / Banner Area */
        .hero-banner {
            background-color: #ffebee;
            padding: 30px 0;
            text-align: center;
        }

        .hero-banner h2 {
            color: var(--withwish-pink);
            font-weight: 700;
            font-size: 2.2rem;
            margin: 0;
        }

        /* Portfolio Grid */
        .section-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .section-header h3 {
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        /* Card Style - เลียนแบบ withmywish */
        .card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
            transition: transform 0.3s;
        }

        .card:hover { transform: translateY(-5px); }

        .card-img {
            height: 220px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Label บนรูป */
        .card-label {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: var(--withwish-pink);
            color: white;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .card-content { padding: 25px; }

        .card-content h4 {
            margin: 0 0 10px 0;
            font-size: 1.4rem;
            color: var(--withwish-pink);
            line-height: 1.4;
        }

        .card-content p { color: #666; font-size: 0.95rem; line-height: 1.6; }

        /* Cookie Bar Style Footer */
        .footer-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
            box-sizing: border-box;
            z-index: 1000;
        }

        .cookie-btn {
            background: var(--mint-green);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .footer-bar { flex-direction: column; text-align: center; gap: 10px; }
        }
    </style>
</head>
<body>

    <!-- Social Top Nav -->
    <div class="top-nav">
        <div class="social-icons">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-x-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="https://github.com/blm48_senbatsuselection_by_you"><i class="fab fa-github"></i></a>
        </div>
        <div class="menu-icon"><i class="fas fa-bars"></i></div>
    </div>

    <!-- Branding -->
    <div class="branding">
        <h1>ๅEMMY</h1>
        <p>Chatchapong Singkhiporn</p>
    </div>

    <!-- Section Title -->
    <div class="hero-banner">
        <h2>PORTFOLIO</h2>
    </div>

    <!-- Content Sections -->
    <div class="section-container">
        <div class="section-header">
            <h3>DEVELOPMENT</h3>
            <p>เครื่องมือและซอฟต์แวร์ที่พัฒนาขึ้นเพื่อตอบโจทย์การใช้งาน</p>
        </div>
        <div class="grid-container" id="web-dev-container">
            <!-- Data will be loaded from Supabase -->
        </div>

        <div class="section-header" style="margin-top: 80px;">
            <h3>BLM48 WORKS</h3>
            <p>ผลงานการผลิตสื่อและ Virtual Idol Cover ในฐานะหัวหน้ากลุ่ม BLM48</p>
        </div>
        <div class="grid-container" id="blm48-container">
            <!-- Data will be loaded from Supabase -->
        </div>
    </div>

    <!-- Fake Cookie Bar (Footer) -->
    <div class="footer-bar">
        <div class="cookie-text">
            withemmy* ใช้คุกกี้ (Cookies) <a href="#" style="color: var(--withwish-pink);">เรียนรู้เพิ่มเติมที่นี่</a>
        </div>
        <button class="cookie-btn">ยอมรับ</button>
    </div>

    <script>
        // ใช้ URL และ Key เดิมของคุณ Avat Ekkanyukul
        const SUPABASE_URL = 'https://ysfwhdtwmqwudhtrqavd.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_CQOr7-T4-gKsgSr5xi2fiA_0GeUNX-t';

        async function fetchProjects() {
            try {
                const response = await fetch(`${SUPABASE_URL}/rest/v1/projects?select=*,categories(name,slug)`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                const projects = await response.json();
                displayProjects(projects);
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function displayProjects(projects) {
            const webContainer = document.getElementById('web-dev-container');
            const idolContainer = document.getElementById('blm48-container');

            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img" style="background-image: url('${project.thumbnail_url || 'https://via.placeholder.com/400x225'}')">
                        <div class="card-label">${project.categories.name}</div>
                    </div>
                    <div class="card-content">
                        <h4>${project.title}</h4>
                        <p>${project.description || ''}</p>
                        <div style="font-size: 0.8rem; color: #aaa; margin-top: 15px;">
                            <i class="far fa-calendar-alt"></i> ${new Date(project.created_at).toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' })}
                        </div>
                    </div>
                `;

                if (project.categories.slug === 'web-dev') {
                    webContainer.appendChild(card);
                } else if (project.categories.slug === 'blm48-cover') {
                    idolContainer.appendChild(card);
                }
            });
        }

        window.onload = fetchProjects;
    </script>
</body>
</html>
