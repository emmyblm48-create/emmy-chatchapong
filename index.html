<!DOCTYPE html>
<html lang="th">
<head>
   <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>withmywish* | Emmy Portfolio</title>
    <!-- ใช้ฟอนต์ที่ดูสะอาดและทันสมัย -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <!-- Font Awesome สำหรับไอคอนโซเชียล -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --brand-pink: #f06292; /* สีชมพูหลักตามรูป */
            --light-pink: #fdf2f8;
            --text-dark: #333333;
        }

        body {
            font-family: 'Kanit', 'Montserrat', sans-serif;
            margin: 0;
            color: var(--text-dark);
            background-color: #ffffff;
        }

        /* Top Bar: โซเชียลมีเดียด้านซ้าย */
        .top-bar {
            padding: 10px 5%;
            display: flex;
            justify-content: flex-start;
            gap: 15px;
            border-bottom: 1px solid #eee;
        }
        .top-bar a {
            color: var(--text-dark);
            font-size: 1.2rem;
            text-decoration: none;
            transition: color 0.3s;
        }
        .top-bar a:hover { color: var(--brand-pink); }

        /* Branding Header */
        .brand-header {
            text-align: center;
            padding: 40px 20px;
            background-color: var(--light-pink);
        }
        .brand-name {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--brand-pink);
            margin: 0;
            letter-spacing: -1px;
        }
        .brand-tagline {
            font-size: 1rem;
            color: var(--brand-pink);
            margin-top: 5px;
            font-weight: 400;
        }

        /* Section Title */
        .section-header {
            text-align: center;
            margin: 50px 0 30px;
        }
        .section-header h2 {
            font-size: 1.8rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .section-header p { color: #666; font-size: 0.9rem; }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            padding: 0 5% 50px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Card Style ตามรูป */
        .card {
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #efefef;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }

        .card-img {
            height: 220px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .card-content { padding: 20px; }
        .card-content h3 {
            font-size: 1.2rem;
            color: var(--brand-pink);
            margin: 0 0 10px;
            line-height: 1.4;
        }
        .card-date {
            font-size: 0.8rem;
            color: #999;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Footer Sticky (Cookie bar style) */
        .cookie-bar {
            position: fixed;
            bottom: 0; width: 100%;
            background: #fff;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eee;
            font-size: 0.8rem;
            box-sizing: border-box;
        }
        .btn-accept {
            background: #4db6ac;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo"><strong>Emmy.C.Singkhiporn</strong></div>
        <ul class="nav-links">
            <li><a href="#web-dev">Web Dev</a></li>
            <li><a href="#blm48">BLM48</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Dreaming & Coding</h1>
            <p>Web Developer & Producer of BLM48</p>
            <div class="hero-buttons">
                <a href="#web-dev" class="btn btn-primary">ดูผลงานเว็บ</a>
                <a href="#blm48" class="btn btn-secondary">BLM48 Gallery</a>
            </div>
        </div>
    </header>

    <section id="web-dev" class="section">
        <h2 class="section-title">Web Development</h2>
        <div class="grid-container">
            <!-- Data will be loaded here -->
        </div>
    </section>

    <section id="blm48" class="section">
        <h2 class="section-title">BLM48 Cover Works</h2>
        <div class="grid-container">
            <!-- Data will be loaded here -->
        </div>
    </section>

    <script>
        const SUPABASE_URL = 'https://ysfwhdtwmqwudhtrqavd.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_CQOr7-T4-gKsgSr5xi2fiA_0GeUNX-t';

        async function fetchProjects() {
            try {
                // แก้ไข URL ให้ถูกต้อง
                const response = await fetch(`${SUPABASE_URL}/rest/v1/projects?select=*,categories(name,slug)`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                const projects = await response.json();
                displayProjects(projects);
            } catch (error) {
                console.error('Error fetching projects:', error);
            }
        }

        function displayProjects(projects) {
            const webContainer = document.querySelector('#web-dev .grid-container');
            const idolContainer = document.querySelector('#blm48 .grid-container');

            webContainer.innerHTML = '';
            idolContainer.innerHTML = '';

            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-img" style="background-image: url('${project.thumbnail_url || 'https://via.placeholder.com/400x225/f3f4f6/999999?text=No+Image'}')"></div>
                    <div class="card-info">
                        <h3>${project.title}</h3>
                        <p>${project.description || ''}</p>
                        <div class="tags">
                            ${project.tools_used ? project.tools_used.map(tool => `<span class="tag">${tool}</span>`).join('') : ''}
                        </div>
                        ${project.content_url ? `<a href="${project.content_url}" target="_blank" class="view-link">View Project →</a>` : ''}
                    </div>
                `;

                if (project.categories.slug === 'web-dev') {
                    webContainer.appendChild(card);
                } else if (project.categories.slug === 'blm48-cover') {
                    idolContainer.appendChild(card);
                }
            });
        }

        window.onload = fetchProjects;
    </script>
</body>
</html>
