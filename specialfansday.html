<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLM48 | Special Fans Day</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        /* 📱 ปรับแต่งการคำนวณขนาดหน้าจอเพื่อป้องกันการปูดล้นตามโครงสร้างเว็บหลัก */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', 'Kanit', sans-serif;
            background-color: #fff5f7;
            padding: 16px;
            padding-bottom: 80px;
            display: flex;
            justify-content: center;
        }

        /* Responsive Wrapper: ควบคุมหน้าจอให้ออกมาเป็นสไตล์แอปมือถือ ไม่ว่าจะเปิดบนอุปกรณ์ใด */
        .app-container {
            width: 100%;
            max-width: 500px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .page-title {
            font-size: 1.4rem;
            color: #333;
            margin: 0;
        }
        .champ-week-btn {
            background: #ffc0cb;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            transition: transform 0.1s ease;
        }
        .champ-week-btn:active {
            transform: scale(0.95);
        }
        .member-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .member-card {
            background: #fff;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .member-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar-frame {
            position: relative;
            width: 50px;
            height: 50px;
        }
        .member-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffc0cb;
        }
        .member-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .member-name {
            margin: 0;
            font-size: 1rem;
            color: #333;
            font-weight: 500;
        }
        .cookie-count {
            font-size: 0.8rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 3px;
        }
        .cookie-count i {
            color: #ffb703;
        }
        .give-cookie-btn {
            background: #ff6b8b;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background 0.2s, transform 0.1s ease;
        }
        .give-cookie-btn:hover {
            background: #ff4770;
        }
        .give-cookie-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-container">
            <h1 class="page-title">Special Fans Day</h1>
            <a href="champ.html" class="champ-week-btn">
                <i class="fa-solid fa-crown"></i> Champ of the week
            </a>
        </div>

        <div class="member-list" id="member-container">
            </div>
    </div>

    <script>
        // ข้อมูลจำลองของผู้ใช้ปัจจุบัน
        const currentUser = {
            username: "Fanclub01",
            role: "user" 
        };

        // รายชื่อเมมเบอร์เริ่มต้น (เพิ่มคุณสมบัติ cookies และตัวอย่างคนที่มี 0 คุกกี้)
        const members = [
            { id: 1, name: "Member 1", cookies: 150, image: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150" },
            { id: 2, name: "Member 2", cookies: 45, image: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150" },
            { id: 3, name: "Member 3", cookies: 92, image: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150" },
            { id: 4, name: "Member 4 (0 Cookies)", cookies: 0, image: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150" }
        ];

        function displayMembers() {
            const container = document.getElementById('member-container');
            // ทำการแสดงผลโดยไม่มีการกรองข้อมูล เพื่อให้เมมเบอร์ 0 คุกกี้แสดงผลด้วยเสมอ
            container.innerHTML = members.map(member => `
                <div class="member-card">
                    <div class="member-info">
                        <div class="avatar-frame">
                            <img class="member-avatar" src="${member.image}" alt="${member.name}">
                        </div>
                        <div class="member-details">
                            <h3 class="member-name">${member.name}</h3>
                            <span class="cookie-count">
                                <i class="fa-solid fa-cookie"></i> ${member.cookies.toLocaleString()} Cookies
                            </span>
                        </div>
                    </div>
                    <button class="give-cookie-btn" onclick="sendCookie('${member.name}')">
                        <i class="fa-solid fa-cookie"></i> ส่งคุกกี้
                    </button>
                </div>
            `).join('');
        }

        // ฟังก์ชันจัดการระบบส่งคุกกี้ พร้อมระบบแจ้งเตือนสไตล์ SweetAlert2
        function sendCookie(memberName) {
            // ตรวจสอบสิทธิ์บัญชีผู้ใช้
            if (!currentUser || currentUser.role !== 'user') {
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'เฉพาะบัญชีประเภท User เท่านั้นที่สามารถกดให้คุกกี้ได้!',
                    confirmButtonColor: '#ff6b8b'
                });
                return;
            }

            // แสดงกล่องยืนยันก่อนทำรายการ (Confirmation Dialogue)
            Swal.fire({
                title: 'ยืนยันการส่งคุกกี้?',
                text: `คุณต้องการส่งคุกกี้ให้แก่เมมเบอร์ "${memberName}" ใช่หรือไม่?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#ff6b8b',
                cancelButtonColor: '#cccccc',
                confirmButtonText: 'ยืนยัน',
                cancelButtonText: 'ยกเลิก',
                reverseButtons: true
            }).then((result) => {
                if (result.isConfirmed) {
                    // 🌟 [ส่วนเพิ่มเติมในอนาคต]: ใส่ Logic การเขียนข้อมูลอัปเดตลง Supabase หรือ API ต่อได้เลยครับ
                    
                    // แจ้งเตือนเมื่อทำรายการสำเร็จเรียบร้อยแล้ว
                    Swal.fire({
                        icon: 'success',
                        title: 'ส่งคุกกี้สำเร็จ!',
                        text: `🎉 คุณได้ส่งคุกกี้ให้ ${memberName} เรียบร้อยแล้ว!`,
                        confirmButtonColor: '#ff6b8b',
                        timer: 2000
                    });
                }
            });
        }

        // เริ่มแรนเดอร์รายชื่อเมมเบอร์เมื่อเปิดหน้าเว็บ
        displayMembers();
    </script>
</body>
</html>
