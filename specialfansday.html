<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLM48 | Special Fans Day Ranking</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --iam-dark: #3a3a3a;
            --blm-pink: #ffb6c1;
            --blm-pink-light: #fff5f7;
            --blm-gradient: linear-gradient(135deg, #ffccd5, #ffb6c1);
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--blm-pink-light);
            margin: 0;
            padding: 16px;
            padding-bottom: 100px;
            color: var(--iam-dark);
        }

        /* Header Style */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            background: #fff;
            padding: 12px 16px;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(255, 182, 193, 0.2);
        }

        .page-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--iam-dark);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .page-title i { color: var(--blm-pink); }

        .back-home-btn {
            background: var(--blm-gradient);
            color: #fff;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(255, 182, 193, 0.3);
            transition: transform 0.2s;
        }

        /* ป้ายแสดงเดือนปัจจุบันอัตโนมัติ */
        .current-month-badge {
            background: #fff;
            color: #ff6b8b;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 16px;
            border: 2px solid #ffccd5;
            box-shadow: 0 4px 10px rgba(255, 182, 193, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* 👑 โพเดียมอันดับ Top 3 */
        .podium-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            margin: 24px 0;
            padding: 10px;
            gap: 12px;
        }

        .podium-card {
            background: #fff;
            border-radius: 16px;
            padding: 12px;
            text-align: center;
            position: relative;
            box-shadow: 0 6px 15px rgba(255, 182, 193, 0.15);
            flex: 1;
            max-width: 110px;
        }

        .podium-card.rank-1 {
            max-width: 125px;
            padding: 20px 12px 16px 12px;
            border: 2px solid rgba(255, 215, 0, 0.4);
            transform: translateY(-10px);
        }
        .podium-card.rank-2 { border: 1.5px solid rgba(192, 192, 192, 0.4); }
        .podium-card.rank-3 { border: 1.5px solid rgba(205, 127, 50, 0.4); }

        .podium-avatar-wrapper {
            position: relative;
            width: 65px;
            height: 65px;
            margin: 0 auto 8px auto;
        }
        .rank-1 .podium-avatar-wrapper { width: 75px; height: 75px; }

        .podium-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .crown-icon {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.3rem;
        }
        .rank-1 .crown-icon { color: var(--gold); font-size: 1.6rem; }
        .rank-2 .crown-icon { color: var(--silver); }
        .rank-3 .crown-icon { color: var(--bronze); }

        .podium-name {
            font-size: 0.9rem;
            font-weight: bold;
            margin: 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .podium-cookies {
            font-size: 0.75rem;
            color: #e67e22;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }

        .podium-badge {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 22px;
            background: #333;
            color: #fff;
            border-radius: 50%;
            font-size: 0.75rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .rank-1 .podium-badge { background: var(--gold); color: #333; }
        .rank-2 .podium-badge { background: var(--silver); }
        .rank-3 .podium-badge { background: var(--bronze); }

        /* 📋 รายการอันดับ 4 ลงไป */
        .ranking-list {
            background: #fff;
            border-radius: 20px;
            padding: 8px;
            box-shadow: 0 6px 18px rgba(255, 182, 193, 0.15);
        }

        .ranking-row {
            display: flex;
            align-items: center;
            padding: 12px 8px;
            border-bottom: 1px solid #fff0f2;
        }
        .ranking-row:last-child { border-bottom: none; }

        .row-rank {
            width: 30px;
            font-weight: bold;
            font-size: 0.95rem;
            text-align: center;
            color: #8e8e8e;
        }

        .row-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 12px;
            border: 2px solid var(--blm-pink-light);
        }

        .row-info { flex: 1; }
        .row-name { font-size: 0.95rem; font-weight: bold; margin: 0 0 3px 0; }
        .row-cookies { font-size: 0.8rem; color: #e67e22; font-weight: 600; display: flex; align-items: center; gap: 4px; }

        /* ปุ่มส่งคุกกี้ */
        .action-cookie-btn {
            background: var(--blm-gradient);
            border: none;
            color: #fff;
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            box-shadow: 0 3px 8px rgba(255, 182, 193, 0.3);
            transition: transform 0.2s;
        }
        .action-cookie-btn:hover { transform: scale(1.05); }

        .loading-state { text-align: center; padding: 40px; color: var(--blm-pink); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="page-title">
            <i class="fa-solid fa-trophy"></i> Member Ranking
        </div>
        <a href="index.html" class="back-home-btn">
            <i class="fa-solid fa-house"></i> หน้าแรก
        </a>
    </div>

    <div class="current-month-badge">
        <i class="fa-regular fa-calendar-check"></i> 
        ประจำเดือน: <span id="display-current-month">กำลังโหลด...</span>
    </div>

    <div id="podium-section" class="podium-container"></div>

    <div class="ranking-list" id="ranking-rows-wrapper">
        <div class="loading-state">
            <i class="fa-solid fa-spinner fa-spin"></i> กำลังโหลดตารางอันดับ...
        </div>
    </div>

    <script>
        // ⚠️ เปลี่ยนเป็น URL Web App ตัวจริงของคุณ
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec';
        
        let allRankingData = []; 
        let currentUser = null;

        // คำนวณเดือนปัจจุบันอัตโนมัติ
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const currentSysMonth = monthNames[new Date().getMonth()];

        document.addEventListener("DOMContentLoaded", async () => {
            // อัปเดต UI ชื่อเดือน
            document.getElementById('display-current-month').innerText = currentSysMonth;

            // ดึงเซสชัน
            try {
                if (typeof getUserSession === 'function') {
                    currentUser = getUserSession();
                } else {
                    currentUser = JSON.parse(localStorage.getItem('bnl_session'));
                }
            } catch(e) { console.error(e); }
            
            await fetchRankingBackend();
        });

        async function fetchRankingBackend() {
            try {
                const response = await fetch(`${WEB_APP_URL}?action=getRanking`);
                const data = await response.json();
                
                if (data.status === 'success' || Array.isArray(data)) {
                    allRankingData = Array.isArray(data) ? data : data.rankings;
                    renderRankingGrid();
                } else {
                    showErrorMessage('ไม่สามารถโหลดข้อมูลสำเร็จ');
                }
            } catch (error) {
                showErrorMessage('เกิดข้อผิดพลาดในการเชื่อมต่อระบบหลังบ้าน');
            }
        }

        function renderRankingGrid() {
            if (!allRankingData || allRankingData.length === 0) return;

            // เรียงอันดับจาก monthly_cookies ที่หลังบ้านประมวลผลมาให้แล้ว
            const sortedMembers = [...allRankingData].sort((a, b) => {
                return (b.monthly_cookies || 0) - (a.monthly_cookies || 0);
            });

            const top3 = sortedMembers.slice(0, 3);
            const remaining = sortedMembers.slice(3);

            // 1. วาด Top 3 (ลำดับ: อันดับ 2, อันดับ 1, อันดับ 3)
            const podiumWrapper = document.getElementById('podium-section');
            let podiumHTML = '';
            const order = [1, 0, 2]; 
            
            order.forEach(idx => {
                const member = top3[idx];
                if (member) {
                    const rankNum = idx + 1;
                    const cookiesCount = (member.monthly_cookies || 0).toLocaleString();
                    const profileImg = member.profile_img || 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150';

                    podiumHTML += `
                        <div class="podium-card rank-${rankNum}">
                            <i class="fa-solid fa-crown crown-icon"></i>
                            <div class="podium-avatar-wrapper">
                                <img class="podium-avatar" src="${profileImg}" alt="${member.name}">
                            </div>
                            <div class="podium-name">${member.name}</div>
                            <div class="podium-cookies"><i class="fa-solid fa-cookie"></i> ${cookiesCount}</div>
                            <div class="podium-badge">${rankNum}</div>
                            <button class="action-cookie-btn" style="margin: 8px auto 0 auto;" onclick="submitCookieToMember('${member.name}')">
                                <i class="fa-solid fa-cookie"></i> ส่ง
                            </button>
                        </div>
                    `;
                }
            });
            podiumWrapper.innerHTML = podiumHTML;

            // 2. วาดอันดับ 4 เป็นต้นไป
            const listWrapper = document.getElementById('ranking-rows-wrapper');
            let listHTML = '';
            remaining.forEach((member, index) => {
                const rankNum = index + 4; // เริ่มที่อันดับ 4
                const cookiesCount = (member.monthly_cookies || 0).toLocaleString();
                const profileImg = member.profile_img || 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150';

                listHTML += `
                    <div class="ranking-row">
                        <div class="row-rank">${rankNum}</div>
                        <img class="row-avatar" src="${profileImg}" alt="${member.name}" loading="lazy">
                        <div class="row-info">
                            <h4 class="row-name">${member.name}</h4>
                            <div class="row-cookies"><i class="fa-solid fa-cookie"></i> ${cookiesCount} Cookies</div>
                        </div>
                        <button class="action-cookie-btn" onclick="submitCookieToMember('${member.name}')">
                            <i class="fa-solid fa-cookie"></i> ส่งคุกกี้
                        </button>
                    </div>
                `;
            });
            listWrapper.innerHTML = listHTML;
        }

        async function submitCookieToMember(memberName) {
            if (!currentUser) {
                alert('❌ กรุณาเข้าสู่ระบบก่อนร่วมส่งคุกกี้ให้เมมเบอร์!');
                return;
            }
            if (currentUser.role !== 'user') {
                alert('❌ เฉพาะบัญชีประเภทแฟนคลับ (User) เท่านั้นที่สามารถส่งคุกกี้ได้งับ!');
                return;
            }

            const amountInput = prompt(`🎉 ป้อนจำนวนคุกกี้ที่ต้องการส่งให้คุณ "${memberName}":`, "10");
            if (amountInput === null) return; 
            
            const cookieAmount = parseInt(amountInput);
            if (isNaN(cookieAmount) || cookieAmount <= 0) {
                alert('❌ กรุณากรอกจำนวนคุกกี้ที่ถูกต้องและมากกว่า 0 ชิ้นครับ');
                return;
            }

            const userAvailableCookies = parseInt(currentUser.cookie || 0);
            if (cookieAmount > userAvailableCookies) {
                alert(`❌ คุกกี้ไม่พอส่งงับ! ปัจจุบันคุณมีอยู่ ${userAvailableCookies} คุกกี้`);
                return;
            }

            try {
                alert('⏳ ระบบกำลังประมวลผลการโหวตส่งมอบคุกกี้...');

                // ยิง API หลังบ้านพร้อมระบุเดือนปัจจุบัน
                await fetch(`${WEB_APP_URL}`, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({
                        'action': 'giveCookie',
                        'username': currentUser.username,
                        'target': memberName,
                        'amount': cookieAmount,
                        'month': currentSysMonth 
                    })
                });

                // อัปเดตคุกกี้ในเครื่องทันที
                currentUser.cookie = userAvailableCookies - cookieAmount;
                localStorage.setItem('bnl_session', JSON.stringify(currentUser));
                
                alert(`🎉 สำเร็จ! มอบให้ ${cookieAmount} คุกกี้แก่คุณ ${memberName} เรียบร้อยแล้วงับ ✨`);
                
                // รีโหลดข้อมูลตารางใหม่
                await fetchRankingBackend();

            } catch (error) {
                alert('❌ ไม่สามารถทำรายการได้ในขณะนี้ กรุณาลองใหม่อีกครั้ง');
            }
        }

        function showErrorMessage(msg) {
            document.getElementById('ranking-rows-wrapper').innerHTML = `
                <div class="loading-state" style="color: #ff4d6d;">
                    <i class="fa-solid fa-triangle-exclamation"></i> ${msg}
                </div>
            `;
        }
    </script>
</body>
</html>
