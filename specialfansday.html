<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLM48 | Special Fans Day</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff5f7;
            margin: 0;
            padding: 16px;
            padding-bottom: 80px;
        }
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .page-title {
            font-size: 1.4rem;
            color: #333;
            margin: 0;
        }
        .champ-week-btn {
            background: #ffc0cb;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .member-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .member-card {
            background: #fff;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .member-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar-frame {
            position: relative;
            width: 50px;
            height: 50px;
        }
        .member-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffc0cb;
        }
        .member-name {
            margin: 0;
            font-size: 1rem;
            color: #333;
        }
        .give-cookie-btn {
            background: #ff6b8b;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: background 0.2s;
        }
        .give-cookie-btn:hover {
            background: #ff4770;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 class="page-title">Special Fans Day</h1>
        <a href="champ.html" class="champ-week-btn">
            <i class="fa-solid fa-crown"></i> Champ of the week
        </a>
    </div>

    <div class="member-list" id="member-container">
        </div>

    <script>
        // ข้อมูลจำลองของผู้ใช้ปัจจุบัน (ดึงข้อมูลจริงจากระบบล็อกอินหรือ LocalStorage ของคุณ)
        const currentUser = {
            username: "Fanclub01",
            role: "user" // สามารถลองเปลี่ยนเป็น 'admin' เพื่อทดสอบเงื่อนไขล็อกสิทธิ์ได้
        };

        // รายชื่อเมมเบอร์เริ่มต้น (เชื่อมต่อกับ Database หรือ API หลักของคุณ)
        const members = [
            { id: 1, name: "Member 1", image: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150" },
            { id: 2, name: "Member 2", image: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150" },
            { id: 3, name: "Member 3", image: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150" }
        ];

        function displayMembers() {
            const container = document.getElementById('member-container');
            container.innerHTML = members.map(member => `
                <div class="member-card">
                    <div class="member-info">
                        <div class="avatar-frame">
                            <img class="member-avatar" src="${member.image}" alt="${member.name}">
                        </div>
                        <h3 class="member-name">${member.name}</h3>
                    </div>
                    <button class="give-cookie-btn" onclick="sendCookie('${member.name}')">
                        <i class="fa-solid fa-cookie"></i> ส่งคุกกี้
                    </button>
                </div>
            `).join('');
        }

        // ฟังก์ชันจัดการระบบส่งคุกกี้ และตรวจสอบสิทธิ์ผู้ใช้งาน
        function sendCookie(memberName) {
            // ตรวจสอบสิทธิ์: ต้องเป็น role 'user' เท่านั้น
            if (!currentUser || currentUser.role !== 'user') {
                alert('❌ เฉพาะบัญชีประเภท User เท่านั้นที่สามารถกดให้คุกกี้ได้!');
                return;
            }

            // ทำงานต่อหากเป็นประเภท User จริง (เช่นอัปเดตข้อมูลขึ้นฐานข้อมูล/Supabase)
            alert(`🎉 คุณได้ส่งคุกกี้ให้ ${memberName} เรียบร้อยแล้ว!`);
        }

        // เริ่มแสดงรายการเมมเบอร์ตอนเปิดหน้า
        displayMembers();
    </script>
</body>
</html>
