<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLM48 | Special Fans Day</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --iam-dark: #2c2c2c;
            --blm-pink: #ff85a2;
            --blm-pink-light: #fff5f7;
            --blm-gradient: linear-gradient(135deg, #ffccd5, #ffb6c1);
        }

        body {
            font-family: 'Quicksand', 'Kanit', sans-serif;
            background-color: var(--blm-pink-light);
            margin: 0; padding: 16px; padding-bottom: 100px;
        }

        /* Top Navbar */
        .top-navbar {
            display: flex; justify-content: space-between; align-items: center;
            background: #fff; padding: 12px 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(255, 133, 162, 0.1); margin-bottom: 20px;
        }

        .nav-title { font-weight: bold; font-size: 1.2rem; color: var(--iam-dark); }
        .nav-title span { color: var(--blm-pink); }

        .btn-back { 
            color: var(--blm-pink); text-decoration: none; font-weight: bold;
            display: flex; align-items: center; gap: 5px;
        }

        /* Summary Box */
        .summary-banner {
            background: #fff; border-radius: 20px; padding: 20px; text-align: center;
            margin-bottom: 24px; border: 2px solid #fff0f3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .summary-month { font-size: 1.1rem; font-weight: bold; color: var(--blm-pink); margin-bottom: 5px; }
        .summary-desc { font-size: 0.85rem; color: #888; }

        /* Ranking List */
        .ranking-container { display: flex; flex-direction: column; gap: 12px; }

        .ranking-row {
            background: #fff; border-radius: 18px; padding: 12px 16px;
            display: flex; align-items: center; gap: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            border-bottom: 3px solid #f0f0f0;
        }

        .rank-number { 
            width: 30px; font-weight: bold; font-size: 1.1rem; color: #bbb;
            text-align: center;
        }
        
        .ranking-row:nth-child(1) .rank-number { color: #ffd700; font-size: 1.5rem; }
        .ranking-row:nth-child(2) .rank-number { color: #c0c0c0; }
        .ranking-row:nth-child(3) .rank-number { color: #cd7f32; }

        .member-avatar {
            width: 55px; height: 55px; border-radius: 50%;
            object-fit: cover; border: 2px solid var(--blm-pink-light);
        }

        .member-info { flex: 1; text-align: left; }
        .member-name { font-weight: bold; font-size: 1rem; color: var(--iam-dark); margin: 0; }
        .member-cookies { 
            font-size: 0.85rem; color: #e67e22; font-weight: bold;
            display: flex; align-items: center; gap: 4px;
        }

        .btn-send {
            background: var(--blm-gradient); color: #fff; border: none;
            padding: 8px 16px; border-radius: 20px; font-weight: bold;
            font-size: 0.8rem; cursor: pointer;
            box-shadow: 0 4px 8px rgba(255, 133, 162, 0.2);
            transition: transform 0.2s;
        }
        .btn-send:active { transform: scale(0.95); }

        /* Notification Badge for Bottom Nav */
        .noti-badge {
            position: absolute; top: -2px; right: -2px; width: 8px; height: 8px;
            background-color: #ff4d6d; border-radius: 50%; border: 1px solid white;
        }
        .icon-wrapper { position: relative; display: inline-flex; }
    </style>
</head>
<body>

    <div class="top-navbar">
        <a href="index.html" class="btn-back"><i class="fas fa-chevron-left"></i> Back</a>
        <div class="nav-title">Special <span>Fans Day</span></div>
        <a href="champ.html" style="color: #ffd700; font-size: 1.2rem;"><i class="fas fa-history"></i></a>
    </div>

    <div class="summary-banner">
        <div class="summary-month" id="current-month-name">Current Season</div>
        <div class="summary-desc">Send cookies to support your favorite members!</div>
    </div>

    <div class="ranking-container" id="ranking-list">
        </div>

    <div class="bottom-tab-bar" style="position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 440px; height: 68px; background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-radius: 35px; border: 1px solid rgba(255, 204, 213, 0.5); box-shadow: 0 10px 30px rgba(255, 133, 162, 0.15); z-index: 1000;">
        <a href="index.html" style="color: #ffccd5; font-size: 1.5rem;"><i class="fa-solid fa-house"></i></a>
        <a href="notification.html" class="icon-wrapper" style="color: #ffccd5; font-size: 1.5rem;">
            <i class="fa-solid fa-bell"></i>
            <span class="noti-badge" id="noti-badge" style="display: none;"></span>
        </a>
        <a href="profile.html" style="color: #ffccd5; font-size: 1.5rem;"><i class="fa-solid fa-user"></i></a>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec';
        let user = JSON.parse(localStorage.getItem('bnl_session'))?.data || null;

        // ฟังก์ชันดึงข้อมูล Ranking และแสดงผลเฉพาะคนที่มีข้อมูล (Cookies > 0)
        async function loadRanking() {
            try {
                const response = await fetch(`${scriptURL}?action=getRanking`);
                const data = await response.json();
                const list = document.getElementById('ranking-list');
                list.innerHTML = '';

                // กรองเฉพาะเมมเบอร์ที่มี Monthly Cookies มากกว่า 0
                const activeMembers = data.filter(m => (m.monthly_cookies || 0) > 0);
                
                if (activeMembers.length === 0) {
                    list.innerHTML = '<div style="text-align:center; padding:50px; color:#999;">No active rankings this month.</div>';
                    return;
                }

                activeMembers.forEach((m, i) => {
                    const row = document.createElement('div');
                    row.className = 'ranking-row';
                    row.innerHTML = `
                        <div class="rank-number">${i + 1}</div>
                        <img src="${m.profile_img || 'https://via.placeholder.com/100'}" class="member-avatar">
                        <div class="member-info">
                            <p class="member-name">${m.name}</p>
                            <div class="member-cookies"><i class="fas fa-cookie-bite"></i> ${Number(m.monthly_cookies).toLocaleString()} Cookies</div>
                        </div>
                        <button class="btn-send" onclick="sendCookie('${m.name}')">SEND</button>
                    `;
                    list.appendChild(row);
                });
            } catch (e) {
                console.error(e);
            }
        }

        // ฟังก์ชันส่งคุกกี้ (ดึงลอจิกจากหน้าแรก)
        async function sendCookie(memberName) {
            if (!user) { window.location.href = 'login.html'; return; }
            if (user.role !== 'user') {
                alert('Only User accounts can send cookies!');
                return;
            }

            const amount = prompt(`Enter cookies to send to ${memberName}:`, "10");
            if (!amount || isNaN(amount) || amount <= 0) return;

            if (Number(user.cookie) < Number(amount)) {
                alert('Not enough cookies!');
                return;
            }

            // ส่งข้อมูลไปหลังบ้าน
            alert(`Sending ${amount} cookies to ${memberName}...`);
            // ... (ลอจิก Fetch POST เหมือนหน้าแรกที่คุณมี) ...
        }

        // ระบบแจ้งเตือน (Red Dot)
        function checkNoti() {
            const hasNew = localStorage.getItem("blm48_has_new_noti");
            const badge = document.getElementById("noti-badge");
            if (badge) badge.style.display = (hasNew === "true") ? "block" : "none";
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadRanking();
            checkNoti();
            // แสดงชื่อเดือนปัจจุบัน
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('current-month-name').innerText = months[new Date().getMonth()] + " Season";
        });
    </script>
</body>
</html>
