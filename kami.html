}

/* ดีไซน์เอฟเฟกต์แคปซูลเมื่อกดเลือกเมนู (Active) ❤️ */

}

.tab-item:active i {

}

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec';
        
        function getUserSession() {
            const sessionStr = localStorage.getItem('bnl_session');
            if (!sessionStr) return null;
            const session = JSON.parse(sessionStr);
            if (new Date().getTime() > session.expiry) {
                localStorage.removeItem('bnl_session');
                return null;
            }
            return session.data;
        }
      
     function getImg(url) {
    if (!url || url === "") return 'https://via.placeholder.com/150';
    
    // แปลง Google Drive เป็น Direct Link (ตัวอย่าง)
    if (url.includes('drive.google.com')) {
        const id = url.match(/[-\w]{25,}/);
        return id ? `https://lh3.googleusercontent.com/d/${id[0]}=w300` : url;
    }
    
    return url; // ส่งคืน URL ปกติ
}

        let user = getUserSession();

  window.onload = async () => {

      async function fetchMembersImageDB() {
    const cacheKey = 'blm48_members_images_cache';
    const cacheTimeKey = 'blm48_members_images_time';
    const tenMinutes = 10 * 60 * 1000; // 10 นาทีในหน่วยมิลลิวินาที
    
    const cachedData = localStorage.getItem(cacheKey);
    const cachedTime = localStorage.getItem(cacheTimeKey);
    const now = new Date().getTime();
    
    // ถ้ามีข้อมูลเก่าในเครื่อง และยังไม่หมดเวลา 10 นาที เอามาใช้ทันที!
    if (cachedData && cachedTime && (now - cachedTime < tenMinutes)) {
        memberImageMap = JSON.parse(cachedData);
        console.log("🚀 ดึงรูปเมมเบอร์จาก Cache ในเครื่อง (เร็วมาก!)");
        return;
    }

    // ถ้าไม่มีแคช หรือหมดเวลาแล้ว ค่อยไปดึงจาก Google Sheets
    try {
        const response = await fetch(`${scriptURL}?action=getRanking`);
        const members = await response.json();
        
        let tempMap = {};
        members.forEach(m => {
            if (m.name) {
                tempMap[m.name.toString().trim().toLowerCase()] = m.profile_img || "";
            }
        });
        
        memberImageMap = tempMap;
        // เซฟเก็บไว้ในเครื่องรอบหน้าจะได้ไม่ต้องโหลดใหม่
        localStorage.setItem(cacheKey, JSON.stringify(tempMap));
        localStorage.setItem(cacheTimeKey, now.toString());
        
    } catch (err) {
        console.error("เรียกฐานข้อมูลรูปภาพไม่สำเร็จ", err);
    }
}

      
// 🎯 ดึงข้อมูลและเรนเดอร์ทำเนียบคามิ/โอชิ (เวอร์ชันติดสปีด โชว์แคชทันที อัปเดตเบื้องหลัง)
async function fetchAndRenderUserOshiBoard() {
    const kamiArea = document.getElementById('kami-content-area');
    const oshiArea = document.getElementById('oshi-content-area');
    if (!kamiArea || !oshiArea) return;

    // ตั้งชื่อคีย์สำหรับเก็บแคชบอร์ดโอชิของยูสเซอร์แต่ละคน
    const cacheKey = `blm48_oshi_board_cache_${currentUsername}`;
    const cachedDataStr = localStorage.getItem(cacheKey);
    let hasCache = false;

    // 🌸 ฟังก์ชันส่วนกลางสำหรับวาดหน้าจอ (Render) เพื่อเรียกใช้ซ้ำได้เนียนๆ
    function renderContent(data) {
        // 🛡️ ฟังก์ชันไม้ตายป้องกันรูปภาพแตก: หากลิงก์เสีย จะฟอกรูปให้ใสสะอาดเพื่อโชว์พื้นหลังสีชมพูแทน
        const clearBrokenImg = "this.onerror=null; this.src='data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';";
        
        // ดักแก้ปัญหา Async: ถ้าแมพรูปภาพหลักยังโหลดไม่เสร็จ ให้แอบดึงแคชรูปภาพมาใช้สแตนบายก่อนทันที
        if (!memberImageMap || Object.keys(memberImageMap).length === 0) {
            const imgCache = localStorage.getItem('blm48_members_images_cache');
            if (imgCache) memberImageMap = JSON.parse(imgCache);
        }

        // อัปเดตรูปโปรไฟล์ผู้ใช้ตรงแถบด้านบนสุด
        const userAvatar = document.getElementById('user-avatar');
        if (userAvatar) {
            userAvatar.src = data.profile_img || "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
            userAvatar.setAttribute('onerror', clearBrokenImg);
        }

        // 👑 เรนเดอร์ข้อมูล คามิโอชิหลัก (Kami-Oshi)
        let kamiHTML = "";
        if (data.kamioshi) {
            const kamiName = data.kamioshi.toString().trim();
            const rawImg = memberImageMap[kamiName.toLowerCase()] || "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
            
            kamiHTML = `
                <div class="kami-container">
                    <button type="button" class="btn-remove-kami" onclick="executeDeleteAction('kami', '${kamiName}')">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                    <div class="kami-avatar-frame">
                        <i class="fa-solid fa-crown crown-tag"></i>
                        <img src="${getImg(rawImg)}"
                             class="kami-img" 
                             alt="${kamiName}" loading="lazy" 
                             onerror="${clearBrokenImg}">
                    </div>
                    <div class="kami-title-name">${kamiName}</div>
                    <span class="badge-kami"><i class="fa-solid fa-heart"></i> Kamioshi</span>
                </div>`;
        } else {
            kamiHTML = `<div class="empty-heart-state">คุณยังไม่ได้เลือกคามิโอชิ</div>`;
        }

        // ❤️ เรนเดอร์ข้อมูล โอชิสมทบ (Oshi)
        let oshiHTML = "";
        const processedOshis = [...(data.oshi || [])].filter(o => o.toLowerCase() !== (data.kamioshi || "").toLowerCase());
        
        if (processedOshis.length > 0) {
            processedOshis.forEach(oshiName => {
                const rawImg = memberImageMap[oshiName.toLowerCase()] || "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
                
                oshiHTML += `
                    <div class="oshi-box-card">
                         <img src="${getImg(rawImg)}"
                             class="oshi-pic" 
                             alt="${oshiName}" loading="lazy" 
                             onerror="${clearBrokenImg}">
                        <div class="oshi-info-center">
                            <div class="oshi-display-name">${oshiName}</div>
                            <span class="badge-oshi"><i class="fa-solid fa-heart"></i> Oshi</span>
                        </div>
                        <button type="button" class="btn-remove-oshi" onclick="executeDeleteAction('oshi', '${oshiName}')">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>`;
            });
        } else {
            oshiHTML = `<div class="empty-heart-state">คุณยังไม่ได้เลือกโอชิ</div>`;
        }

        kamiArea.innerHTML = kamiHTML;
        oshiArea.innerHTML = oshiHTML;
    }

    // 🌟 STEP 1: เช็กแคชในเครื่อง ถ้าเคยเปิดหน้านี้มาก่อน ให้จับวาดขึ้นจอทันที (0 วินาทีแรก!)
    if (cachedDataStr) {
        try {
            const cachedData = JSON.parse(cachedDataStr);
            if (cachedData) {
                renderContent(cachedData);
                hasCache = true;
            }
        } catch (e) {
            console.error("เกิดข้อผิดพลาดในการดึงข้อมูลแคชบอร์ด:", e);
        }
    }

    // 🌟 STEP 2: ถ้าไม่มีข้อมูลแคชเลย (เข้าใช้ครั้งแรก) ค่อยขึ้นโครง Skeleton รอโหลดตามปกติ
    if (!hasCache) {
        kamiArea.innerHTML = `
            <div class="kami-container skeleton-card">
                <div class="kami-avatar-frame skeleton-circle"></div>
                <div class="skeleton-text" style="width: 100px; margin: 8px auto;"></div>
            </div>`;
            
        oshiArea.innerHTML = Array(4).fill(0).map(() => `
            <div class="oshi-box-card skeleton-card">
                <div class="oshi-pic skeleton-circle" style="width:54px; height:54px;"></div>
                <div class="oshi-info-center">
                    <div class="skeleton-text" style="width: 80px; margin-bottom: 6px;"></div>
                    <div class="skeleton-text" style="width: 50px; height: 10px;"></div>
                </div>
            </div>`).join('');
    }

    // 🌟 STEP 3: แอบวิ่งไปดึงข้อมูลใหม่แบบเงียบๆ ล่าสุดจาก Google Sheets
    try {
        const response = await fetch(`${scriptURL}?action=getUserInfo&username=${encodeURIComponent(currentUsername)}&_=${Date.now()}`);
        const res = await response.json();
        
        if (res.status === "success" && res.data) {
            // อัปเดตข้อมูลเซฟลงเครื่องในคีย์แคชใหม่ล่าสุด
            localStorage.setItem(cacheKey, JSON.stringify(res.data));
            
            // สั่งอัปเดตหน้าจอเบาๆ ถ้าแฟนคลับมีการกดเปลี่ยน/เพิ่มคามิโอชิมา หน้าจอก็จะขยับเปลี่ยนทันทีแบบเนียนๆ
            renderContent(res.data);
        }
    } catch (err) {
        console.error("Error loading user oshi board from server:", err);
        // ถ้าดึงข้อมูลสดขัดข้องแต่มีแคชอยู่ ก็ปล่อยให้แสดงข้อมูลเก่าไป แฟนคลับจะไม่รู้เลยว่าระบบขัดข้อง ดีกว่าขึ้น Error ให้ตกใจงับ
        if (!hasCache) {
            kamiArea.innerHTML = `<div class="empty-heart-state" style="color:var(--danger-red);">โหลดข้อมูลไม่สำเร็จ กรุณารีเฟรชอีกครั้ง</div>`;
            oshiArea.innerHTML = "";
        }
    }
}
        
        async function executeDeleteAction(type, memberName) {
            const typeText = type === 'kami' ? 'คามิโอชิหลัก' : 'โอชิ';
            const confirm = await Swal.fire({
                title: 'ยืนยันการลบข้อมูล?',
                text: `คุณต้องการจะลบ ${memberName} ออกจาก ${typeText}?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff85a2',
                cancelButtonColor: '#ccc',
                confirmButtonText: 'ใช่, ลบออกเลย',
                cancelButtonText: 'ยกเลิก'
            });

            if (!confirm.isConfirmed) return;

            Swal.fire({ title: 'กำลังอัพเดทข้อมูล...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    body: new URLSearchParams({
                        action: 'removeOshi',
                        username: currentUsername,
                        type: type,
                        memberName: memberName
                    })
                });
                
                const res = await response.json();
                if (res.status === "success") {
                    Swal.fire('สำเร็จ!', 'ระบบลบรายชื่อออกจากโอชิเรียบร้อยแล้วค่ะ', 'success');
                    await fetchAndRenderUserOshiBoard(); 
                } else {
                    Swal.fire('เกิดข้อผิดพลาด', res.message || 'ไม่สามารถลบข้อมูลได้', 'error');
                }
            } catch (err) {
                Swal.fire('ล้มเหลว!', 'ระบบติดต่อตารางข้อมูลขัดข้อง กรุณาลองอีกครั้งนะงับ', 'error');
            }
        }

        function checkNotificationBadge() {
  const hasNewNoti = localStorage.getItem("blm48_has_new_noti");
  const badgeElement = document.getElementById("global-noti-badge");
  
  if (badgeElement) {
    if (hasNewNoti === "true") {
      badgeElement.style.display = "block"; // 🔴 มีแจ้งเตือนใหม่ -> แสดงจุดแดง
    } else {
      badgeElement.style.display = "none";  // ⚪ ไม่มีแจ้งเตือน -> ซ่อนไปเลย
    }
  }
}

// สั่งให้ระบบทำงานทุกอย่างพร้อมกันเมื่อโหลดหน้าเว็บเสร็จสมบูรณ์
document.addEventListener("DOMContentLoaded", function() {
  
  // 1. เช็กสถานะจุดแจ้งเตือน
  if (typeof checkNotificationBadge === 'function') {
    checkNotificationBadge();
  }

  // 2. ดึงรูปโปรไฟล์มาแสดงที่ Tab Bar ด้านล่าง
  const tabProfileImg = document.getElementById('tab-profile-img');
  if (tabProfileImg) {
    // พยายามดึงข้อมูลผู้ใช้จาก Session ของระบบ
    let currentUser = null;
    
    // เช็กว่ามีตัวแปร user (Global) อยู่ไหม ถ้าไม่มีให้ไปดึงจาก localStorage
    if (typeof user !== 'undefined' && user) {
      currentUser = user;
    } else {
      const sessionStr = localStorage.getItem("bnl_session"); // ใช้ bnl_session ตามระบบหลัก
      if (sessionStr) {
        try {
          const session = JSON.parse(sessionStr);
          currentUser = session.data || session.user || session; 
        } catch (e) {}
      }
    }

    // ถ้ามีข้อมูลผู้ใช้และมีรูปโปรไฟล์ ให้จัดการแสดงผล
    if (currentUser && currentUser.profile_img) {
      tabProfileImg.src = typeof getImg === 'function' ? getImg(currentUser.profile_img) : currentUser.profile_img;
    }
  }
  
});
    </script>
