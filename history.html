<!DOCTYPE html>
<html lang="th">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>BLM48 Membership | History</title>
     <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
    <meta name="theme-color" content="#ffc0cb">
    <!-- สำหรับ iOS Home Screen Icon -->
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s180">
    <!-- สำหรับ Android และ Chrome -->
    <link rel="icon" sizes="192x192" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s192">
    <!-- กำหนดชื่อแอปที่จะขึ้นใต้ไอคอนบนหน้าจอ Home Screen -->
    <meta name="apple-mobile-web-app-title" content="BLM48">   
    <!-- ทำให้แถบด้านบน (Status Bar) ดูเป็นแอปมากขึ้น -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#ffc0cb">
    <style>
        body { font-family: 'Quicksand', 'Kanit', sans-serif;  background: #fff5f7; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #ff6b81; }
        
        .history-section { margin-top: 20px; }
        .history-title { border-bottom: 2px solid #ffc0cb; padding-bottom: 5px; margin-bottom: 10px; font-weight: 500; color: #555; }
        
        .history-scroll-container { max-height: 400px; overflow-y: auto; background: #fafafa; border-radius: 10px; padding: 10px; }
        
        .fan-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px dashed #ddd; }
        .fan-info .fan-name { font-weight: bold; font-size: 14px; }
        .fan-info .timestamp { font-size: 10px; color: #aaa; }
        .fan-cookies { color: #4dabf7; font-weight: bold; }
        
        .back-btn { display: block; width: 100%; padding: 10px; margin-top: 20px; background: #ffc0cb; color: white; border: none; border-radius: 10px; cursor: pointer; text-align: center; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>My History</h2>
    
    <div id="history-content">
        <p style="text-align:center; color:#aaa;">กำลังโหลดข้อมูลนะคะ...</p>
    </div>

    <a href="index.html" class="back-btn">กลับหน้าหลัก</a>
</div>

<script>
    // ดึงค่า URL ของสคริปต์มาจากหน้าที่พี่ใช้งานอยู่
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec';

    async function loadHistory() {
        const session = localStorage.getItem('bnl_session');
        if (!session) {
            alert('กรุณาล็อกอินก่อนงับ');
            window.location.href = 'login.html';
            return;
        }

        const userData = JSON.parse(session).data;
        const username = userData.username;
        const historyContent = document.getElementById('history-content');

        try {
            const response = await fetch(`${scriptURL}?action=getMyHistory&username=${username}`);
            const res = await response.json();

            if (res.status === "success") {
                let html = `
                    <div class="history-section">
                        <div class="history-title">🛒 ประวัติการช้อปปิ้ง</div>
                        <div class="history-scroll-container">
                            ${res.purchaseHistory?.length ? res.purchaseHistory.map(log => `
                                <div class="fan-row">
                                    <div class="fan-info">
                                        <div class="fan-name">${log.action}: ${log.target}</div>
                                        <div class="timestamp">${new Date(log.timestamp).toLocaleString()}</div>
                                    </div>
                                    <div class="fan-cookies">${log.amount}</div>
                                </div>
                            `).join('') : '<p style="text-align:center; color:#ccc; font-size:12px;">ยังไม่มีประวัติการซื้อไอเทมงับ</p>'}
                        </div>
                    </div>

                    <div class="history-section">
                        <div class="history-title">💖 ประวัติการส่งกำลังใจ</div>
                        <div class="history-scroll-container">
                            ${res.giveLogs?.length ? res.giveLogs.map(log => `
                                <div class="fan-row">
                                    <div class="fan-info">
                                        <div class="fan-name">ปาให้: ${log.member}</div>
                                        <div class="timestamp">${new Date(log.timestamp).toLocaleString()}</div>
                                    </div>
                                    <div class="fan-cookies">${log.amount} 🍪</div>
                                </div>
                            `).join('') : '<p style="text-align:center; color:#ccc; font-size:12px;">ยังไม่เคยปาคุกกี้เลยงับ</p>'}
                        </div>
                    </div>
                `;
                historyContent.innerHTML = html;
            } else {
                historyContent.innerHTML = "<p style='text-align:center;'>ไม่พบข้อมูลประวัติงับ</p>";
            }
        } catch (e) {
            console.error(e);
            historyContent.innerHTML = "<p style='text-align:center;'>เกิดข้อผิดพลาดในการโหลดข้อมูล</p>";
        }
    }

    // เรียกโหลดข้อมูลทันทีที่เปิดหน้า
    loadHistory();
</script>

</body>
</html>
