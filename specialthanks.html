<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLM48 Membership | Special Thanks</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
    <meta name="theme-color" content="#ffc0cb">
    
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s180">
    <link rel="icon" sizes="192x192" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s192">
    <meta name="apple-mobile-web-app-title" content="BLM48">   
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --blm-pink: #ff85a2;
            --blm-light-pink: #fff0f5;
            --bg-dreamy: #fdf6f7;
            --text-dark: #4a4a4a;
            --text-muted: #9e9e9e;
            --glass-card: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* 🎯 ถอดแบบฟอนต์คู่ใจ Quicksand + Kanit มนสวยสไตล์โมเดิร์น */
            font-family: 'Quicksand', 'Kanit', sans-serif;
            background-color: var(--bg-dreamy);
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 192, 203, 0.3) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(255, 240, 245, 0.5) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        /* 📡 Top Navbar */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 2px 10px rgba(255, 133, 162, 0.06);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .nav-back-btn {
            color: var(--blm-pink);
            font-size: 1.1rem;
            text-decoration: none;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--blm-light-pink);
        }

        .nav-title {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--blm-pink);
            letter-spacing: 0.5px;
        }

        .nav-spacer { width: 35px; }

        .main-container {
            width: 100%;
            padding: 85px 16px 40px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ✨ กล่องดีไซน์ Responsive ขยายสวยงามบน คอม/ไอแพด/มือถือ */
        .thanks-card-container {
            max-width: 800px;
            width: 100%;
            background: var(--glass-card);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 24px;
            box-shadow: 0 8px 32px rgba(255, 133, 162, 0.06);
            text-align: center;
            animation: fadeInCard 0.5s ease-out;
        }

        .avatar-wrapper {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 18px auto;
        }

        .avatar-frame {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff85a2, #ffe4e1, #ffb6c1);
            padding: 4px;
            box-shadow: 0 4px 12px rgba(255, 133, 162, 0.15);
        }

        .member-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-color: #fff;
        }

        .crown-icon {
            position: absolute;
            top: -8px;
            left: -4px;
            color: #ffb703;
            font-size: 1.4rem;
            transform: rotate(-20deg);
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
        }

        .member-name {
            margin: 0 0 6px 0;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .period-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--blm-light-pink);
            color: var(--blm-pink);
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 14px;
        }

        .cookie-stats {
            font-size: 1.1rem;
            color: var(--blm-pink);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 24px;
        }

        /* 💌 กล่องข้อความความรู้สึกจากเมมเบอร์ */
        .message-section {
            text-align: left;
            background: #fffbfa;
            border-left: 4px solid var(--blm-pink);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }

        .message-title {
            font-size: 0.9rem;
            color: var(--blm-pink);
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .message-content {
            font-size: 1rem;
            line-height: 1.6;
            color: #555555;
            white-space: pre-line;
            word-break: break-word;
        }

        /* 🖼️ โพสต์รูปภาพเฉลิมฉลองประจำตำแหน่ง */
        .artwork-section {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
            display: none;
            margin-top: 16px;
        }

        .artwork-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 🖥️ Responsive Layout อัปเกรดความเต็มตาบนคอมพิวเตอร์และ iPad */
        @media (min-width: 768px) {
            .thanks-card-container {
                padding: 40px;
                border-radius: 32px;
            }

            .avatar-wrapper {
                width: 140px;
                height: 140px;
                margin-bottom: 22px;
            }

            .crown-icon {
                font-size: 1.8rem;
                top: -10px;
                left: -6px;
            }

            .member-name {
                font-size: 2rem;
            }

            .cookie-stats {
                font-size: 1.3rem;
            }

            .message-content {
                font-size: 1.1rem;
            }
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-state, .error-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 1rem;
        }

        .error-state i {
            color: #e63946;
            font-size: 2rem;
            margin-bottom: 12px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="top-navbar">
    <a href="index.html" class="nav-back-btn">
        <i class="fas fa-chevron-left"></i>
    </a>
    <div class="nav-title">Special Thanks</div>
    
    <a href="champ.html" class="nav-icon" style="color: var(--blm-pink); font-size: 1.2rem; text-decoration: none;">
        <i class="fas fa-history"></i>
    </a>
</div>

    <div class="main-container">
        <div class="thanks-card-container" id="thanks-content-box">
            <div class="loading-state">
                <i class="fas fa-spinner fa-spin" style="font-size:1.5rem; color:var(--blm-pink); margin-bottom:10px;"></i>
                <div>กำลังโหลดข้อมูลความรู้สึกแทนคำขอบคุณ...</div>
            </div>
        </div>
    </div>

    <script>
        // API ประจำโปรเจกต์
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec';

        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const indexParam = urlParams.get('index');
            const container = document.getElementById('thanks-content-box');

            if (indexParam === null) {
                showError("ไม่พบข้อมูลพารามิเตอร์ของเมมเบอร์ค่ะ");
                return;
            }

            const targetIndex = Number(indexParam);
            let champData = null;

            // 1. ดึงข้อมูลจาก sessionStorage ดูก่อนเพื่อความไวสูงสูด (UX สมูท)
            const localData = sessionStorage.getItem('blm_champ_history');
            if (localData) {
                const parsed = JSON.parse(localData);
                if (parsed && parsed[targetIndex]) {
                    champData = parsed[targetIndex];
                }
            }

            // 2. Fallback: ถ้าเปิดลิงก์ตรงๆ หรือกด Refresh หน้าเว็บ ข้อมูลใน session จะดึงสดจาก Google Sheet ทันที
            if (!champData) {
                try {
                    const response = await fetch(`${scriptURL}?action=getChampOfTheMonth`);
                    const result = await response.json();
                    if (result.status === "success" && result.data && result.data[targetIndex]) {
                        champData = result.data[targetIndex];
                        // เซฟเก็บลง session เผื่อเรียกซ้ำคราวหน้า
                        sessionStorage.setItem('blm_champ_history', JSON.stringify(result.data));
                    }
                } catch (error) {
                    console.error("Fetch API error:", error);
                }
            }

            // 3. แสดงผลข้อมูลของเมมเบอร์ตาม Index ที่ส่งมา ล็อคเป้าหมายคนนี้ไว้คนเดียวอย่างปลอดภัย
            if (champData) {
                renderSpecialThanks(champData);
            } else {
                showError("ไม่พบข้อมูลเกียรติยศของเมมเบอร์คนดังกล่าวในทำเนียบแชมป์ค่ะ");
            }
        });

        function renderSpecialThanks(data) {
            const container = document.getElementById('thanks-content-box');
            const avatarImg = data.profileImage ? data.profileImage : 'https://lh3.googleusercontent.com/d/1rebp2F8vyP0nyvsEOFD9Nw2mPcRtVqtG=s400';
            const formatCookie = Number(data.totalCookie).toLocaleString();
            const thankYouMessage = data.message ? data.message : "";

            container.innerHTML = `
                <div class="avatar-wrapper">
                    <div class="avatar-frame">
                        <img class="member-avatar" src="${avatarImg}" alt="${data.name}" onerror="this.src='https://lh3.googleusercontent.com/d/1rebp2F8vyP0nyvsEOFD9Nw2mPcRtVqtG=s400'">
                    </div>
                    <i class="fa-solid fa-crown crown-icon"></i>
                </div>

                <h1 class="member-name">${data.name}</h1>
                
                <div class="period-badge">
                    <i class="fa-regular fa-calendar"></i> ${data.monthYear}
                </div>

                <div class="cookie-stats">
                    <i class="fa-solid fa-cookie"></i>
                    <span>${formatCookie} Cookies</span>
                </div>

                <div class="message-section">
                    <div class="message-title">
                        <i class="fa-solid fa-heart"></i> Message from Member
                    </div>
                    <div class="message-content">${thankYouMessage}</div>
                </div>

                <div class="artwork-section" id="artwork-wrapper">
                    <img class="artwork-img" id="celebration-art" src="${data.postImage || ''}" alt="Celebration Post" onerror="this.parentElement.style.display='none'">
                </div>
            `;

            // ตรวจสอบโพสต์รูปภาพเฉลิมฉลอง ถ้ามีลิงก์และระบุอยู่จริงค่อยแสดงผล
            if (data.postImage && data.postImage.trim() !== "") {
                document.getElementById('artwork-wrapper').style.display = "block";
            }
        }

        function showError(msg) {
            const container = document.getElementById('thanks-content-box');
            container.innerHTML = `
                <div class="error-state">
                    <i class="fa-solid fa-circle-xmark"></i>
                    <div>${msg}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
