.bottom-tab-bar {
  /* 👑 Layer 1: ชั้นโปร่งใสล่างสุด ขยายความสูงรวมเพิ่มขึ้นเป็น 110px ให้ Nav ดูสูงเด่น */
  height: calc(110px + env(safe-area-inset-bottom, 0px)); 
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  z-index: 999;
  background: transparent; 
  display: flex;
  justify-content: space-around;
  align-items: flex-end; /* ยึดฐานปุ่มจากขอบล่างสุด */
  padding-bottom: env(safe-area-inset-bottom, 0px);
  box-sizing: border-box;
}

.bottom-tab-bar::before {
  content: "";
  position: absolute;
  /* 👑 Layer 2: ขยับท็อปลงมาที่ 60px เพื่อให้เหลือเนื้อผ้าสีขาวหนา 50px (เกือบครึ่งหนึ่งของความสูงรวม 110px) */
  top: 60px; 
  left: 0;
  right: 0;
  bottom: 0;
  background: #ffffff; 
  border-top: 1px solid rgba(0, 0, 0, 0.04);
  border-radius: 28px 28px 0 0; /* เพิ่มความโค้งมนให้ดูละมุนรับกับบาร์ที่สูงขึ้น */
  box-shadow: 0 -12px 35px rgba(0, 0, 0, 0.08); /* เงาของตัวบาร์หลักยังคงไว้เพื่อให้บาร์ดูลอยแยกชั้น */
  z-index: 1;
}

.tab-item {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 20%;
  height: 50px; /* ปรับความสูงบล็อกกดให้บาลานซ์กับ Layer สีขาว */
  position: relative;
  z-index: 2; 
  text-decoration: none;
  color: #8e8e93; 
   
  /* 🚀 ดันไอคอนให้เลื่อนสูงขึ้นไปข้างบน 30px ทะลุเลเยอร์สีขาวขึ้นไปลอยเด่นอยู่บนชั้นโปร่งใสครึ่งตัวพอดี */
  transform: translateY(-30px); 
  transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* ปรับสปริงให้เด้งนุ่มนวลขึ้น */
}

/* 🌟 เอฟเฟกต์ตอนเอานิ้วจิ้มปุ่มปกติ */
.tab-item:active {
  transform: translateY(-30px) scale(0.85);
  opacity: 0.8;
}

/* 👑 ปุ่มสถานะ Active (หน้าปัจจุบัน): ดีดตัวลอยสูงเด่นขึ้นไปอีกที่ 45px กลายเป็นปุ่มฮีโร่ลอยเด่นสะดุดตา */
.tab-item.active {
  color: #ffb3c1; 
  transform: translateY(-45px); 
}
/* เอฟเฟกต์ตอนเอานิ้วจิ้มปุ่มที่ Active อยู่ */
.tab-item.active:active {
  transform: translateY(-45px) scale(0.85);
}

/* ------------------------------------------------------------- */
/* 🔥 ตั้งค่าให้ไอคอนและรูปภาพขยายใหญ่ขึ้นตอน Active เท่านั้น */
/* ------------------------------------------------------------- */

.tab-item.active i {
  font-size: 45px; /* 🚀 ขยายขนาดฟอนต์ไอคอนจากเดิม 34px เป็น 45px ให้ใหญ่เด่นสะใจ */
}

.tab-item.active img {
  width: 58px;    /* 🚀 ขยายขนาดรูปจากเดิม 44px เป็น 58px */
  height: 58px;
}

.tab-item.active #tab-profile-img {
  width: 50px !important;  /* 🚀 ขยายขนาดรูปโปรไฟล์จากเดิม 38px เป็น 50px */
  height: 50px !important;
}
/* ------------------------------------------------------------- */


/* ขยายขนาดไอคอน FontAwesome (✨ ลบเงาออกแล้ว) */
.tab-item i {
  font-size: 34px;
  /* ลบ filter: drop-shadow ออกเพื่อให้ปุ่มดูคลีนเรียบเนียน */
  transition: font-size 0.2s ease; 
}

/* ขยายขนาดรูปไอคอนแชมป์สั่งทำ (✨ ลบเงาออกแล้ว) */
.tab-item img {
  width: 44px;
  height: 44px;
  object-fit: contain;
  /* ลบ filter: drop-shadow ออกเพื่อให้ปุ่มดูคลีนเรียบเนียน */
  transition: width 0.2s ease, height 0.2s ease; 
}

/* ปรับแต่งวงกลมรูปโปรไฟล์ให้ลอยขึ้นมาอย่างสมดุล */
#tab-profile-img {
  width: 38px !important;
  height: 38px !important;
  border-radius: 50%;
  border: 2px solid #ffb3c1;
  box-sizing: border-box;
  transition: width 0.2s ease, height 0.2s ease; 
}

/* เพิ่มแอนิเมชันให้ตัวหนังสือค่อยๆ ปรากฏขึ้นตอนเปลี่ยนหน้า */
@keyframes fadeInText {
    from { opacity: 0; transform: translateX(-4px); }
    to { opacity: 1; transform: translateX(0); }
}

/* ดันเนื้อหาคอนเทนต์หลักขึ้นไป เพื่อไม่ให้ดีไซน์ที่ลอยอยู่ไปบังโพสต์ด้านหลัง */
body {

}
    /* จัดตำแหน่งจุดแดงให้อยู่มุมขวาบนของกระดิ่ง */
.icon-wrapper {

  let user = null;
  let activeCropper = null;

  // 📈 ฟังก์ชันย่อหน่วยตัวเลข (Compact Number Formatter) เช่น 1,500 -> 1.5K / 2,400,000 -> 2.4M
  function formatCompactNumber(number) {
    if (isNaN(number)) return '0';
    const num = Number(number);
    if (num >= 1e6) {
      return (num / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
    }
    if (num >= 1e3) {
      return (num / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
    }
    return num.toLocaleString();
  }

  // --- Session Storage ---
  function getUserSession() {
    const sessionStr = localStorage.getItem('bnl_session');
    if (!sessionStr) return null;
    try {
      const session = JSON.parse(sessionStr);
      if (new Date().getTime() > session.expiry) {
        localStorage.removeItem('bnl_session');
        return null;
      }
      return session.data;
    } catch (e) { return null; }
  }

  function saveUserSession(userData) {
    const expiry = new Date().getTime() + (90 * 24 * 60 * 60 * 1000); 
    localStorage.setItem('bnl_session', JSON.stringify({ data: userData, expiry: expiry }));
  }

  // --- อัปเดต UI หน้าจอ ---
  function updateProfileUI() {
    if (!user) {
      window.location.href = 'index.html';
      return;
    }

    document.getElementById('pf-name').innerText = user.name || user.username;
    document.getElementById('pf-role').innerText = (user.role || 'MEMBER').toUpperCase();
    
    const avatarEl = document.getElementById('pf-avatar');
    if (user.profile_img) {
      if (user.profile_img.includes('drive.google.com')) {
         avatarEl.src = `https://lh3.googleusercontent.com/u/0/d/$${user.profile_img.match(/[-\w]{25,}/)}`;
      } else {
         avatarEl.src = user.profile_img;
      }
      document.getElementById('pf-cover').src = avatarEl.src;
    }

    let totalOshi = 0;
    if (user.kamioshi && user.kamioshi.trim() !== "") totalOshi += 1;
    if (user.oshi && Array.isArray(user.oshi)) {
      const validOshis = user.oshi.filter(o => o && o.trim() !== "" && o.toLowerCase() !== (user.kamioshi || "").toLowerCase());
      totalOshi += validOshis.length;
    }
    document.getElementById('pf-oshi-count').innerText = formatCompactNumber(totalOshi);

    // นำฟังก์ชันย่อหน่วยตัวเลขมาใช้ครอบค่าสถิติกระเป๋าเงิน
    document.getElementById('pf-cookies').innerText = formatCompactNumber(user.cookie || 0);
    document.getElementById('pf-tokens').innerText = formatCompactNumber(user.token || 0);
    document.getElementById('pf-getokens').innerText = formatCompactNumber(user.geToken || 0);

    if (user.role && user.role.toLowerCase() === 'user') {
      document.getElementById('edit-name-btn').style.display = 'inline-flex';
    }
    // เพิ่มการจัดการปุ่มรับคุกกี้ตามสถานะ Member
    const btnClaim = document.getElementById('btn-claim-monthly');
    if (btnClaim) {
      if (isUserMember()) {
        btnClaim.onclick = () => Swal.fire('ขออภัย','เมมเบอร์รับคุกกี้ฟรีไม่ได้ค่ะ','info');
        btnClaim.classList.add('btn-locked');
      } else {
        btnClaim.onclick = claimMonthly;
        btnClaim.classList.remove('btn-locked');
      }
    }

    // อัปเดตรูปโปรไฟล์ตรง Tab Bar ด้านล่าง
    const tabProfileImg = document.getElementById('tab-profile-img');
    if (tabProfileImg) {
      tabProfileImg.src = document.getElementById('pf-avatar').src; // ใช้รูปที่แปลงแล้วจาก pf-avatar ได้เลย
    }
  }

  async function syncUserData() {
    if (!user) return;
    try {
      const resp = await fetch(`${scriptURL}?action=getUserInfo&username=${encodeURIComponent(user.username)}&_=${Date.now()}`);
      const res = await resp.json();
      if (res.status === "success") {
        user = res.data; 
        saveUserSession(user); 
        updateProfileUI(); 
      }
    } catch (e) { console.error("Sync Error:", e); }
  }

  // --- แก้ไขชื่อเล่น ---
  async function updateDisplayName() {
    if (!user || user.role.toLowerCase() !== "user") return;

    const { value: newName } = await Swal.fire({
      title: 'แก้ไขชื่อของคุณ',
      input: 'text',
      inputLabel: 'กรอกชื่อใหม่ที่ต้องการ',
      inputValue: user.name,
      showCancelButton: true,
      confirmButtonColor: '#ff85a2',
      inputValidator: (value) => {
        if (!value) return 'กรุณากรอกชื่อด้วยนะคะ'
        if (value.length > 20) return 'ชื่อยาวเกินไปหน่อยค่ะ'
      }
    });

    if (newName) {
      Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const response = await fetch(scriptURL, {
          method: 'POST',
          body: JSON.stringify({ action: 'updateName', username: user.username, newName: newName })
        });
        const res = await response.json();
        if (res.status === "success") {
          user.name = newName; 
          saveUserSession(user); 
          updateProfileUI(); 
          Swal.fire('สำเร็จ!', 'เปลี่ยนชื่อเรียบร้อยแล้วค่ะ', 'success');
        }
      } catch (error) { Swal.fire('Error', 'ไม่สามารถเปลี่ยนชื่อได้ในขณะนี้', 'error'); }
    }
  }

  // ✂️ --- ระบบเลือกภาพและ Crop อัจฉริยะก่อนยืนยัน ---
  function handleProfileImageSelect(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      // เปิด SweetAlert2 เพื่อให้ผู้ใช้จัดตำแหน่งและครอบตัดรูปภาพแบบ 1:1
      Swal.fire({
        title: 'ปรับตำแหน่งรูปโปรไฟล์',
        html: `
          <div class="cropper-container-box">
            <img id="cropper-target-img" src="${e.target.result}">
          </div>
        `,
        showCancelButton: true,
        confirmButtonColor: '#ff85a2',
        confirmButtonText: 'ยืนยันรูปภาพนี้',
        cancelButtonText: 'ยกเลิก',
        allowOutsideClick: false,
        didOpen: () => {
          const imageElement = document.getElementById('cropper-target-img');
          // เรียกใช้งานสถาปัตยกรรม Cropper.js ล็อคสัดส่วนวงกลม/จัตุรัส 1 ต่อ 1
          activeCropper = new Cropper(imageElement, {
            aspectRatio: 1,
            viewMode: 1,
            autoCropArea: 1,
            movable: true,
            zoomable: true,
            rotatable: false,
            scalable: false
          });
        },
        willClose: () => {
          if (activeCropper) {
            activeCropper.destroy();
            activeCropper = null;
          }
        },
        preConfirm: () => {
          // ดึงข้อมูล Canvas ที่ถูกตัด และแปลงค่าความละเอียดเป็น Blob (ขนาดกำลังดีไม่หนักโฮสต์)
          return new Promise((resolve) => {
            activeCropper.getCroppedCanvas({
              width: 400,
              height: 400
            }).toBlob((blob) => {
              resolve(blob);
            }, 'image/jpeg', 0.85);
          });
        }
      }).then(async (result) => {
        if (result.isConfirmed && result.value) {
          const croppedBlob = result.value;
          await proceedToUploadProfile(croppedBlob);
        }
        // ล้างค่าอินพุตเพื่อให้เลือกไฟล์เดิมซ้ำได้ในครั้งต่อไป
        document.getElementById('profile-upload').value = '';
      });
    };
    reader.readAsDataURL(file);
  }
  
  // เช็กว่าเป็น Member หรือไม่
  function isUserMember() {
    return user && user.role && user.role.toUpperCase().trim() === 'MEMBER';
  }

  // --- ฟังก์ชันรับคุกกี้ ---
  async function claimMonthly() {
    const btnClaim = document.getElementById('btn-claim-monthly');
    if (btnClaim && btnClaim.disabled) return; 
    if (btnClaim) btnClaim.disabled = true;

    Swal.fire({ title: 'กำลังตรวจสอบสิทธิ์...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
    try {
      const resp = await fetch(scriptURL, {
        method: 'POST',
        body: JSON.stringify({ action: 'claimMonthlyCookie', username: user.username })
      }); 
      const res = await resp.json();
      if (res.status === "success") { 
        await syncUserData(); 
        Swal.fire('สำเร็จ!', res.message, 'success'); 
      } else { 
        Swal.fire('ขออภัย', res.message, 'info'); 
        if (btnClaim) btnClaim.disabled = false; 
      }
    } catch (e) { 
      Swal.fire('Error', 'ระบบขัดข้อง', 'error'); 
      if (btnClaim) btnClaim.disabled = false; 
    }
  }

  // --- ฟังก์ชัน Redeem Code ---

          method: 'POST',

  // --- ฟังก์ชันสร้างการ์ด Membership ---
  function showMembershipCardModal() {
    if (!user) return;
    Swal.fire({
      title: 'Loading...',
      html: '<div style="font-size: 14px; color: #666; margin-top: 10px;">กรุณารอสักครู่</div>',
      allowOutsideClick: false,
      showConfirmButton: false,
      didOpen: () => {
        Swal.showLoading();
        const bgImg = new Image();
        bgImg.crossOrigin = "anonymous"; 
        bgImg.src = 'https://lh3.googleusercontent.com/d/1iL8ovg2E52QWwiR8Z9OdAc7mQ3Zv5PWU=s1000'; 

        bgImg.onload = function() {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = bgImg.width || 1200;
          canvas.height = bgImg.height || 675;

          const radius = canvas.width * 0.04; 
          ctx.beginPath();
          ctx.moveTo(radius, 0); ctx.lineTo(canvas.width - radius, 0); ctx.quadraticCurveTo(canvas.width, 0, canvas.width, radius);
          ctx.lineTo(canvas.width, canvas.height - radius); ctx.quadraticCurveTo(canvas.width, canvas.height, canvas.width - radius, canvas.height);
          ctx.lineTo(radius, canvas.height); ctx.quadraticCurveTo(0, canvas.height, 0, canvas.height - radius);
          ctx.lineTo(0, radius); ctx.quadraticCurveTo(0, 0, radius, 0);
          ctx.closePath(); ctx.clip(); 

          ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
          ctx.textBaseline = 'middle'; 

          const textX = canvas.width * 0.08; 
          const line1_Y = canvas.height * 0.80; 
          const line2_Y = canvas.height * 0.87; 

          // ชื่อ
          ctx.textAlign = 'left';
          ctx.fillStyle = '#ffffff'; 
          ctx.font = 'bold ' + Math.floor(canvas.height * 0.055) + 'px "Kanit", "Prompt", sans-serif';
          ctx.fillText(user.name, textX, line1_Y);

          // Role
          const nameWidth = ctx.measureText(user.name).width; 
          const roleText = (user.role || 'MEMBER').toUpperCase();
          ctx.font = '600 ' + Math.floor(canvas.height * 0.035) + 'px "Kanit", sans-serif';
          const roleWidth = ctx.measureText(roleText).width;
          
          const badgeX = textX + nameWidth + (canvas.width * 0.02); 
          const badgePadX = canvas.width * 0.015;
          const badgePadY = canvas.height * 0.025;

          ctx.fillStyle = 'rgba(255, 255, 255, 0.25)';
          ctx.beginPath();
          ctx.roundRect(badgeX, line1_Y - badgePadY, roleWidth + (badgePadX * 2), badgePadY * 2, canvas.height * 0.02);
          ctx.fill();

          ctx.fillStyle = '#ffffff';
          ctx.fillText(roleText, badgeX + badgePadX, line1_Y);

          // Username Masking
          ctx.textAlign = 'left';
          ctx.font = '500 ' + Math.floor(canvas.height * 0.045) + 'px "Quicksand", "Kanit", sans-serif';
          let rawUsername = user.username || "blm48_member";
          let maskedUsername = rawUsername;
          if (rawUsername.length > 4) {
            maskedUsername = rawUsername.substring(0, 2) + "7x48x" + rawUsername.substring(rawUsername.length - 2);
          } else if (rawUsername.length > 2) {
            maskedUsername = rawUsername.substring(0, 1) + "xx" + rawUsername.substring(rawUsername.length - 1);
          }
          ctx.fillText("@" + maskedUsername, textX, line2_Y);

          // Status
          ctx.textAlign = 'right';
          const statusX = canvas.width - (canvas.width * 0.08); 
          const statusText = "Status: Active";
          ctx.font = '600 ' + Math.floor(canvas.height * 0.04) + 'px "Quicksand", "Kanit", sans-serif';
          const statusWidth = ctx.measureText(statusText).width;
          
          ctx.fillStyle = '#ffffff';
          ctx.fillText(statusText, statusX, line2_Y);

          const dotRadius = canvas.height * 0.012;
          ctx.fillStyle = '#55efc4'; 
          ctx.beginPath();
          ctx.arc(statusX - statusWidth - (canvas.width * 0.015), line2_Y, dotRadius, 0, Math.PI * 2);
          ctx.fill();

          const cardDataUrl = canvas.toDataURL('image/png');

          Swal.fire({
            title: 'BLM48 Official Membership',
            html: `
              <div style="font-family: 'Kanit', sans-serif; display: flex; flex-direction: column; align-items: center; gap: 15px;">
                <img src="${cardDataUrl}" style="width: 100%; max-width: 420px; box-shadow: 0 8px 26px rgba(255,133,162,0.25);">
                
               <a href="${cardDataUrl}" download="BLM48_Member_${user.username || 'card'}.png" style="
                display: inline-flex; align-items: center; gap: 8px; padding: 12px 32px;
                background: linear-gradient(135deg, #e0b953 0%, #fff5c3 45%, #fff5c3 55%, #cba034 100%);
                color: #5e470c; border: 1px solid #fce899; text-decoration: none; border-radius: 25px;
                font-weight: bold; font-size: 15px; box-shadow: 0 4px 12px rgba(224, 185, 83, 0.4); transition: all 0.2s;
              " onclick="Swal.close();">
                <i class="fas fa-download"></i> Save Card
              </a>
              </div>
            `,
            showConfirmButton: false, 
            showCloseButton: true,
            background: '#ffffff',
            didOpen: () => {
              const popup = Swal.getPopup();
              if (popup) popup.style.borderRadius = '28px';
            }
          });
        };
        bgImg.onerror = function() {
          Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถค้นหาไฟล์ดีไซน์หลักได้สำเร็จ กรุณาตรวจสอบลิงก์รูปภาพอีกครั้งค่ะ', 'error');
        };
      }
    });
  }
  
function loadChampThemeSubPage() {
  const CACHE_KEY = "bnl_winner_theme_cache";
  
  // 1. ดึงแคชมาแสดงผลทันที (ลดการกระพริบของไอคอน)
  const cachedDataStr = localStorage.getItem(CACHE_KEY);
  if (cachedDataStr) {
    try { 
        const cachedObj = JSON.parse(cachedDataStr);
        const champOnly = cachedObj.champ ? cachedObj.champ : cachedObj;
        applySubPageTheme(champOnly); 
    } catch (e) {}
  }

  const finalURL = typeof scriptURL !== 'undefined' ? scriptURL : (typeof SCRIPT_URL !== 'undefined' ? SCRIPT_URL : '');
  if (!finalURL) return;

  // 2. ตรวจสอบอัปเดตจากเซิร์ฟเวอร์
  fetch(`${finalURL}?action=getWinnerTheme`)
    .then(response => response.json())
    .then(newData => {
      const newChampData = newData.champ ? newData.champ : newData;
      if (newChampData && newChampData.name) {
        let cacheChampStr = "";
        if (cachedDataStr) {
            try {
                const parsed = JSON.parse(cachedDataStr);
                cacheChampStr = JSON.stringify(parsed.champ ? parsed.champ : parsed);
            } catch(e) {}
        }
        // อัปเดตเมื่อข้อมูลมีการเปลี่ยนแปลงเท่านั้น
        if (cacheChampStr !== JSON.stringify(newChampData)) {
          localStorage.setItem(CACHE_KEY, JSON.stringify(newData)); 
          applySubPageTheme(newChampData); 
        }
      }
    }).catch(e => console.error(e));
}

function applySubPageTheme(champData) {
  if (!champData) return;
  updateSubPageIcon('nav-home', 'nav-home-fallback', champData.homeIcon);
  updateSubPageIcon('nav-kami', 'nav-kami-fallback', champData.kamiIcon);
  updateSubPageIcon('nav-cart', 'nav-cart-fallback', champData.cartIcon);
  updateSubPageIcon('nav-noti', 'nav-noti-fallback', champData.notiIcon);
}

function updateSubPageIcon(imgId, fallbackId, iconUrl) {
  const imgElement = document.getElementById(imgId);
  const fallbackElement = document.getElementById(fallbackId);
  if (imgElement && fallbackElement) {
    if (iconUrl && iconUrl.trim() !== "") {
      imgElement.src = iconUrl;
      imgElement.style.display = 'block';
      fallbackElement.style.display = 'none';
    } else {
      imgElement.style.display = 'none';
      fallbackElement.style.display = 'block';
    }
  }
}

  // --- ส่งรูปเข้าคลัง ImgBB & อัปเดต Google Sheets ---
  async function proceedToUploadProfile(blobFile) {
    Swal.fire({
      title: 'กำลังอัปเดตระบบ...',
      text: 'กำลังนำรูปภาพโปรไฟล์ใหม่ขึ้นระบบฐานข้อมูล',
      allowOutsideClick: false,
      didOpen: () => { Swal.showLoading(); }
    });

    try {
      // 1. ส่งขึ้นเซิร์ฟเวอร์ฝากรูปผ่านคีย์ API เดิมของคุณเอ็มมี่
      const apiKey = '80ad839da07973eeefee57af54fc9f6d';
      const formData = new FormData();
      formData.append('image', blobFile, 'profile.jpg');

      const imgbbResp = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
        method: 'POST',
        body: formData
      });
      const imgbbData = await imgbbResp.json();

      if (!imgbbData.success) throw new Error("ImgBB อัปโหลดล้มเหลว");
      const finalImageUrl = imgbbData.data.url;

      // 2. ซิงค์ส่งลิงก์ URL รูปภาพใหม่ตรงเข้าคอลัมน์กูเกิ้ลชีต
      await fetch(scriptURL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'updateProfileImage',
          username: user.username,
          imageUrl: finalImageUrl
        })
      });

      // 3. เรียกดึงข้อมูลเวอร์ชันล่าสุดมาโชว์บนหน้าจอทันที
      await syncUserData();
      Swal.fire('สำเร็จแล้ว!', 'เปลี่ยนรูปภาพโปรไฟล์ของคุณเรียบร้อยงับ', 'success');

    } catch (error) {
      console.error(error);
      Swal.fire('เกิดข้อผิดพลาด!', 'ไม่สามารถบันทึกรูปภาพได้ กรุณาลองใหม่อีกครั้งนะงับ', 'error');
    }
  }

  function confirmLogout() {
    Swal.fire({
      title: 'ต้องการออกจากระบบใช่ไหมคะ?',
      icon: 'question',
      showCancelButton: true,
      confirmButtonColor: '#ff85a2',
      confirmButtonText: 'ตกลง',
      cancelButtonText: 'ยกเลิก'
    }).then((result) => {
      if (result.isConfirmed) {
        localStorage.removeItem('bnl_session');
        window.location.href = 'login.html';
      }
    });
  }

  window.addEventListener('DOMContentLoaded', () => {
    user = getUserSession();
    updateProfileUI();
    loadChampThemeSubPage();
    setTimeout(() => {
      const loader = document.getElementById('app-loading-screen');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
      }
    }, 500);

    if (user) syncUserData();
  });
  
  

  function checkNotificationBadge() {
  const hasNewNoti = localStorage.getItem("blm48_has_new_noti");
  const badgeElement = document.getElementById("global-noti-badge");
  
  if (badgeElement) {
    if (hasNewNoti === "true") {
      badgeElement.style.display = "block"; // 🔴 มีแจ้งเตือนใหม่ -> แสดงจุดแดง
    } else {
      badgeElement.style.display = "none";  // ⚪ ไม่มีแจ้งเตือน -> ซ่อนไปเลย
    }
  }
}

// สั่งให้ระบบเช็กสถานะจุดแจ้งเตือนทุกครั้งที่เปิดหน้านี้ขึ้นมา
document.addEventListener("DOMContentLoaded", checkNotificationBadge);
