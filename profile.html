<script>
  const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec';
  let user = null;
  let activeCropper = null;

  // 📈 ฟังก์ชันย่อหน่วยตัวเลข (Compact Number Formatter) เช่น 1,500 -> 1.5K / 2,400,000 -> 2.4M
  function formatCompactNumber(number) {
    if (isNaN(number)) return '0';
    const num = Number(number);
    if (num >= 1e6) {
      return (num / 1e6).toFixed(1).replace(/\.0$/, '') + 'M';
    }
    if (num >= 1e3) {
      return (num / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
    }
    return num.toLocaleString();
  }

  // --- Session Storage ---
  function getUserSession() {
    const sessionStr = localStorage.getItem('bnl_session');
    if (!sessionStr) return null;
    try {
      const session = JSON.parse(sessionStr);
      if (new Date().getTime() > session.expiry) {
        localStorage.removeItem('bnl_session');
        return null;
      }
      return session.data;
    } catch (e) { return null; }
  }

  function saveUserSession(userData) {
    const expiry = new Date().getTime() + (90 * 24 * 60 * 60 * 1000); 
    localStorage.setItem('bnl_session', JSON.stringify({ data: userData, expiry: expiry }));
  }

  // --- อัปเดต UI หน้าจอ ---
  function updateProfileUI() {
    if (!user) {
      window.location.href = 'index.html';
      return;
    }

    document.getElementById('pf-name').innerText = user.name || user.username;
    document.getElementById('pf-role').innerText = (user.role || 'MEMBER').toUpperCase();
    
    const avatarEl = document.getElementById('pf-avatar');
    if (user.profile_img) {
      if (user.profile_img.includes('drive.google.com')) {
         avatarEl.src = `https://lh3.googleusercontent.com/u/0/d/$${user.profile_img.match(/[-\w]{25,}/)}`;
      } else {
         avatarEl.src = user.profile_img;
      }
      document.getElementById('pf-cover').src = avatarEl.src;
    }

    let totalOshi = 0;
    if (user.kamioshi && user.kamioshi.trim() !== "") totalOshi += 1;
    if (user.oshi && Array.isArray(user.oshi)) {
      const validOshis = user.oshi.filter(o => o && o.trim() !== "" && o.toLowerCase() !== (user.kamioshi || "").toLowerCase());
      totalOshi += validOshis.length;
    }
    document.getElementById('pf-oshi-count').innerText = formatCompactNumber(totalOshi);

    // นำฟังก์ชันย่อหน่วยตัวเลขมาใช้ครอบค่าสถิติกระเป๋าเงิน
    document.getElementById('pf-cookies').innerText = formatCompactNumber(user.cookie || 0);
    document.getElementById('pf-tokens').innerText = formatCompactNumber(user.token || 0);
    document.getElementById('pf-getokens').innerText = formatCompactNumber(user.geToken || 0);

    if (user.role && user.role.toLowerCase() === 'user') {
      document.getElementById('edit-name-btn').style.display = 'inline-flex';
    }
  }

  async function syncUserData() {
    if (!user) return;
    try {
      const resp = await fetch(`${scriptURL}?action=getUserInfo&username=${encodeURIComponent(user.username)}&_=${Date.now()}`);
      const res = await resp.json();
      if (res.status === "success") {
        user = res.data; 
        saveUserSession(user); 
        updateProfileUI(); 
      }
    } catch (e) { console.error("Sync Error:", e); }
  }

  // --- แก้ไขชื่อเล่น ---
  async function updateDisplayName() {
    if (!user || user.role.toLowerCase() !== "user") return;

    const { value: newName } = await Swal.fire({
      title: 'แก้ไขชื่อของคุณ',
      input: 'text',
      inputLabel: 'กรอกชื่อใหม่ที่ต้องการ',
      inputValue: user.name,
      showCancelButton: true,
      confirmButtonColor: '#ff85a2',
      inputValidator: (value) => {
        if (!value) return 'กรุณากรอกชื่อด้วยนะคะ'
        if (value.length > 20) return 'ชื่อยาวเกินไปหน่อยค่ะ'
      }
    });

    if (newName) {
      Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      try {
        const response = await fetch(scriptURL, {
          method: 'POST',
          body: JSON.stringify({ action: 'updateName', username: user.username, newName: newName })
        });
        const res = await response.json();
        if (res.status === "success") {
          user.name = newName; 
          saveUserSession(user); 
          updateProfileUI(); 
          Swal.fire('สำเร็จ!', 'เปลี่ยนชื่อเรียบร้อยแล้วค่ะ', 'success');
        }
      } catch (error) { Swal.fire('Error', 'ไม่สามารถเปลี่ยนชื่อได้ในขณะนี้', 'error'); }
    }
  }

  // ✂️ --- ระบบเลือกภาพและ Crop อัจฉริยะก่อนยืนยัน ---
  function handleProfileImageSelect(event) {
    const file = event.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      // เปิด SweetAlert2 เพื่อให้ผู้ใช้จัดตำแหน่งและครอบตัดรูปภาพแบบ 1:1
      Swal.fire({
        title: 'ปรับตำแหน่งรูปโปรไฟล์',
        html: `
          <div class="cropper-container-box">
            <img id="cropper-target-img" src="${e.target.result}">
          </div>
        `,
        showCancelButton: true,
        confirmButtonColor: '#ff85a2',
        confirmButtonText: 'ยืนยันรูปภาพนี้',
        cancelButtonText: 'ยกเลิก',
        allowOutsideClick: false,
        didOpen: () => {
          const imageElement = document.getElementById('cropper-target-img');
          // เรียกใช้งานสถาปัตยกรรม Cropper.js ล็อคสัดส่วนวงกลม/จัตุรัส 1 ต่อ 1
          activeCropper = new Cropper(imageElement, {
            aspectRatio: 1,
            viewMode: 1,
            autoCropArea: 1,
            movable: true,
            zoomable: true,
            rotatable: false,
            scalable: false
          });
        },
        willClose: () => {
          if (activeCropper) {
            activeCropper.destroy();
            activeCropper = null;
          }
        },
        preConfirm: () => {
          // ดึงข้อมูล Canvas ที่ถูกตัด และแปลงค่าความละเอียดเป็น Blob (ขนาดกำลังดีไม่หนักโฮสต์)
          return new Promise((resolve) => {
            activeCropper.getCroppedCanvas({
              width: 400,
              height: 400
            }).toBlob((blob) => {
              resolve(blob);
            }, 'image/jpeg', 0.85);
          });
        }
      }).then(async (result) => {
        if (result.isConfirmed && result.value) {
          const croppedBlob = result.value;
          await proceedToUploadProfile(croppedBlob);
        }
        // ล้างค่าอินพุตเพื่อให้เลือกไฟล์เดิมซ้ำได้ในครั้งต่อไป
        document.getElementById('profile-upload').value = '';
      });
    };
    reader.readAsDataURL(file);
  }

  // --- ส่งรูปเข้าคลัง ImgBB & อัปเดต Google Sheets ---
  async function proceedToUploadProfile(blobFile) {
    Swal.fire({
      title: 'กำลังอัปเดตระบบ...',
      text: 'กำลังนำรูปภาพโปรไฟล์ใหม่ขึ้นระบบฐานข้อมูล',
      allowOutsideClick: false,
      didOpen: () => { Swal.showLoading(); }
    });

    try {
      // 1. ส่งขึ้นเซิร์ฟเวอร์ฝากรูปผ่านคีย์ API เดิมของคุณเอ็มมี่
      const apiKey = '80ad839da07973eeefee57af54fc9f6d';
      const formData = new FormData();
      formData.append('image', blobFile, 'profile.jpg');

      const imgbbResp = await fetch(`https://api.imgbb.com/1/upload?key=${apiKey}`, {
        method: 'POST',
        body: formData
      });
      const imgbbData = await imgbbResp.json();

      if (!imgbbData.success) throw new Error("ImgBB อัปโหลดล้มเหลว");
      const finalImageUrl = imgbbData.data.url;

      // 2. ซิงค์ส่งลิงก์ URL รูปภาพใหม่ตรงเข้าคอลัมน์กูเกิ้ลชีต
      await fetch(scriptURL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'updateProfileImage',
          username: user.username,
          imageUrl: finalImageUrl
        })
      });

      // 3. เรียกดึงข้อมูลเวอร์ชันล่าสุดมาโชว์บนหน้าจอทันที
      await syncUserData();
      Swal.fire('สำเร็จแล้ว!', 'เปลี่ยนรูปภาพโปรไฟล์ของคุณเรียบร้อยงับ', 'success');

    } catch (error) {
      console.error(error);
      Swal.fire('เกิดข้อผิดพลาด!', 'ไม่สามารถบันทึกรูปภาพได้ กรุณาลองใหม่อีกครั้งนะงับ', 'error');
    }
  }

  function confirmLogout() {
    Swal.fire({
      title: 'ต้องการออกจากระบบใช่ไหมคะ?',
      icon: 'question',
      showCancelButton: true,
      confirmButtonColor: '#ff85a2',
      confirmButtonText: 'ตกลง',
      cancelButtonText: 'ยกเลิก'
    }).then((result) => {
      if (result.isConfirmed) {
        localStorage.removeItem('bnl_session');
        window.location.href = 'index.html';
      }
    });
  }

  window.addEventListener('DOMContentLoaded', () => {
    user = getUserSession();
    updateProfileUI();
    
    setTimeout(() => {
      const loader = document.getElementById('app-loading-screen');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(() => loader.style.display = 'none', 500);
      }
    }, 500);

    if (user) syncUserData();
  });
</script>
</body>
</html>
