<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notifications | BLM48</title>
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
  <meta name="theme-color" content="#ffc0cb">
  
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { 
      font-family: 'Quicksand', 'Kanit', sans-serif;  
      background-color: #fff0f5; 
      padding: 20px; 
      margin: 0;
      padding-bottom: 110px; /* Space for floating tab-bar */
    }
    .noti-container { 
      max-width: 500px; 
      margin: 20px auto; 
      background: white; 
      padding: 24px; 
      border-radius: 24px; 
      box-shadow: 0 8px 24px rgba(255, 133, 162, 0.12); 
    }
    .header {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ff85a2;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px dashed #fff0f3;
      padding-bottom: 12px;
    }

    /* 🌐 Sheets Sync Status Bar */
    .sync-status-bar {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #fafafa;
      padding: 6px 12px;
      border-radius: 10px;
    }
    
    /* ✍️ Input Panel (Visible ONLY for Admin/CEO) */
    .manual-input-box {
      background: #fff5f7;
      border: 1px dashed #ffccd5;
      padding: 16px;
      border-radius: 18px;
      margin-bottom: 24px;
      display: none; /* Default hidden until role is verified */
      flex-direction: column;
      gap: 12px;
    }
    .manual-input-box h3 {
      margin: 0;
      font-size: 0.95rem;
      color: #ff85a2;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .user-badge-preview {
      font-size: 0.8rem;
      color: #888;
      background: rgba(255,255,255,0.7);
      padding: 6px 12px;
      border-radius: 8px;
      display: inline-block;
    }
    .manual-input-box input {
      font-family: 'Quicksand', 'Kanit', sans-serif;
      padding: 12px 14px;
      border: 1px solid #ffe3e8;
      border-radius: 12px;
      font-size: 0.85rem;
      color: #555;
      outline: none;
      transition: all 0.2s;
    }
    .manual-input-box input:focus {
      border-color: #ff85a2;
      background: #fff;
    }
    .btn-group {
      display: flex;
      gap: 8px;
    }
    .btn-submit {
      flex: 2;
      font-family: 'Quicksand', 'Kanit', sans-serif;
      background: #ff85a2;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .btn-submit:hover { background: #ff6b8b; }
    .btn-clear {
      flex: 1;
      font-family: 'Quicksand', 'Kanit', sans-serif;
      background: #e0e0e0;
      color: #666;
      border: none;
      padding: 10px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-clear:hover { background: #d0d0d0; }

    /* Notification Cards Feed 🌸 */
    .noti-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .noti-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      background: #fffbfb;
      border: 1px solid #fff0f3;
      border-radius: 16px;
    }
    .noti-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ff85a2;
    }
    .noti-content {
      flex: 1;
    }
    .noti-text {
      font-size: 0.9rem;
      color: #444;
      margin: 0 0 4px 0;
      line-height: 1.4;
    }
    .noti-text strong {
      color: #ff85a2;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    
    /* 🔹 Instagram Verified Badge */
    .verified-icon {
      color: #0095f6;
      font-size: 0.85rem;
    }
    
    .noti-time {
      font-size: 0.75rem;
      color: #aaa;
    }
    .empty-noti {
      text-align: center;
      padding: 40px 20px;
      color: #ffb3c1;
    }
    .empty-noti i {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    /* Floating Tab-bar 🎀 */
    .bottom-tab-bar {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 440px;
        height: 68px;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        display: flex;
        justify-content: space-around;
        align-items: center;
        border-radius: 35px;
        border: 1px solid rgba(255, 204, 213, 0.5);
        box-shadow: 0 10px 30px rgba(255, 133, 162, 0.15);
        z-index: 1000;
        padding: 0 10px;
        box-sizing: border-box;
    }
    .tab-item {
        display: flex;
        align-items: center;
        justify-content: center;
        color: #ffb3c1;
        text-decoration: none;
        padding: 10px 14px;
        border-radius: 25px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tab-item i { font-size: 1.25rem; }
    .tab-item.active { background-color: #fff0f3; color: #ff85a2; }
  </style>
</head>
<body>

<div class="noti-container">
  <div class="header">
    <i class="fa-solid fa-bell"></i> Notifications
  </div>

  <div class="sync-status-bar" id="sync-status">
    <i class="fa-solid fa-spinner fa-spin"></i> Authorizing profile...
  </div>
  
  <div class="manual-input-box" id="input-panel">
    <h3><i class="fa-solid fa-bullhorn"></i> Broadcast New Notification</h3>
    <div class="user-badge-preview" id="user-preview">
      Verifying credentials...
    </div>
    <input type="text" id="input-action" placeholder="Type your notification message here...">
    <div class="btn-group">
      <button class="btn-submit" id="btn-add"><i class="fa-solid fa-paper-plane"></i> Send</button>
      <button class="btn-clear" id="btn-reset"><i class="fa-solid fa-trash"></i> Clear All</button>
    </div>
  </div>
  
  <div id="noti-list" class="noti-list"></div>
</div>

<div class="bottom-tab-bar">
  <a href="index.html" class="tab-item"><i class="fa-solid fa-house"></i></a>
  <a href="kami.html" class="tab-item"><i class="fa-solid fa-star"></i></a>
  <a href="shop.html" class="tab-item"><i class="fa-solid fa-bag-shopping"></i></a>
  <a href="notification.html" class="tab-item active"><i class="fa-solid fa-bell"></i></a>
  <a href="member.html" class="tab-item"><i class="fa-solid fa-user"></i></a>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    const notiListContainer = document.getElementById("noti-list");
    const inputPanel = document.getElementById("input-panel");
    const userPreview = document.getElementById("user-preview");
    const syncStatus = document.getElementById("sync-status");
    const btnAdd = document.getElementById("btn-add");
    const btnReset = document.getElementById("btn-reset");

    const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec';
    const activeUsername = localStorage.getItem("activeUsername") || localStorage.getItem("username") || "Guest";

    // 🌐 Sync & Validate Role from Google Sheet
    async function syncUserProfileFromSheet() {
      try {
        const response = await fetch(`${scriptURL}?action=getProfile&username=${encodeURIComponent(activeUsername)}`);
        const sheetData = await response.json();
        
        if (sheetData.status === "success" || sheetData.role) {
          // ดึงและเซฟค่าข้อมูลตามชื่อคอลัมน์ในตาราง users (name, profile, role)
          const rawRole = sheetData.role ? sheetData.role.toString().trim() : "User";
          localStorage.setItem("role", rawRole);
          
          if(sheetData.name) localStorage.setItem("name", sheetData.name);
          if(sheetData.profile) localStorage.setItem("profile", sheetData.profile);
          
          syncStatus.innerHTML = `<i class="fa-solid fa-shield-halved" style="color: #2ec4b6;"></i> Role Verified via Google Sheets!`;
        } else {
          localStorage.setItem("role", "User");
          syncStatus.innerHTML = `<i class="fa-solid fa-user-lock"></i> Standard User Mode Active.`;
        }
      } catch (error) {
        console.error("❌ Database Connection Interrupted:", error);
        syncStatus.innerHTML = `<i class="fa-solid fa-wifi-slash" style="color: #e63946;"></i> Live authorization offline.`;
      }

      checkRolePermission();
      renderUI(); // สั่งเรนเดอร์ใหม่หลังเช็คสิทธิ์เสร็จเพื่ออัปเดตตัวกรองประกาศงับ ✨
    }

    // 🔒 ระบบตรวจสอบสิทธิ์ (Case-Insensitive 🛠️)
    function checkRolePermission() {
      const rawRole = localStorage.getItem("role") || "User";
      const currentRoleCleaned = rawRole.trim().toUpperCase(); 
      const currentName = localStorage.getItem("name") || activeUsername;

      const isAuthorized = (currentRoleCleaned === "ADMIN" || currentRoleCleaned === "CEO");
      const hasVerified = isAuthorized ? `<i class="fa-solid fa-circle-check verified-icon"></i>` : "";
      
      userPreview.innerHTML = `Posting as: <strong>${currentName} ${hasVerified}</strong> (${rawRole})`;

      if (isAuthorized) {
        inputPanel.style.display = "flex";
      } else {
        inputPanel.style.display = "none";
      }
    }

    let myNotifications = JSON.parse(localStorage.getItem("manual_notis")) || [
      {
        writer: "BLM48",
        action: "welcomes everyone to the brand new notification service center! 🌸",
        avatar: "https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32",
        role: "Admin",
        timestamp: Date.now()
      }
    ];

    function renderUI() {
      const currentRoleCleaned = (localStorage.getItem("role") || "User").trim().toUpperCase();
      
      if (myNotifications.length > 0) {
        notiListContainer.innerHTML = "";
        let sortedList = [...myNotifications].sort((a, b) => b.timestamp - a.timestamp);

        // 🛡️ [เงื่อนไขหลัก] หากเป็นทั่วไป (USER/MEMBER) ให้กรองเห็นเฉพาะโพสต์จาก ADMIN และ CEO เท่านั้นงับ
        if (currentRoleCleaned === "USER" || currentRoleCleaned === "MEMBER") {
          sortedList = sortedList.filter(noti => {
            const notiRoleCleaned = noti.role ? noti.role.toString().trim().toUpperCase() : "USER";
            return notiRoleCleaned === "ADMIN" || notiRoleCleaned === "CEO";
          });
        }

        if (sortedList.length > 0) {
          sortedList.forEach(noti => {
            const notiDate = new Date(noti.timestamp);
            const timeString = notiDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });

            const notiRoleCleaned = noti.role ? noti.role.toString().trim().toUpperCase() : "USER";
            const showVerified = (notiRoleCleaned === "ADMIN" || notiRoleCleaned === "CEO") 
              ? `<i class="fa-solid fa-circle-check verified-icon" title="Verified Professional"></i>` 
              : "";

            const item = document.createElement("div");
            item.className = "noti-item"; 
            item.innerHTML = `
              <img src="${noti.avatar || 'https://via.placeholder.com/150/ff4d6d/ffffff?text=BLM48'}" class="noti-avatar" alt="avatar">
              <div class="noti-content">
                <p class="noti-text"><strong>${noti.writer}${showVerified}</strong> ${noti.action}</p>
                <div class="noti-time">${timeString}</div>
              </div>
            `;
            notiListContainer.appendChild(item);
          });
        } else {
          showEmptyNoti();
        }
      } else {
        showEmptyNoti();
      }
    }

    function showEmptyNoti() {
      notiListContainer.innerHTML = `
        <div class="empty-noti">
          <i class="fa-regular fa-bell-slashed"></i>
          <p>No new notifications at the moment~ ☁️</p>
        </div>`;
    }

    // 🔒 จัดการปุ่มส่งข้อความ
    btnAdd.addEventListener("click", () => {
      const currentRoleCleaned = (localStorage.getItem("role") || "User").trim().toUpperCase();
      
      if (currentRoleCleaned !== "ADMIN" && currentRoleCleaned !== "CEO") {
        alert("Access Denied: Only Admin or CEO roles possess broadcasting permissions. 🛑");
        return;
      }

      const actionInput = document.getElementById("input-action").value.trim();
      if (!actionInput) {
        alert("Please enter a notification message before sending! 🥺");
        return;
      }

      const newNotification = {
        writer: localStorage.getItem("name") || activeUsername,
        avatar: localStorage.getItem("profile") || "https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32",
        role: localStorage.getItem("role") || "User", 
        action: actionInput,
        timestamp: Date.now()
      };

      myNotifications.push(newNotification);
      localStorage.setItem("manual_notis", JSON.stringify(myNotifications));

      document.getElementById("input-action").value = "";
      renderUI();
    });

    // ปุ่มเคลียร์หน้าจอทั้งหมด
    btnReset.addEventListener("click", () => {
      const currentRoleCleaned = (localStorage.getItem("role") || "User").trim().toUpperCase();
      if (currentRoleCleaned !== "ADMIN" && currentRoleCleaned !== "CEO") {
        alert("Access Denied: Action restricted to System Authorities.");
        return;
      }
      
      if(confirm("Are you sure you want to clear all notifications?")) {
        myNotifications = [];
        localStorage.removeItem("manual_notis");
        renderUI();
      }
    });

    syncUserProfileFromSheet();
    renderUI();
  });
</script>

</body>
</html>
