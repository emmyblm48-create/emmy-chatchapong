<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notifications | BLM48</title>
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
  <meta name="theme-color" content="#ffc0cb">
  
  <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s180">
  <link rel="icon" sizes="192x192" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s192">
  <meta name="apple-mobile-web-app-title" content="BLM48">   
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { 
      font-family: 'Quicksand', 'Kanit', sans-serif;  
      background-color: #fff0f5; 
      padding: 20px; 
      margin: 0;
      padding-bottom: 110px; /* Space for floating bottom tab-bar */
    }
    .noti-container { 
      max-width: 500px; 
      margin: 20px auto; 
      background: white; 
      padding: 24px; 
      border-radius: 24px; 
      box-shadow: 0 8px 24px rgba(255, 133, 162, 0.12); 
    }
    .header {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ff85a2;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between; 
      border-bottom: 2px dashed #fff0f3;
      padding-bottom: 12px;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    /* 🔄 ปุ่ม Refresh */
    .btn-refresh {
      background: none;
      border: none;
      color: #ff85a2;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .btn-refresh:hover {
      background: #fff0f3;
      color: #ff6b8b;
    }
    .btn-refresh:active {
      transform: scale(0.9);
    }
    
    /* ✍️ Manual Input Box */
    .manual-input-box {
      background: #fff5f7;
      border: 1px dashed #ffccd5;
      padding: 16px;
      border-radius: 18px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .manual-input-box h3 {
      margin: 0 0 4px 0;
      font-size: 0.95rem;
      color: #ff85a2;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .manual-input-box input {
      font-family: 'Quicksand', 'Kanit', sans-serif;
      padding: 12px 14px;
      border: 1px solid #ffe3e8;
      border-radius: 12px;
      font-size: 0.85rem;
      color: #555;
      outline: none;
      transition: all 0.2s;
    }
    .manual-input-box input:focus {
      border-color: #ff85a2;
      background: #fff;
    }
    .btn-group {
      display: flex;
      gap: 8px;
    }
    .btn-submit {
      flex: 2;
      font-family: 'Quicksand', 'Kanit', sans-serif;
      background: #ff85a2;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-submit:hover { background: #ff6b8b; }
    .btn-submit:disabled { background: #ffb3c1; cursor: not-allowed; }
    
    .btn-clear {
      flex: 1;
      font-family: 'Quicksand', 'Kanit', sans-serif;
      background: #e0e0e0;
      color: #666;
      border: none;
      padding: 10px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-clear:hover { background: #d0d0d0; }
    .btn-clear:disabled { background: #f0f0f0; color: #ccc; cursor: not-allowed; }

    /* Notification Cards Style */
    .noti-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .noti-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      background: #fffbfb;
      border: 1px solid #fff0f3;
      border-radius: 16px;
      transition: all 0.2s ease;
    }
    .noti-item.unread {
      background: #fff5f7;
      border-color: #ffccd5;
    }
    .noti-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ff85a2;
    }
    .noti-content {
      flex: 1;
    }
    .noti-text {
      font-size: 0.9rem;
      color: #444;
      margin: 0 0 4px 0;
      line-height: 1.4;
    }
    .noti-text strong {
      color: #ff85a2;
    }
    .noti-time {
      font-size: 0.75rem;
      color: #aaa;
    }
    
    /* Empty State / Loading State */
    .empty-noti {
      text-align: center;
      padding: 40px 20px;
      color: #ffb3c1;
    }
    .empty-noti i {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .bottom-tab-bar {
      height: calc(110px + env(safe-area-inset-bottom, 0px)); 
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 999;
      background: transparent; 
      display: flex;
      justify-content: space-around;
      align-items: flex-end; 
      padding-bottom: env(safe-area-inset-bottom, 0px);
      box-sizing: border-box;
    }

    .bottom-tab-bar::before {
      content: "";
      position: absolute;
      top: 60px; 
      left: 0;
      right: 0;
      bottom: 0;
      background: #ffffff; 
      border-top: 1px solid rgba(0, 0, 0, 0.04);
      border-radius: 28px 28px 0 0; 
      box-shadow: 0 -12px 35px rgba(0, 0, 0, 0.08); 
      z-index: 1;
    }

    .tab-item {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 20%;
      height: 50px; 
      position: relative;
      z-index: 2; 
      text-decoration: none;
      color: #8e8e93; 
      
      transform: translateY(-30px); 
      transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }

    .tab-item:active {
      transform: translateY(-30px) scale(0.85);
      opacity: 0.8;
    }

    .tab-item.active {
      color: #ffb3c1; 
      transform: translateY(-45px); 
    }
    .tab-item.active:active {
      transform: translateY(-45px) scale(0.85);
    }

    .tab-item i {
      font-size: 34px;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.08)); 
    }

    .tab-item img {
      width: 44px;
      height: 44px;
      object-fit: contain;
      filter: drop-shadow(0 8px 12px rgba(0,0,0,0.12)); 
    }

    #tab-profile-img {
      width: 38px !important;
      height: 38px !important;
      border-radius: 50%;
      border: 2px solid #ffb3c1;
      box-sizing: border-box;
    }
        
    .icon-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
        
    .btn-del-item {
      background: #fff0f3;
      border: none;
      color: #ff85a2;
      padding: 8px 10px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 0.8rem;
      transition: 0.2s;
    }
    .btn-del-item:hover {
      background: #ff85a2;
      color: white;
    }

    /* Animate สำหรับ Custom UI */
    @keyframes cuteFadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .noti-item {
        background: #ffffff;
        border: 1px solid #f0f0f0;
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 12px;
        display: flex;
        gap: 14px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(244, 230, 235, 0.3);
    }

    .noti-item.kami-border {
        border: 2px solid #ffb7ce;
        background: linear-gradient(135deg, #fffcfd 0%, #fff5f8 100%);
        box-shadow: 0 6px 16px rgba(255, 183, 206, 0.4);
    }

    .noti-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
    }

    .member-name {
        font-weight: 600;
        color: #4a4a4a;
        font-size: 1.05rem;
    }

    .relation-badge {
        font-size: 0.75rem;
        padding: 4px 10px;
        border-radius: 20px;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }

    .bg-kami {
        background-color: #ff6b8b;
        color: white;
    }

    .bg-oshi {
        background-color: #ffd1dc;
        color: #b55269;
    }

    .noti-text {
        color: #6e6e6e;
        font-size: 0.95rem;
        line-height: 1.4;
        margin: 4px 0;
    }

    .noti-time {
        font-size: 0.8rem;
        color: #a0a0a0;
        display: inline-flex;
        align-items: center;
        gap: 4px;
    }

    .avatar-placeholder {
        width: 48px;
        height: 48px;
        background: #ffe3ec;
        color: #ff6b8b;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 1.2rem;
    }
  </style>
</head>
<body>

<div class="noti-container">
  <div class="header">
    <div class="header-title">
      <i class="fa-solid fa-bell"></i> Notifications
    </div>
    <button id="btn-refresh" class="btn-refresh" title="Refresh">
      <i class="fa-solid fa-rotate"></i>
    </button>
  </div>
  
  <div class="manual-input-box" id="admin-input-box" style="display: none;">
    <h3><i class="fa-solid fa-pen-to-square"></i> Create New Notification</h3>
    <input type="text" id="input-action" placeholder="Enter notification message">
    <div class="btn-group">
      <button class="btn-submit" id="btn-add"><i class="fa-solid fa-plus"></i> Post Notification</button>
      <button class="btn-clear" id="btn-reset"><i class="fa-solid fa-trash"></i> Clear All</button>
    </div>
  </div>
  
  <div id="noti-list" class="noti-list"></div>
</div>

<div class="bottom-tab-bar">
  <a href="index.html" class="tab-item">
    <i id="nav-home-fallback" class="fa-solid fa-house"></i>
    <img id="nav-home" src="" alt="Home" style="display: none;">
  </a>
  <a href="kami.html" class="tab-item">
    <i id="nav-kami-fallback" class="fa-solid fa-star"></i>
    <img id="nav-kami" src="" alt="My Oshi" style="display: none;">
  </a>
  <a href="shop.html" class="tab-item">
    <i id="nav-cart-fallback" class="fa-solid fa-bag-shopping"></i>
    <img id="nav-cart" src="" alt="Shop" style="display: none;">
  </a>
  <a href="notification.html" class="tab-item">
    <div class="icon-wrapper" style="position: relative; display: flex; justify-content: center; align-items: center;">
      <i id="nav-noti-fallback" class="fa-solid fa-bell"></i>
      <img id="nav-noti" src="" alt="Notification" style="display: none;">
      <span class="noti-badge" id="noti-badge" style="display: none;"></span>
    </div>
  </a>
  <a href="profile.html" class="tab-item">
    <img id="tab-profile-img" src="https://via.placeholder.com/30" style="border-radius: 50%; object-fit: cover;">
  </a>
</div>

<script>   
  document.addEventListener("DOMContentLoaded", () => {
    const notiListContainer = document.getElementById("noti-list");
    const btnAdd = document.getElementById("btn-add");
    const btnReset = document.getElementById("btn-reset");
    const btnRefresh = document.getElementById("btn-refresh");
    const adminInputBox = document.getElementById("admin-input-box");

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec";

    loadChampThemeSubPage(SCRIPT_URL);

    // =========================================================
    // 📦 1. ดึงข้อมูลเซสชันผู้ใช้
    // =========================================================
    let savedRole = "User";
    let savedName = "Admin";
    let savedProfile = "";
    let savedUsername = "";

    const sessionStr = localStorage.getItem('bnl_session');
    if (sessionStr) {
      try {
        const sessionData = JSON.parse(sessionStr);
        const userData = sessionData.data || sessionData.user || sessionData;
        if (userData) {
          savedRole = userData.role || userData.Role || "User";
          savedName = userData.name || userData.Name || "Admin";
          savedProfile = userData.profile_img || userData.profile || "";
          savedUsername = userData.username || "";
        }
      } catch (e) {
        console.error("❌ Error parsing bnl_session:", e);
      }
    }

    savedRole = savedRole.toString().trim();
    const checkRoleLower = savedRole.toLowerCase();

    // =========================================================
    // 🛡️ 2. ตรวจสอบสิทธิ์แสดงกล่องโพสต์
    // =========================================================
    if (checkRoleLower === "admin" || checkRoleLower === "ceo") {
      if (adminInputBox) adminInputBox.style.display = "flex";
    } else {
      if (adminInputBox) adminInputBox.style.display = "none";
    }

    let myNotifications = [];

    // =========================================================
    // ⚡ 2.5 โหลดข้อมูลแคชเก่ามาแสดงก่อนทันทีเพื่อลดความหน่วงหน้าจอ
    // =========================================================
    const cachedNoti = localStorage.getItem("blm48_notifications_cache");
    if (cachedNoti) {
      try {
        myNotifications = JSON.parse(cachedNoti);
        renderUI(); 
      } catch (e) {
        console.error("❌ Cache parse error:", e);
      }
    }

    // =========================================================
    // 💖 ฟังก์ชันสร้างกล่องยืนยัน (Custom Confirm) สุดหวาน
    // =========================================================
    const cuteConfirm = (message) => {
      return new Promise((resolve) => {
        const modal = document.createElement('div');
        modal.style = `
          position: fixed; top: 0; left: 0; width: 100%; height: 100%;
          background: rgba(255, 180, 193, 0.2); backdrop-filter: blur(4px);
          display: flex; align-items: center; justify-content: center;
          z-index: 9999; font-family: 'Quicksand', 'Kanit', sans-serif;
        `;
        modal.innerHTML = `
          <div style="background: white; padding: 24px; border-radius: 24px; width: 85%; max-width: 320px; text-align: center; box-shadow: 0 10px 30px rgba(255,133,162,0.2); border: 2px solid #fff0f3; animation: cuteFadeIn 0.25s ease-out;">
            <div style="color: #ff85a2; font-size: 2.5rem; margin-bottom: 12px;"><i class="fa-solid fa-heart-crack"></i></div>
            <p style="margin: 0 0 20px 0; font-size: 0.95rem; color: #555; font-weight: 600; line-height: 1.5;">${message}</p>
            <div style="display: flex; gap: 10px; justify-content: center;">
              <button id="btn-cute-cancel" style="flex: 1; padding: 10px; border: none; background: #e0e0e0; color: #666; border-radius: 12px; font-weight: 600; cursor: pointer; font-family: inherit;">ยกเลิก</button>
              <button id="btn-cute-ok" style="flex: 1; padding: 10px; border: none; background: #ff85a2; color: white; border-radius: 12px; font-weight: 600; cursor: pointer; font-family: inherit;">ตกลง</button>
            </div>
          </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('#btn-cute-ok').onclick = () => { modal.remove(); resolve(true); };
        modal.querySelector('#btn-cute-cancel').onclick = () => { modal.remove(); resolve(false); };
      });
    };

    // =========================================================
    // 💖 ฟังก์ชันสร้างสติกเกอร์แจ้งเตือนสั้นๆ (Cute Toast) เด้งบนจอ
    // =========================================================
    const cuteToast = (message, icon = "fa-circle-check") => {
      const toast = document.createElement('div');
      toast.style = `
        position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
        background: #ff85a2; color: white; padding: 12px 24px; border-radius: 50px;
        font-size: 0.9rem; font-weight: 600; box-shadow: 0 8px 20px rgba(255,133,162,0.3);
        z-index: 10000; font-family: 'Quicksand', 'Kanit', sans-serif;
        opacity: 0; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex; align-items: center; gap: 8px; white-space: nowrap;
      `;
      toast.innerHTML = `<i class="fa-solid ${icon}"></i> <span>${message}</span>`;
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '1'; toast.style.top = '40px'; }, 50);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.top = '30px';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    };

    // =========================================================
    // 🌸 3. ฟังก์ชันดึงข้อมูลจาก Google Sheet (API GET)
    // =========================================================
    async function fetchNotifications() {
      if (!myNotifications || myNotifications.length === 0) {
        notiListContainer.innerHTML = `
          <div class="empty-noti">
            <i class="fa-solid fa-spinner fa-spin"></i>
            <p>Loading notifications...</p>
          </div>`;
      }
      
      btnRefresh.querySelector('i').classList.add('fa-spin');
      btnRefresh.disabled = true;

      try {
        const response = await fetch(`${SCRIPT_URL}?action=getNotifications`);
        if (!response.ok) throw new Error("Network response was not ok");
        
        myNotifications = await response.json();
        
        localStorage.setItem("blm48_notifications_cache", JSON.stringify(myNotifications));
        renderUI();
      } catch (error) {
        console.error("❌ Error fetching notifications:", error);
        
        if (!myNotifications || myNotifications.length === 0) {
          notiListContainer.innerHTML = `
            <div class="empty-noti" style="color:#ff6b8b;">
              <i class="fa-solid fa-triangle-exclamation"></i>
              <p>Failed to update. Please try again!</p>
            </div>`;
        } else {
          cuteToast("ไม่สามารถอัปเดตข้อมูลใหม่ได้ โปรดลองอีกครั้งนะคะ", "fa-triangle-exclamation");
        }
      } finally {
        btnRefresh.querySelector('i').classList.remove('fa-spin');
        btnRefresh.disabled = false;
      }
    }
    
    // =========================================================
    // 🗑️ 4. ฟังก์ชันลบเดี่ยวแบบ Global
    // =========================================================
    window.deleteSingleNoti = async function(timestamp) {
      const isConfirm = await cuteConfirm("คุณแน่ใจหรือไม่ว่าต้องการลบการแจ้งเตือนนี้?");
      if (!isConfirm) return; 

      btnRefresh.querySelector('i').classList.add('fa-spin');

      try {
        await fetch(SCRIPT_URL, {
          method: "POST",
          body: JSON.stringify({ type: "delete", timestamp: timestamp })
        });

        fetchNotifications(); 
        cuteToast("ลบการแจ้งเตือนสำเร็จแล้ว!", "fa-trash-can"); 

      } catch (error) {
        console.error("❌ Delete Error:", error);
        cuteToast("เกิดข้อผิดพลาดในการลบ โปรดลองอีกครั้ง", "fa-circle-xmark");
      } finally {
        btnRefresh.querySelector('i').classList.remove('fa-spin');
      }
    };
    
    // ฟังก์ชันโหลดและซิงค์ธีมผู้ชนะ
    function loadChampThemeSubPage(customURL) {
      const CACHE_KEY = "bnl_winner_theme_cache";
      
      const cachedData = localStorage.getItem(CACHE_KEY);
      if (cachedData) {
        try { applySubPageTheme(JSON.parse(cachedData)); } catch (e) {}
      }

      const finalURL = customURL || (typeof scriptURL !== 'undefined' ? scriptURL : (typeof SCRIPT_URL !== 'undefined' ? SCRIPT_URL : ''));
      if (!finalURL) return; 

      fetch(`${finalURL}?action=getWinnerTheme`)
        .then(response => response.json())
        .then(newData => {
          if (newData && newData.name && cachedData !== JSON.stringify(newData)) {
            localStorage.setItem(CACHE_KEY, JSON.stringify(newData));
            applySubPageTheme(newData); 
          }
        }).catch(e => console.error(e));
    }

    function applySubPageTheme(champData) {
      if (!champData) return;
      updateSubPageIcon('nav-home', 'nav-home-fallback', champData.homeIcon);
      updateSubPageIcon('nav-kami', 'nav-kami-fallback', champData.kamiIcon);
      updateSubPageIcon('nav-cart', 'nav-cart-fallback', champData.cartIcon);
      updateSubPageIcon('nav-noti', 'nav-noti-fallback', champData.notiIcon);
    }

    function updateSubPageIcon(imgId, fallbackId, iconUrl) {
      const imgElement = document.getElementById(imgId);
      const fallbackElement = document.getElementById(fallbackId);
      if (imgElement && fallbackElement) {
        if (iconUrl && iconUrl.trim() !== "") {
          imgElement.src = iconUrl;
          imgElement.style.display = 'block';
          fallbackElement.style.display = 'none';
        } else {
          imgElement.style.display = 'none';
          fallbackElement.style.display = 'block';
        }
      }
    }
        
// =========================================================
    // 🎨 5. ฟังก์ชันจัดหน้า UI แสดงรายการแจ้งเตือน (เวอร์ชันรวมพลังคามิ/โอชิ - ปลอดภัยไร้บั๊ก)
    // =========================================================
    function renderUI() {
      // 🌟 1. ปรับค่าเริ่มต้นเป็น '{}' เพื่อให้แมตช์กับการเรียกใช้แบบ Object ด้านล่าง
      const userIdols = JSON.parse(localStorage.getItem('kami_members') || '{}');
      
      if (myNotifications && myNotifications.length > 0) {
        notiListContainer.innerHTML = ""; 
        
        const sortedList = [...myNotifications].sort((a, b) => b.timestamp - a.timestamp);

        sortedList.forEach(noti => {
          const notiDate = new Date(noti.timestamp);
          
          // 🗓️ รูปแบบ วันที่ และเวลา ภาษาอังกฤษเต็มรูปแบบ
          const timeString = notiDate.toLocaleString('en-US', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit',
            hour12: true
          }).replace(',', ' at');

          const checkRole = (noti.role || "").toLowerCase().trim();
          const showVerified = (checkRole === "admin" || checkRole === "ceo");
          const verifiedBadge = showVerified ? ` <svg style="width: 14px; height: 14px; fill: #0095f6; vertical-align: middle; margin-left: 4px; display: inline-block;" viewBox="0 0 24 24" title="Verified Member">
            <path d="M23,12L20.56,9.22L20.9,5.54L17.29,4.72L15.4,1.54L12,3L8.6,1.54L6.71,4.72L3.1,5.53L3.44,9.21L1,12L3.44,14.78L3.1,18.47L6.71,19.29L8.6,22.47L12,21L15.4,22.46L17.29,19.28L20.9,18.46L20.56,14.78L23,12M10,17 L6,13L7.41,11.59L10,14.17L16.59,7.58L18,9L10,17Z"/>
          </svg>` : '';

          // ✅ แก้ไขจุดบั๊ก: เปลี่ยนมาใช้ checkRoleLower เพื่อเช็กสิทธิ์ของคนที่กำลังใช้งานระบบอยู่จริงๆ
          const deleteBtn = (checkRoleLower === "admin" || checkRoleLower === "ceo") 
            ? `<button class="btn-del-item" onclick="deleteSingleNoti(${noti.timestamp})"><i class="fa-solid fa-trash-can"></i></button>` 
            : '';

          // 🛠️ แก้ไขจุดบั๊กกันพัง: เช็กข้อมูลแบบนุ่มนวล (Optional Chaining) และใส่ Array สำรองเผื่อข้อมูลว่าง
          const isKami = userIdols && userIdols.kami ? (noti.writer === userIdols.kami) : false;
          const isOshi = userIdols && userIdols.oshis && Array.isArray(userIdols.oshis) ? userIdols.oshis.includes(noti.writer) : false;

          if (isKami || isOshi || showVerified) {
            
            let specialClass = '';
            let badgeText = '';

            // 🌟 แสดงผลป้ายสถานะด้วยไอคอน FontAwesome ตามที่คุณปรับไว้
            if (isKami) {
              specialClass = 'kami-border';
              badgeText = `<span class="relation-badge bg-kami"><i class="fa-solid fa-heart"></i> My Kami</span>`;
            } else if (isOshi) {
              badgeText = `<span class="relation-badge bg-oshi"><i class="fa-solid fa-star"></i> Oshi</span>`;
            } else if (showVerified && !isKami && !isOshi) {
              badgeText = `<span class="relation-badge" style="background:#e0f2fe; color:#0369a1;"><i class="fa-solid fa-bullhorn"></i> Official</span>`;
            }

            const item = document.createElement("div");
            item.className = `noti-item unread ${specialClass}`; 
            item.innerHTML = `
              <img src="${noti.avatar || 'https://lh3.googleusercontent.com/d/1rebp2F8vyP0nyvsEOFD9Nw2mPcRtVqtG=s1000'}" class="noti-avatar" alt="avatar">
              <div class="noti-content">
                <div class="noti-header">
                  <span class="member-name"><strong>${noti.writer} ${verifiedBadge}</strong></span>
                  ${badgeText}
                </div>
                <p class="noti-text">${noti.action}</p>
                <div class="noti-time"><i class="far fa-clock"></i> ${timeString}</div>
              </div>
              ${deleteBtn}
            `;
            notiListContainer.appendChild(item);
          }
        });

        if (notiListContainer.innerHTML === "") {
          showEmptyState();
        }

      } else {
        showEmptyState();
      }
    }

    function showEmptyState() {
      notiListContainer.innerHTML = `
        <div class="empty-noti">
          <i class="fa-solid fa-bell-slash"></i>
          <p>ยังไม่มีอัปเดตใหม่จากคามิและโอชิของคุณในตอนนี้</p>
        </div>`;
    }

    // =========================================================
    // ✍️ 6. ระบบเพิ่มแจ้งเตือนใหม่
    // =========================================================
    if (btnAdd) {
      btnAdd.addEventListener("click", async () => {
        const actionInput = document.getElementById("input-action").value.trim();

        if (!actionInput) {
          cuteToast("โปรดระบุข้อความแจ้งเตือนด้วยนะคะ!", "fa-pen-to-square");
          return;
        }

        btnAdd.disabled = true;
        btnAdd.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Posting...';

        const newNotification = {
          type: "add",
          writer: savedName,
          action: actionInput,
          avatar: savedProfile,
          role: savedRole, 
          timestamp: Date.now()
        };

        try {
          await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(newNotification)
          });

          if (window.firebaseDatabase && window.fbPush && window.fbRef) {
            const notiRef = window.fbRef(window.firebaseDatabase, 'notifications');
            await window.fbPush(notiRef, {
              writer: savedName,
              type: "system_alert",
              timestamp: Date.now()
            });
          }

          document.getElementById("input-action").value = "";
          await fetchNotifications();
          cuteToast("โพสต์แจ้งเตือนสำเร็จแล้วค่ะ!", "fa-circle-check");
        } catch (error) {
          console.error("❌ Error posting notification:", error);
          cuteToast("เกิดข้อผิดพลาดในการโพสต์ข้อมูล ", "fa-circle-xmark");
        } finally {
          btnAdd.disabled = false;
          btnAdd.innerHTML = '<i class="fa-solid fa-plus"></i> Post Notification';
        }
      });
    }

    // =========================================================
    // 🗑️ 7. ระบบล้างข้อมูลแจ้งเตือนทั้งหมด
    // =========================================================
    if (btnReset) {
      btnReset.addEventListener("click", async () => {
        const isConfirm = await cuteConfirm("คุณแน่ใจไหมที่จะล้างประวัติการแจ้งเตือนทั้งหมด?");
        if (!isConfirm) return;

        btnReset.disabled = true;
        btnReset.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Clearing...';

        try {
          await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ type: "clear", timestamp: Date.now() })
          });

          await fetchNotifications();
          cuteToast("ล้างข้อมูลแจ้งเตือนทั้งหมดเรียบร้อยแล้ว!", "fa-trash-can");
        } catch (error) {
          console.error("❌ Error clearing notifications:", error);
          cuteToast("เกิดข้อผิดพลาดในการล้างข้อมูล", "fa-circle-xmark");
        } finally {
          btnReset.disabled = false;
          btnReset.innerHTML = '<i class="fa-solid fa-trash"></i> Clear All';
        }
      });
    }

    // =========================================================
    // 👤 7.5 อัปเดตรูปโปรไฟล์ที่ Tab Bar ด้านล่าง
    // =========================================================
    const tabProfileImg = document.getElementById('tab-profile-img');
    if (tabProfileImg && savedProfile) {
      tabProfileImg.src = typeof getImg === 'function' ? getImg(savedProfile) : savedProfile;
    }

    // =========================================================
    // 🔄 8. ปุ่ม Refresh และการทำงานเมื่อเข้าสู่หน้าเว็บครั้งแรก
    // =========================================================
    btnRefresh.addEventListener("click", fetchNotifications);
    fetchNotifications();

    localStorage.setItem("blm48_has_new_noti", "false");
    const badgeElement = document.getElementById("noti-badge");
    if (badgeElement) {
      badgeElement.style.display = "none";
    }
  });
</script>
</body>
</html>
