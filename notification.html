<script>
  document.addEventListener("DOMContentLoaded", () => {
    const notiListContainer = document.getElementById("noti-list");
    const btnAdd = document.getElementById("btn-add");
    const btnReset = document.getElementById("btn-reset");
    const btnRefresh = document.getElementById("btn-refresh");
    const adminInputBox = document.getElementById("admin-input-box");

    // ลิงก์ Google Apps Script Web App
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec";

    // รูปโปรไฟล์เริ่มต้น (กรณีผู้ใช้งานไม่มีรูป)
    const DEFAULT_AVATAR = "https://lh3.googleusercontent.com/d/1rebp2F8vyP0nyvsEOFD9Nw2mPcRtVqtG=s400";

    // =========================================================
    // 📦 1. ดึงข้อมูลเซสชันผู้ใช้
    // =========================================================
    let savedRole = "User";
    let savedName = "Admin";
    let savedProfile = "";
    let savedUsername = "";

    const sessionStr = localStorage.getItem('bnl_session');
    if (sessionStr) {
      try {
        const sessionData = JSON.parse(sessionStr);
        const userData = sessionData.data || sessionData.user || sessionData;
        if (userData) {
          savedRole = userData.role || userData.Role || "User";
          savedName = userData.name || userData.Name || "Admin";
          savedProfile = userData.profile_img || userData.profile || "";
          savedUsername = userData.username || "";
        }
      } catch (e) {
        console.error("❌ Error parsing bnl_session:", e);
      }
    }

    savedRole = savedRole.toString().trim();
    const checkRoleLower = savedRole.toLowerCase();

    // =========================================================
    // 🛡️ 2. ตรวจสอบสิทธิ์แสดงกล่องโพสต์
    // =========================================================
    if (checkRoleLower === "admin" || checkRoleLower === "ceo") {
      if (adminInputBox) adminInputBox.style.display = "flex";
    } else {
      if (adminInputBox) adminInputBox.style.display = "none";
    }

    let myNotifications = [];

    // =========================================================
    // 🌸 3. ฟังก์ชันดึงข้อมูลจาก Google Sheet (API GET)
    // =========================================================
    async function fetchNotifications() {
      notiListContainer.innerHTML = `
        <div class="empty-noti">
          <i class="fa-solid fa-spinner fa-spin"></i>
          <p>Loading notifications...</p>
        </div>`;
      
      btnRefresh.querySelector('i').classList.add('fa-spin');
      btnRefresh.disabled = true;

      try {
        const response = await fetch(SCRIPT_URL);
        if (!response.ok) throw new Error("Network response was not ok");
        
        myNotifications = await response.json();
        renderUI();
      } catch (error) {
        console.error("❌ Error fetching notifications:", error);
        notiListContainer.innerHTML = `
          <div class="empty-noti" style="color:#ff6b8b;">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <p>Failed to update. Please try again! 🥺</p>
          </div>`;
      } finally {
        btnRefresh.querySelector('i').classList.remove('fa-spin');
        btnRefresh.disabled = false;
      }
    }

    // =========================================================
    // 🎨 4. ฟังก์ชันจัดหน้า UI แสดงรายการแจ้งเตือน (เวอร์ชันอัปเกรดวันที่)
    // =========================================================
    function renderUI() {
      if (myNotifications && myNotifications.length > 0) {
        notiListContainer.innerHTML = ""; 
        
        // จัดเรียงข้อมูลให้ประกาศใหม่ล่าสุดขึ้นก่อน
        const sortedList = [...myNotifications].sort((a, b) => b.timestamp - a.timestamp);

        sortedList.forEach(noti => {
          const notiDate = new Date(noti.timestamp);
          
          // ✨ ปรับปรุงจุดนี้: จัดรูปแบบให้แสดงทั้ง วันที่ และ เวลา ให้ชัดเจน
          const dateOptions = { day: 'numeric', month: 'short' };
          const timeOptions = { hour: '2-digit', minute: '2-digit', hour12: false };
          
          const formattedDate = notiDate.toLocaleDateString('th-TH', dateOptions);
          const formattedTime = notiDate.toLocaleTimeString('th-TH', timeOptions);
          const displayTimeString = `${formattedDate} • ${formattedTime} น.`;

          const checkRole = (noti.role || "").toLowerCase().trim();
          const showVerified = (checkRole === "admin" || checkRole === "ceo");
          const verifiedBadge = showVerified ? ` <svg style="width: 14px; height: 14px; fill: #0095f6; vertical-align: middle; margin-left: 4px; display: inline-block;" viewBox="0 0 24 24" title="Verified Member">
      <path d="M23,12L20.56,9.22L20.9,5.54L17.29,4.72L15.4,1.54L12,3L8.6,1.54L6.71,4.72L3.1,5.53L3.44,9.21L1,12L3.44,14.78L3.1,18.47L6.71,19.29L8.6,22.47L12,21L15.4,22.46L17.29,19.28L20.9,18.46L20.56,14.78L23,12M10,17 L6,13L7.41,11.59L10,14.17L16.59,7.58L18,9L10,17Z"/>
    </svg>` : '';

          const item = document.createElement("div");
          item.className = "noti-item unread"; 
          item.innerHTML = `
            <img src="${noti.avatar || DEFAULT_AVATAR}" class="noti-avatar" alt="avatar" onerror="this.src='${DEFAULT_AVATAR}'">
            <div class="noti-content">
              <p class="noti-text"><strong>${noti.writer}</strong>${verifiedBadge} ${noti.action}</p>
              <div class="noti-time">${displayTimeString}</div>
            </div>
          `;
          notiListContainer.appendChild(item);
        });
      } else {
        notiListContainer.innerHTML = `
          <div class="empty-noti">
            <i class="fa-regular fa-bell-slashed"></i>
            <p>No Notifications.</p>
          </div>`;
      }
    }

    // =========================================================
    // ✍️ 5. ระบบกดปุ่มเพิ่มแจ้งเตือนใหม่ไปยัง Google Sheet (API POST)
    // =========================================================
    // โค้ดส่วนปุ่มกด Post Notification ในไฟล์ notification.html
if (btnAdd) {
  btnAdd.addEventListener("click", async () => {
    const actionInput = document.getElementById("input-action").value.trim();
    if (!actionInput) {
      alert("Please enter a notification message! 🥺");
      return;
    }

    btnAdd.disabled = true;
    btnAdd.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Posting...';

    // 1. ส่งเข้า Google Sheets (ของเดิมที่คุณทำไว้)
    const newNotification = {
      type: "add",
      writer: savedName,
      action: actionInput,
      avatar: savedProfile,
      role: savedRole, 
      timestamp: Date.now()
    };

    try {
      await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(newNotification)
      });

      // 🌟 2. [เพิ่มใหม่] กระจายสัญญาณผ่าน Firebase ให้ทุกคนเห็นจุดแดงพร้อมกันทันที
      // (ต้องแน่ใจว่าในหน้า notification.html มีการ Initialize Firebase ไว้เหมือนหน้า index แล้วนะครับ)
      if (window.firebaseDatabase && window.fbPush && window.fbRef) {
        const notiRef = window.fbRef(window.firebaseDatabase, 'notifications');
        await window.fbPush(notiRef, {
          writer: "Admin",
          type: "system_alert", // ระบุว่าเป็นประกาศระบบ
          timestamp: Date.now()
        });
      }

      document.getElementById("input-action").value = "";
      await fetchNotifications();
    } catch (error) {
      console.error("❌ Error posting notification:", error);
      alert("Something went wrong, please try again! 😢");
    } finally {
      btnAdd.disabled = false;
      btnAdd.innerHTML = '<i class="fa-solid fa-plus"></i> Post Notification';
    }
  });
}

    // =========================================================
    // 🗑️ 6. ระบบล้างข้อมูลแจ้งเตือนทั้งหมดออกจาก Google Sheet
    // =========================================================
    if (btnReset) {
      btnReset.addEventListener("click", async () => {
        if(confirm("Are you sure you want to clear all notifications from Google Sheet?")) {
          btnReset.disabled = true;
          btnReset.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Clearing...';

          try {
            await fetch(SCRIPT_URL, {
              method: "POST",
              body: JSON.stringify({ type: "clear" })
            });
            await fetchNotifications();
          } catch (error) {
            console.error("❌ Error clearing notifications:", error);
            alert("Could not clear data. Please try again! 😢");
          } finally {
            btnReset.disabled = false;
            btnReset.innerHTML = '<i class="fa-solid fa-trash"></i> Clear All';
          }
        }
      });
    }

    // =========================================================
    // 🔄 7. ผูกระบบเข้ากับปุ่ม Refresh และสั่งโหลดข้อมูลครั้งแรก
    // =========================================================
    btnRefresh.addEventListener("click", fetchNotifications);
    fetchNotifications();
  });
</script>
