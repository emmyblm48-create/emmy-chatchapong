<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notifications | BLM48</title>
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
  <meta name="theme-color" content="#ffc0cb">
  
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { 
      font-family: 'Quicksand', 'Kanit', sans-serif;  
      background-color: #fff0f5; 
      padding: 20px; 
      margin: 0;
      padding-bottom: 110px; /* Space for floating bottom tab-bar */
    }
    .noti-container { 
      max-width: 500px; 
      margin: 20px auto; 
      background: white; 
      padding: 24px; 
      border-radius: 24px; 
      box-shadow: 0 8px 24px rgba(255, 133, 162, 0.12); 
    }
    .header {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ff85a2;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px dashed #fff0f3;
      padding-bottom: 12px;
    }
    
    /* ✍️ Manual Input Box (Cute & Minimalist) */
    .manual-input-box {
      background: #fff5f7;
      border: 1px dashed #ffccd5;
      padding: 16px;
      border-radius: 18px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .manual-input-box h3 {
      margin: 0 0 4px 0;
      font-size: 0.95rem;
      color: #ff85a2;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .manual-input-box input {
      font-family: 'Quicksand', 'Kanit', sans-serif;
      padding: 12px 14px;
      border: 1px solid #ffe3e8;
      border-radius: 12px;
      font-size: 0.85rem;
      color: #555;
      outline: none;
      transition: all 0.2s;
    }
    .manual-input-box input:focus {
      border-color: #ff85a2;
      background: #fff;
    }
    .btn-group {
      display: flex;
      gap: 8px;
    }
    .btn-submit {
      flex: 2;
      font-family: 'Quicksand', 'Kanit', sans-serif;
      background: #ff85a2;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .btn-submit:hover { background: #ff6b8b; }
    .btn-clear {
      flex: 1;
      font-family: 'Quicksand', 'Kanit', sans-serif;
      background: #e0e0e0;
      color: #666;
      border: none;
      padding: 10px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-clear:hover { background: #d0d0d0; }

    /* Notification Cards Style 🌸 */
    .noti-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .noti-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      background: #fffbfb;
      border: 1px solid #fff0f3;
      border-radius: 16px;
      transition: all 0.2s ease;
    }
    .noti-item.unread {
      background: #fff5f7;
      border-color: #ffccd5;
    }
    .noti-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ff85a2;
    }
    .noti-content {
      flex: 1;
    }
    .noti-text {
      font-size: 0.9rem;
      color: #444;
      margin: 0 0 4px 0;
      line-height: 1.4;
    }
    .noti-text strong {
      color: #ff85a2;
    }
    .noti-time {
      font-size: 0.75rem;
      color: #aaa;
    }
    
    /* Empty State ☁️ */
    .empty-noti {
      text-align: center;
      padding: 40px 20px;
      color: #ffb3c1;
    }
    .empty-noti i {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    /* Floating Tab-bar 🎀 */
    .bottom-tab-bar {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 440px;
        height: 68px;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        display: flex;
        justify-content: space-around;
        align-items: center;
        border-radius: 35px;
        border: 1px solid rgba(255, 204, 213, 0.5);
        box-shadow: 0 10px 30px rgba(255, 133, 162, 0.15);
        z-index: 1000;
        padding: 0 10px;
        box-sizing: border-box;
    }
    .tab-item {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        color: #ffb3c1;
        text-decoration: none;
        font-size: 0.85rem;
        font-family: 'Quicksand', 'Kanit', sans-serif;
        font-weight: 600;
        padding: 10px 14px;
        border-radius: 25px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        -webkit-tap-highlight-color: transparent;
    }
    .tab-item i { font-size: 1.25rem; }
    .tab-item span { display: none; }
    .tab-item.active { background-color: #fff0f3; color: #ff85a2; }
    .tab-item.active span { display: inline-block; }
    
    .icon-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Instagram-Style Verified Badge CSS */
    .verified-badge {
      color: #1d9bf0;
      margin-left: 5px;
      font-size: 0.85rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<div class="noti-container">
  <div class="header">
    <i class="fa-solid fa-bell"></i> Notifications
  </div>
  
  <div class="manual-input-box" id="admin-input-box" style="display: none;">
    <h3><i class="fa-solid fa-pen-to-square"></i> Create New Notification</h3>
    <input type="text" id="input-action" placeholder="Enter notification message (e.g., is now live 🔴, updated status)">
    <div class="btn-group">
      <button class="btn-submit" id="btn-add"><i class="fa-solid fa-plus"></i> Post Notification</button>
      <button class="btn-clear" id="btn-reset"><i class="fa-solid fa-trash"></i> Clear All</button>
    </div>
  </div>
  
  <div id="noti-list" class="noti-list"></div>
</div>

<div class="bottom-tab-bar">
  <a href="index.html" class="tab-item">
    <i class="fa-solid fa-house"></i>
  </a>
  <a href="kami.html" class="tab-item">
    <i class="fa-solid fa-star"></i>
  </a>
  <a href="shop.html" class="tab-item">
    <i class="fa-solid fa-bag-shopping"></i>
  </a>
  <a href="notification.html" class="tab-item active">
    <div class="icon-wrapper">
      <i class="fa-solid fa-bell"></i>
    </div>
  </a>
  <a href="member.html" class="tab-item">
    <i class="fa-solid fa-user"></i>
  </a>
</div>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const notiListContainer = document.getElementById("noti-list");
    const btnAdd = document.getElementById("btn-add");
    const btnReset = document.getElementById("btn-reset");
    const adminInputBox = document.getElementById("admin-input-box");

    // ==========================================
    // 🔑 ดึงค่าตรงๆ จากคีย์เดี่ยวที่ระบบล็อกอินเซฟไว้
    // ==========================================
    const savedRole = localStorage.getItem("role") || sessionStorage.getItem("role") || "";
    const savedName = localStorage.getItem("name") || sessionStorage.getItem("name") || "Admin";
    const savedProfile = localStorage.getItem("profile") || sessionStorage.getItem("profile") || "";
    const savedUsername = localStorage.getItem("username") || sessionStorage.getItem("username") || "";

    // แปลงตัวอักษรของ Role เป็นตัวพิมพ์เล็กทั้งหมดเพื่อป้องกันการพิมพ์ผิดพลาด
    const currentRoleLower = savedRole.toLowerCase().trim();

    // ตรวจสอบสิทธิ์: ถ้าเป็น admin หรือ ceo ให้เปิดกล่องโพสต์
    if (currentRoleLower === "admin" || currentRoleLower === "ceo") {
      adminInputBox.style.display = "flex";
      console.log(`✅ ยินดีต้อนรับคุณ (${savedName}): เปิดโพสต์เรียบร้อย!`);
    } else {
      adminInputBox.style.display = "none";
      console.log("❌ สิทธิ์ของคุณไม่ใช่ Admin/CEO ระบบจึงซ่อนกล่องโพสต์ไว้ครับ");
    }

    // โหลดข้อมูลแจ้งเตือนเดิมจากความจำเครื่อง
    let myNotifications = JSON.parse(localStorage.getItem("manual_notis")) || [];

    // 2. ฟังก์ชันจัดหน้า UI แสดงรายการแจ้งเตือน
    function renderUI() {
      if (myNotifications.length > 0) {
        notiListContainer.innerHTML = ""; 
        
        const sortedList = [...myNotifications].sort((a, b) => b.timestamp - a.timestamp);

        sortedList.forEach(noti => {
          const notiDate = new Date(noti.timestamp);
          const timeString = notiDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

          // ใส่ติ๊กถูกสีฟ้าถ้าสิทธิ์ตอนโพสต์เป็น Admin หรือ CEO
          const checkRole = (noti.role || "").toLowerCase();
          const showVerified = (checkRole === "admin" || checkRole === "ceo");
          const verifiedBadge = showVerified ? `<i class="fa-solid fa-circle-check verified-badge" title="Verified Account" style="color: #1d9bf0; margin-left: 5px;"></i>` : '';

          const item = document.createElement("div");
          item.className = "noti-item unread"; 
          item.innerHTML = `
            <img src="${noti.avatar || 'https://via.placeholder.com/150/ff4d6d/ffffff?text=BLM48'}" class="noti-avatar" alt="avatar">
            <div class="noti-content">
              <p class="noti-text"><strong>${noti.writer}</strong>${verifiedBadge} ${noti.action}</p>
              <div class="noti-time">${timeString}</div>
            </div>
          `;
          notiListContainer.appendChild(item);
        });
      } else {
        notiListContainer.innerHTML = `
          <div class="empty-noti">
            <i class="fa-regular fa-bell-slashed"></i>
            <p>No Notifications.</p>
          </div>`;
      }
    }

    // 3. ระบบกดปุ่มเพิ่มแจ้งเตือนใหม่ (ใช้ข้อมูลผู้ใช้ที่ดึงมาตรงๆ)
    btnAdd.addEventListener("click", () => {
      const actionInput = document.getElementById("input-action").value.trim();

      if (!actionInput) {
        alert("Please enter a notification message! 🥺");
        return;
      }

      const newNotification = {
        writer: savedName,
        action: actionInput,
        avatar: savedProfile,
        role: savedRole, // เซฟค่า Role ต้นฉบับเก็บไว้เช็กติ๊กถูกสีฟ้า
        timestamp: Date.now()
      };

      myNotifications.push(newNotification);
      localStorage.setItem("manual_notis", JSON.stringify(myNotifications));

      document.getElementById("input-action").value = "";
      renderUI();
    });

    // 4. ระบบล้างข้อมูลแจ้งเตือนทั้งหมด
    btnReset.addEventListener("click", () => {
      if(confirm("Are you sure you want to clear all notifications?")) {
        myNotifications = [];
        localStorage.removeItem("manual_notis");
        renderUI();
      }
    });

    renderUI();
  });
</script>
</body>
</html>
