<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Notifications | BLM48</title>
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
  <meta name="theme-color" content="#ffc0cb">
  
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body { 
      font-family: 'Quicksand', 'Kanit', sans-serif;  
      background-color: #fff0f5; 
      padding: 20px; 
      margin: 0;
      padding-bottom: 110px; /* Space for floating bottom tab-bar */
    }
    .noti-container { 
      max-width: 500px; 
      margin: 20px auto; 
      background: white; 
      padding: 24px; 
      border-radius: 24px; 
      box-shadow: 0 8px 24px rgba(255, 133, 162, 0.12); 
    }
    .header {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ff85a2;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between; /* จัดปุ่ม Refresh ไว้ขวาสุด */
      border-bottom: 2px dashed #fff0f3;
      padding-bottom: 12px;
    }
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    /* 🔄 ปุ่ม Refresh สไตล์น่ารัก */
    .btn-refresh {
      background: none;
      border: none;
      color: #ff85a2;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 6px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .btn-refresh:hover {
      background: #fff0f3;
      color: #ff6b8b;
    }
    .btn-refresh:active {
      transform: scale(0.9);
    }
    
    /* ✍️ Manual Input Box (Cute & Minimalist) */
    .manual-input-box {
      background: #fff5f7;
      border: 1px dashed #ffccd5;
      padding: 16px;
      border-radius: 18px;
      margin-bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .manual-input-box h3 {
      margin: 0 0 4px 0;
      font-size: 0.95rem;
      color: #ff85a2;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .manual-input-box input {
      font-family: 'Quicksand', 'Kanit', sans-serif;
      padding: 12px 14px;
      border: 1px solid #ffe3e8;
      border-radius: 12px;
      font-size: 0.85rem;
      color: #555;
      outline: none;
      transition: all 0.2s;
    }
    .manual-input-box input:focus {
      border-color: #ff85a2;
      background: #fff;
    }
    .btn-group {
      display: flex;
      gap: 8px;
    }
    .btn-submit {
      flex: 2;
      font-family: 'Quicksand', 'Kanit', sans-serif;
      background: #ff85a2;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-submit:hover { background: #ff6b8b; }
    .btn-submit:disabled { background: #ffb3c1; cursor: not-allowed; }
    
    .btn-clear {
      flex: 1;
      font-family: 'Quicksand', 'Kanit', sans-serif;
      background: #e0e0e0;
      color: #666;
      border: none;
      padding: 10px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-clear:hover { background: #d0d0d0; }
    .btn-clear:disabled { background: #f0f0f0; color: #ccc; cursor: not-allowed; }

    /* Notification Cards Style 🌸 */
    .noti-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .noti-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      background: #fffbfb;
      border: 1px solid #fff0f3;
      border-radius: 16px;
      transition: all 0.2s ease;
    }
    .noti-item.unread {
      background: #fff5f7;
      border-color: #ffccd5;
    }
    .noti-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ff85a2;
    }
    .noti-content {
      flex: 1;
    }
    .noti-text {
      font-size: 0.9rem;
      color: #444;
      margin: 0 0 4px 0;
      line-height: 1.4;
    }
    .noti-text strong {
      color: #ff85a2;
    }
    .noti-time {
      font-size: 0.75rem;
      color: #aaa;
    }
    
    /* Empty State / Loading State ☁️ */
    .empty-noti {
      text-align: center;
      padding: 40px 20px;
      color: #ffb3c1;
    }
    .empty-noti i {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    /* Floating Tab-bar 🎀 */
    .bottom-tab-bar {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 440px;
        height: 68px;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        display: flex;
        justify-content: space-around;
        align-items: center;
        border-radius: 35px;
        border: 1px solid rgba(255, 204, 213, 0.5);
        box-shadow: 0 10px 30px rgba(255, 133, 162, 0.15);
        z-index: 1000;
        padding: 0 10px;
        box-sizing: border-box;
    }
    .tab-item {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        color: #ffb3c1;
        text-decoration: none;
        font-size: 0.85rem;
        font-family: 'Quicksand', 'Kanit', sans-serif;
        font-weight: 600;
        padding: 10px 14px;
        border-radius: 25px;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        -webkit-tap-highlight-color: transparent;
    }
    .tab-item i { font-size: 1.25rem; }
    .tab-item span { display: none; }
    .tab-item.active { background-color: #fff0f3; color: #ff85a2; }
    .tab-item.active span { display: inline-block; }
    
    .icon-wrapper {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Instagram-Style Verified Badge CSS */
    .verified-badge {
      color: #1d9bf0;
      margin-left: 5px;
      font-size: 0.85rem;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<div class="noti-container">
  <div class="header">
    <div class="header-title">
      <i class="fa-solid fa-bell"></i> Notifications
    </div>
    <button id="btn-refresh" class="btn-refresh" title="Refresh">
      <i class="fa-solid fa-rotate"></i>
    </button>
  </div>
  
  <div class="manual-input-box" id="admin-input-box" style="display: none;">
    <h3><i class="fa-solid fa-pen-to-square"></i> Create New Notification</h3>
    <input type="text" id="input-action" placeholder="Enter notification message">
    <div class="btn-group">
      <button class="btn-submit" id="btn-add"><i class="fa-solid fa-plus"></i> Post Notification</button>
      <button class="btn-clear" id="btn-reset"><i class="fa-solid fa-trash"></i> Clear All</button>
    </div>
  </div>
  
  <div id="noti-list" class="noti-list"></div>
</div>

<div class="bottom-tab-bar">
  <a href="index.html" class="tab-item">
    <i class="fa-solid fa-house"></i>
  </a>
  <a href="kami.html" class="tab-item">
    <i class="fa-solid fa-star"></i>
  </a>
  <a href="shop.html" class="tab-item">
    <i class="fa-solid fa-bag-shopping"></i>
  </a>
  <a href="notification.html" class="tab-item active">
    <div class="icon-wrapper">
      <i class="fa-solid fa-bell"></i>
    </div>
  </a>
  <a href="profile.html" class="tab-item">
    <i class="fa-solid fa-user"></i>
  </a>
</div>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const notiListContainer = document.getElementById("noti-list");
    const btnAdd = document.getElementById("btn-add");
    const btnReset = document.getElementById("btn-reset");
    const btnRefresh = document.getElementById("btn-refresh");
    const adminInputBox = document.getElementById("admin-input-box");

    // ลิงก์ Google Apps Script Web App ของคุณ
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec";

    // =========================================================
    // 📦 1. ดึงข้อมูลเซสชันผู้ใช้
    // =========================================================
    let savedRole = "User";
    let savedName = "Admin";
    let savedProfile = "";
    let savedUsername = "";

    const sessionStr = localStorage.getItem('bnl_session');
    if (sessionStr) {
      try {
        const sessionData = JSON.parse(sessionStr);
        const userData = sessionData.data || sessionData.user || sessionData;
        if (userData) {
          savedRole = userData.role || userData.Role || "User";
          savedName = userData.name || userData.Name || "Admin";
          savedProfile = userData.profile_img || userData.profile || "";
          savedUsername = userData.username || "";
        }
      } catch (e) {
        console.error("❌ Error parsing bnl_session:", e);
      }
    }

    savedRole = savedRole.toString().trim();
    const checkRoleLower = savedRole.toLowerCase();

    // =========================================================
    // 🛡️ 2. ตรวจสอบสิทธิ์แสดงกล่องโพสต์
    // =========================================================
    if (checkRoleLower === "admin" || checkRoleLower === "ceo") {
      if (adminInputBox) adminInputBox.style.display = "flex";
    } else {
      if (adminInputBox) adminInputBox.style.display = "none";
    }

    let myNotifications = [];

    // =========================================================
    // 🌸 3. ฟังก์ชันดึงข้อมูลจาก Google Sheet (API GET)
    // =========================================================
    async function fetchNotifications() {
      notiListContainer.innerHTML = `
        <div class="empty-noti">
          <i class="fa-solid fa-spinner fa-spin"></i>
          <p>Loading notifications...</p>
        </div>`;
      
      btnRefresh.querySelector('i').classList.add('fa-spin');
      btnRefresh.disabled = true;

      try {
        const response = await fetch(SCRIPT_URL);
        if (!response.ok) throw new Error("Network response was not ok");
        
        myNotifications = await response.json();
        renderUI();
      } catch (error) {
        console.error("❌ Error fetching notifications:", error);
        notiListContainer.innerHTML = `
          <div class="empty-noti" style="color:#ff6b8b;">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <p>Failed to update. Please try again! 🥺</p>
          </div>`;
      } finally {
        btnRefresh.querySelector('i').classList.remove('fa-spin');
        btnRefresh.disabled = false;
      }
    }

    // =========================================================
    // 🎨 4. ฟังก์ชันจัดหน้า UI แสดงรายการแจ้งเตือน
    // =========================================================
    function renderUI() {
      if (myNotifications && myNotifications.length > 0) {
        notiListContainer.innerHTML = ""; 
        
        const sortedList = [...myNotifications].sort((a, b) => b.timestamp - a.timestamp);

        sortedList.forEach(noti => {
          const notiDate = new Date(noti.timestamp);
          const timeString = notiDate.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

          const checkRole = (noti.role || "").toLowerCase().trim();
          const showVerified = (checkRole === "admin" || checkRole === "ceo");
          const verifiedBadge = showVerified ? ` <svg style="width: 14px; height: 14px; fill: #0095f6; vertical-align: middle; margin-left: 4px; display: inline-block;" viewBox="0 0 24 24" title="Verified Member">
      <path d="M23,12L20.56,9.22L20.9,5.54L17.29,4.72L15.4,1.54L12,3L8.6,1.54L6.71,4.72L3.1,5.53L3.44,9.21L1,12L3.44,14.78L3.1,18.47L6.71,19.29L8.6,22.47L12,21L15.4,22.46L17.29,19.28L20.9,18.46L20.56,14.78L23,12M10,17 L6,13L7.41,11.59L10,14.17L16.59,7.58L18,9L10,17Z"/>
    </svg>` : '';

          const item = document.createElement("div");
          item.className = "noti-item unread"; 
          item.innerHTML = `
            <img src="${noti.avatar || 'https://lh3.googleusercontent.com/d/1rebp2F8vyP0nyvsEOFD9Nw2mPcRtVqtG=s1000'}" class="noti-avatar" alt="avatar">
            <div class="noti-content">
              <p class="noti-text"><strong>${noti.writer}</strong>${verifiedBadge} ${noti.action}</p>
              <div class="noti-time">${timeString}</div>
            </div>
          `;
          notiListContainer.appendChild(item);
        });
      } else {
        notiListContainer.innerHTML = `
          <div class="empty-noti">
            <i class="fa-regular fa-bell-slashed"></i>
            <p>No Notifications.</p>
          </div>`;
      }
    }

    // =========================================================
    // ✍️ 5. ระบบเพิ่มแจ้งเตือนใหม่ไปยัง Google Sheet และ Firebase (รวมโค้ดเรียบร้อย)
    // =========================================================
    if (btnAdd) {
      btnAdd.addEventListener("click", async () => {
        const actionInput = document.getElementById("input-action").value.trim();

        if (!actionInput) {
          alert("Please enter a notification message! 🥺");
          return;
        }

        btnAdd.disabled = true;
        btnAdd.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Posting...';

        const newNotification = {
          type: "add",
          writer: savedName,
          action: actionInput,
          avatar: savedProfile,
          role: savedRole, 
          timestamp: Date.now()
        };

        try {
          // 1. ส่งเข้า Google Sheets
          await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(newNotification)
          });

          // 2. ส่งสัญญาณ Realtime ไปให้ Firebase (ถ้าถูกสั่งเปิดใช้งานบนหน้านี้)
          if (window.firebaseDatabase && window.fbPush && window.fbRef) {
            const notiRef = window.fbRef(window.firebaseDatabase, 'notifications');
            await window.fbPush(notiRef, {
              writer: savedName,
              type: "system_alert",
              timestamp: Date.now()
            });
          }

          document.getElementById("input-action").value = "";
          await fetchNotifications();
        } catch (error) {
          console.error("❌ Error posting notification:", error);
          alert("Something went wrong, please try again! 😢");
        } finally {
          btnAdd.disabled = false;
          btnAdd.innerHTML = '<i class="fa-solid fa-plus"></i> Post Notification';
        }
      });
    }

    // =========================================================
    // 🗑️ 6. ระบบล้างข้อมูลแจ้งเตือนทั้งหมดออกจาก Google Sheet (แก้ไขให้ตรงปุ่ม Clear)
    // =========================================================
    if (btnReset) {
      btnReset.addEventListener("click", async () => {
        if (!confirm("Are you sure you want to clear all notifications? 🥺")) {
          return;
        }

        btnReset.disabled = true;
        btnReset.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Clearing...';

        try {
          // ส่งประเภทเป็น "clear" ไปให้ฝั่ง Google Apps Script ของคุณจัดการลบแถวข้อมูล
          await fetch(SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify({ type: "clear", timestamp: Date.now() })
          });

          await fetchNotifications();
          alert("All notifications cleared successfully! ✨");
        } catch (error) {
          console.error("❌ Error clearing notifications:", error);
          alert("Something went wrong, please try again! 😢");
        } finally {
          btnReset.disabled = false;
          btnReset.innerHTML = '<i class="fa-solid fa-trash"></i> Clear All';
        }
      });
    }

    // =========================================================
    // 🔄 7. ปุ่ม Refresh และการทำงานเมื่อเข้าสู่หน้าเว็บครั้งแรก
    // =========================================================
    btnRefresh.addEventListener("click", fetchNotifications);
    fetchNotifications();

    // เมื่อเปิดหน้านี้ ถือว่าอ่านแจ้งเตือนแล้ว ปิดจุดแจ้งเตือนภายในหน้า
    localStorage.setItem("blm48_has_new_noti", "false");
    const badgeElement = document.getElementById("noti-badge");
    if (badgeElement) {
      badgeElement.style.display = "none";
    }
  });
</script>
</body>
</html>
