<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLM48 | Awards of the month</title>
    <link class="brand-favicon" rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
    <meta name="theme-color" content="#ffdce0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Quicksand:wght@400;600;700&family=Caveat:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --blm-pink: #ff85a2;
            --text-dark: #2d2d2d;
            --text-muted: #666666;
            --line-color: #ffccd5;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Quicksand', 'Kanit', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            background-color: #ffffff;
        }

        /* 🌟 ส่วนบนสุด: พื้นหลังไล่สีพาสเทล (ชมพูไปฟ้าอมเขียว) */
        .hero-section {
            background: linear-gradient(145deg, #ffe0e6 0%, #e0f7fa 100%);
            padding: 20px 20px 40px 20px;
            text-align: center;
            position: relative;
        }

        /* ปุ่มกลับแบบใสๆ */
        .nav-back-transparent {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.2rem;
            color: var(--text-dark);
            text-decoration: none;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .hero-title {
            margin-top: 30px;
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* รูปภาพจำลองกราฟิกถ้วยรางวัล */
        .hero-illustration {
            position: relative;
            width: 220px;
            height: 150px;
            margin: 0 auto 20px auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .trophy-icon {
            font-size: 80px;
            color: #ffd700;
            text-shadow: 0 10px 20px rgba(255, 215, 0, 0.4);
            z-index: 2;
        }

        .floating-icon {
            position: absolute;
            color: var(--blm-pink);
            opacity: 0.8;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hero-desc {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        .hero-subdesc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        /* 📱 ส่วนเนื้อหาและจำลองหน้าจอ */
        .details-section {
            background-color: #ffffff;
            padding: 40px 20px;
            text-align: center;
        }

        .details-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .details-text {
            font-size: 0.95rem;
            color: var(--text-muted);
            max-width: 300px;
            margin: 0 auto 40px auto;
            line-height: 1.5;
        }

        /* 📱 CSS วาดโทรศัพท์ iPhone 17 Pro Max */
        .phone-mockup {
            border: 2px solid var(--line-color);
            border-radius: 40px; /* มุมมนแบบ Pro Max */
            width: 230px;
            height: 480px; /* ทรงยาวขึ้น */
            margin: 0 auto;
            position: relative;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.1);
        }

        /* Dynamic Island (รอยบากด้านบนแบบใหม่) */
        .dynamic-island {
            width: 70px;
            height: 22px;
            border: 2px solid var(--line-color);
            border-radius: 15px;
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        /* Home Indicator (แถบปัดหน้าจอด้านล่าง) */
        .home-indicator {
            width: 90px;
            height: 4px;
            background-color: var(--line-color);
            border-radius: 4px;
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }

        .phone-screen {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .screen-text {
            font-family: 'Caveat', cursive;
            color: var(--blm-pink);
            font-size: 26px;
            line-height: 1;
            margin-top: 55px; /* เว้นที่ให้ Dynamic Island */
            transform: rotate(-5deg);
        }

        /* 👫 รูปเงาไอดอลชาย-หญิง */
        .idols-silhouette {
            position: absolute;
            bottom: -5px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .male-idol {
            font-size: 170px;
            color: #e5e5e5;
            margin-right: -25px; /* ให้ยืนซ้อนกันนิดๆ */
            z-index: 1;
        }

        .female-idol {
            font-size: 155px;
            color: #d3d3d3; /* สีเข้มกว่านิดนึงให้ดูมีมิติ */
            z-index: 2;
        }

        .idol-sparkles {
            position: absolute;
            top: -40px;
            color: #ffb703;
            animation: float 2.5s infinite ease-in-out;
        }

        /* 📱 โทรศัพท์ส่วนครึ่งล่าง (iPhone 17 Pro Max) */
        .phone-half-mockup {
            border: 2px solid var(--line-color);
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            border-top: none;
            width: 230px;
            height: 120px;
            margin: 40px auto 0 auto;
            position: relative;
            background: #ffffff;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(255, 133, 162, 0.1);
        }

        .half-screen {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            background: linear-gradient(to bottom, #ffffff 30%, #ffe6eb 100%);
        }

        .tab-bar {
            width: 100%;
            height: 65px; /* สูงขึ้นเพื่อเว้นที่ให้แถบ Home */
            background: rgba(255, 255, 255, 0.95);
            border-top: 1px solid var(--line-color);
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            padding-top: 12px;
            color: #d3d3d3;
            font-size: 18px;
        }
        
        .tab-bar i.active {
            color: var(--blm-pink);
            transform: scale(1.15);
            transition: transform 0.2s ease;
        }

    </style>
</head>
<body>

    <!-- 🌟 ส่วนไล่สีด้านบน -->
    <div class="hero-section">
        <a href="javascript:history.back()" class="nav-back-transparent">
            <i class="fas fa-chevron-left"></i>
        </a>
        
        <div class="hero-title">Awards of the month</div>
        
        <!-- จำลองรูปถ้วยรางวัลและของตกแต่ง -->
        <div class="hero-illustration">
            <i class="fa-solid fa-gift floating-icon" style="top: 20px; left: 10px; font-size: 24px;"></i>
            <i class="fa-solid fa-heart floating-icon" style="top: 10px; right: 30px; font-size: 20px; animation-delay: 1s;"></i>
            <i class="fa-solid fa-star floating-icon" style="bottom: 30px; left: 30px; font-size: 18px; color: #ffb703; animation-delay: 2s;"></i>
            <i class="fa-solid fa-cake-candles floating-icon" style="bottom: 20px; right: 10px; font-size: 26px; animation-delay: 1.5s;"></i>
            
            <i class="fa-solid fa-trophy trophy-icon"></i>
        </div>

        <div class="hero-desc">
            Votes for your favorite member and get a chance to win amazing prizes from us!
        </div>
        <div class="hero-subdesc">
            Make your favorite members walk tall with pride!
        </div>
    </div>

    <!-- 📱 ส่วนแสดงดีไซน์แอป -->
    <div class="details-section">
        <div class="details-title">Member theme app</div>
        <div class="details-text">
            The lucky winner will be entitled to change the all theme of BLM48 web application
        </div>

        <!-- หน้าจอโทรศัพท์ 1 (จำลอง iPhone 17 Pro Max) -->
        <div style="position: relative; width: 230px; margin: 0 auto;">
            <div class="phone-mockup">
                <div class="dynamic-island"></div>
                <div class="phone-screen">
                    <div class="screen-text">Champ<br>of the month</div>
                    
                    <!-- ไอดอลชายและหญิง -->
                    <div class="idols-silhouette">
                        <i class="fa-solid fa-music idol-sparkles" style="left: 60px; font-size: 16px;"></i>
                        <i class="fa-solid fa-star idol-sparkles" style="right: 50px; animation-delay: 1s; font-size: 14px;"></i>
                        
                        <i class="fa-solid fa-person male-idol"></i>
                        <i class="fa-solid fa-person-dress female-idol"></i>
                    </div>
                </div>
                <div class="home-indicator"></div>
            </div>
        </div>

        <!-- หน้าจอโทรศัพท์ 2 (โชว์แค่ครึ่งล่าง ไอคอน Navbar ตามที่ขอ) -->
        <div class="phone-half-mockup">
            <div class="half-screen">
                <div class="tab-bar">
                    <i class="fa-solid fa-house"></i>
                    <i class="fa-solid fa-heart active"></i>
                    <i class="fa-solid fa-shop"></i>
                    <i class="fa-solid fa-bell"></i>
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
            <!-- แถบปัดหน้าจอด้านล่างทับ Navbar -->
            <div class="home-indicator" style="bottom: 8px;"></div>
        </div>

    </div>

</body>
</html>
