<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLM48 Membership | Champ of the Month</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
    <meta name="theme-color" content="#ffc0cb">
    
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s180">
    <link rel="icon" sizes="192x192" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s192">
    <meta name="apple-mobile-web-app-title" content="BLM48">   
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --blm-pink: #ff85a2;
            --blm-light-pink: #fff0f5;
            --bg-dreamy: #fdf6f7;
            --text-dark: #4a4a4a;
            --text-muted: #8e8e8e;
            --glass-card: rgba(255, 255, 255, 0.85);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: var(--bg-dreamy);
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 192, 203, 0.4) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(255, 240, 245, 0.6) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        /* 📡 Top Navbar แบบกว้างเต็มพื้นที่ (Full Width) ถอดแบบจาก Inventory.html */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 2px 10px rgba(255, 133, 162, 0.08);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .nav-back-btn {
            color: var(--blm-pink);
            font-size: 1.1rem;
            text-decoration: none;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--blm-light-pink);
            transition: all 0.2s ease;
        }

        .nav-back-btn:active {
            transform: scale(0.9);
        }

        .nav-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--blm-pink);
            letter-spacing: 0.5px;
        }

        .nav-spacer { width: 35px; }

        /* 🌸 Main Container แบบปรับขนาดเต็มอ้อมอกตามสไตล์ Inventory */
       .main-container {
    width: 100%;
    padding: 85px 20px 40px 20px;
    display: block; /* เปลี่ยนจาก flex เป็น block เพื่อให้ Grid คุมตัวเองง่ายขึ้น */
}

        /* 🏆 Grid Layout: จัดหมวดหมู่การ์ดแชมป์ให้จัดเรียงตามขนาดหน้าจอคอม/มือถือ */
        .champ-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); /* ใช้ auto-fit เพื่อให้การ์ดขยับมากลางอัตโนมัติ */
        gap: 20px;
        justify-items: center; /* ช่วยให้การ์ดจัดกึ่งกลางในช่องของตัวเอง */
        justify-content: center; /* ช่วยให้กลุ่มการ์ดทั้งหมดอยู่ตรงกลางหน้าจอ */
        max-width: 1200px; /* กำหนดเพดานความกว้างไม่ให้ยืดเต็มขอบจอจนเกินไป */
        margin: 0 auto;    /* สั่งให้ Container หลักอยู่ตรงกลางหน้าจอ */
    }

        /* เมื่อเปิดบนจอ Tablet หรือ Desktop จะขยายแบ่งเป็นสัดส่วนที่สวยงาม */
        @media (min-width: 768px) {
            .champ-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (min-width: 1200px) {
            .champ-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* ✨ การ์ดทำเนียบแชมป์สไตล์กระจกใส ขยายตามช่อง Grid */
        .champ-card {
            background: var(--glass-card);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.6); 
            padding: 20px;
            box-shadow: 0 8px 25px rgba(255, 133, 162, 0.06);
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation: fadeInUp 0.5s ease-out backwards;
            height: 100%; /* ให้การ์ดทุกใบในแถวสูงเท่ากัน */
        }

        /* 👑 ส่วนหัวการ์ด */
        .month-badge-wrap {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .month-text {
            background: linear-gradient(45deg, #ff85a2, #ffa1b8);
            color: white;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 4px 14px;
            border-radius: 50px;
            box-shadow: 0 3px 8px rgba(255, 133, 162, 0.15);
        }

        .crown-icon {
            color: #ffb703;
            font-size: 1.2rem;
            filter: drop-shadow(0 2px 4px rgba(255, 183, 3, 0.25));
        }

        /* 👩🏼‍💼 ข้อมูลโปรไฟล์เมมเบอร์ */
        .profile-holder {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar-frame {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff85a2, #ffe4e1, #ffb6c1);
            padding: 2.5px;
            box-shadow: 0 3px 10px rgba(255, 133, 162, 0.12);
            flex-shrink: 0;
        }

        .member-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-color: #fff;
        }

        .member-meta h2 {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .cookie-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--blm-light-pink);
            color: var(--blm-pink);
            font-size: 0.8rem;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 10px;
            margin-top: 3px;
        }

        /* 💬 กล่องความรู้สึก */
        .thankyou-bubble {
            background: rgba(255, 240, 245, 0.4);
            border-left: 3.5px solid var(--blm-pink);
            padding: 12px 14px;
            border-radius: 4px 16px 16px 16px;
            font-size: 0.88rem;
            line-height: 1.5;
            color: #555;
            white-space: pre-line;
            word-break: break-word;
            flex-grow: 1; /* ดันให้พื้นที่เนื้อหาขยายบาลานซ์กับการ์ดใบอื่น */
        }

        /* 🖼️ กล่องภาพโพสต์เฉลิมฉลอง */
        .post-img-container {
            width: 100%;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            background: #fbfbfb;
            display: none;
            margin-top: auto; /* ดันให้อยู่ขอบล่างของการ์ดเสมอเพื่อความเท่ากัน */
        }

        .post-main-img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
            display: block;
        }

        /* 💫 Skeleton Grid โหลดเอฟเฟกต์ */
        .skeleton-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.01);
        }

        .skeleton-anim {
            background: linear-gradient(90deg, #f3f3f3 25%, #eaeaea 37%, #f3f3f3 63%);
            background-size: 400% 100%;
            animation: skeleton-loading 1.4s ease infinite;
            border-radius: 6px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            grid-column: 1 / -1; /* ให้ข้อความแจ้งเตือนอยู่กลางหน้าจอไม่เอียงซ้าย */
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <a href="index.html" class="nav-back-btn">
            <i class="fas fa-chevron-left"></i>
        </a>
        <div class="nav-title">Champ of the Month</div>
        <div class="nav-spacer"></div>
    </div>

    <div class="main-container">
        <div class="champ-grid" id="champ-list-wrapper">
            
            <div class="skeleton-card">
                <div style="display:flex; justify-content:space-between;">
                    <div class="skeleton-anim" style="width: 90px; height: 22px; border-radius: 20px;"></div>
                    <div class="skeleton-anim" style="width: 20px; height: 20px; border-radius: 50%;"></div>
                </div>
                <div style="display: flex; gap: 14px; align-items: center;">
                    <div class="skeleton-anim" style="width: 55px; height: 55px; border-radius: 50%;"></div>
                    <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
                        <div class="skeleton-anim" style="width: 35%; height: 18px;"></div>
                        <div class="skeleton-anim" style="width: 50%; height: 14px;"></div>
                    </div>
                </div>
                <div class="skeleton-anim" style="width: 100%; height: 60px;"></div>
            </div>

        </div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec';

        async function loadChampHistoryData() {
            try {
                const response = await fetch(`${scriptURL}?action=getChampOfTheMonth`);
                const result = await response.json();

                if (result.status === "success") {
                    renderChampCards(result.data);
                } else {
                    showErrorState(result.message || "เกิดข้อผิดพลาดในการโหลดข้อมูลโครงสร้างระบบ");
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                showErrorState("ระบบติดต่อตารางข้อมูลขัดข้อง กรุณาลองใหม่อีกครั้งนะงับ");
            }
        }

        function renderChampCards(champArray) {
            const container = document.getElementById('champ-list-wrapper');
            container.innerHTML = ''; 

            if (!champArray || champArray.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-regular fa-star" style="font-size:1.8rem; color:var(--blm-pink); margin-bottom:10px; display:block;"></i>
                        ยังไม่มีประวัติทำเนียบแชมป์ในขณะนี้ค่ะ 🌟
                    </div>`;
                return;
            }

            champArray.forEach((champ, index) => {
                const card = document.createElement('div');
                card.className = 'champ-card';
                card.style.animationDelay = `${index * 0.08}s`;

                const formatCookieCount = Number(champ.totalCookie).toLocaleString();
                const avatarImg = champ.profileImage ? champ.profileImage : 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150';

                card.innerHTML = `
                    <div class="month-badge-wrap">
                        <span class="month-text"><i class="fa-regular fa-calendar-stars" style="margin-right:5px;"></i>${champ.monthYear}</span>
                        <i class="fa-solid fa-crown crown-icon"></i>
                    </div>
                    
                    <div class="profile-holder">
                        <div class="avatar-frame">
                            <img class="member-avatar" src="${avatarImg}" alt="${champ.name}" onerror="this.src='https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150'">
                        </div>
                        <div class="member-meta">
                            <h2>${champ.name}</h2>
                            <div class="cookie-badge">
                                <i class="fa-solid fa-cookie"></i> ${formatCookieCount} Cookies
                            </div>
                        </div>
                    </div>

                    ${champ.message ? `<div class="thankyou-bubble">${escapeHtml(champ.message)}</div>` : ''}
                    
                    <div class="post-img-container" id="container-img-${index}">
                        <img class="post-main-img" src="${champ.postImage}" alt="Champ Post Artwork" id="img-post-${index}">
                    </div>
                `;

                container.appendChild(card);

                if (champ.postImage && champ.postImage.trim() !== "") {
                    const imgBox = document.getElementById(`container-img-${index}`);
                    const imgTag = document.getElementById(`img-post-${index}`);
                    if (imgBox && imgTag) {
                        imgBox.style.display = "block";
                    }
                }
            });
        }

        function showErrorState(msg) {
            const container = document.getElementById('champ-list-wrapper');
            container.innerHTML = `<div class="empty-state" style="color:var(--blm-pink);"><i class="fa-solid fa-triangle-exclamation" style="font-size:1.3rem; margin-bottom:6px;"></i><br>${msg}</div>`;
            Swal.fire({
                title: 'เกิดข้อผิดพลาด!',
                text: msg,
                icon: 'error',
                confirmButtonColor: '#ff85a2',
                confirmButtonText: 'ตกลง'
            });
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, "&")
                .replace(/</g, "<")
                .replace(/>/g, ">")
                .replace(/"/g, "")
                .replace(/'/g, "'");
        }

        window.addEventListener('DOMContentLoaded', loadChampHistoryData);
    </script>
</body>
</html>
