<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLM48 Membership | View special thanks</title>
    <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
    <meta name="theme-color" content="#ffc0cb">
    
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s180">
    <link rel="icon" sizes="192x192" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s192">
    <meta name="apple-mobile-web-app-title" content="BLM48">   
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://script.google.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --blm-pink: #ff85a2;
            --blm-light-pink: #fff0f5;
            --bg-dreamy: #fdf6f7;
            --text-dark: #4a4a4a;
            --text-muted: #9e9e9e;
            --glass-card: rgba(255, 255, 255, 0.9);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            /* 🎯 ปรับให้ใช้ Fredoka สำหรับอังกฤษ และ Prompt สำหรับไทย เหมือนหน้าแรก */
            font-family: 'Quicksand', 'Kanit', sans-serif;
            background-color: var(--bg-dreamy);
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 192, 203, 0.3) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(255, 240, 245, 0.5) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
        }

        /* 📡 Top Navbar */
        .top-navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 2px 10px rgba(255, 133, 162, 0.06);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
        }

        .nav-back-btn {
            color: var(--blm-pink);
            font-size: 1.1rem;
            text-decoration: none;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--blm-light-pink);
        }

        .nav-title {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--blm-pink);
            letter-spacing: 0.5px;
        }

        .nav-spacer { width: 35px; }

        .main-container {
            width: 100%;
            padding: 5px 16px 40px 16px;
        }

        .champ-list-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
      
      /* เพิ่มส่วนนี้เข้าไปเพื่อให้กล่องขยายใหญ่ขึ้นบนจอคอมและ iPad */
@media (min-width: 768px) {
    .champ-row-box {
        padding: 20px 30px; /* เพิ่ม Padding ให้กล่องดูหนาขึ้น */
        border-radius: 20px;
    }

    .avatar-frame {
        width: 85px;  /* ขยายรูปโปรไฟล์ให้ใหญ่ขึ้น */
        height: 85px;
    }

    .member-name {
        font-size: 1.4rem; /* ขยายฟอนต์ชื่อเมมเบอร์ */
    }

    .cookie-amount {
        font-size: 1rem; /* ขยายฟอนต์ตัวเลขคุกกี้ */
    }

    .view-thanks-btn {
        padding: 10px 20px; /* ขยายปุ่มกด */
        font-size: 0.95rem;
    }
}

        /* ✨ กล่องแถวสไตล์ IAM48 */
        .champ-row-box {
            background: var(--glass-card);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 14px 16px;
            box-shadow: 0 4px 15px rgba(255, 133, 162, 0.04);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            animation: fadeInRow 0.4s ease-out backwards;
            transition: transform 0.2s ease;
        }

        .champ-row-box:active {
            transform: scale(0.99);
        }

        .box-left-side {
            display: flex;
            align-items: center;
            gap: 14px;
            flex: 1;
            min-width: 0;
        }

        .avatar-frame {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff85a2, #ffe4e1, #ffb6c1);
            padding: 2.5px;
            box-shadow: 0 3px 8px rgba(255, 133, 162, 0.1);
            flex-shrink: 0;
            position: relative;
        }

        .member-avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-color: #fff;
        }

        .crown-mini {
            position: absolute;
            top: -5px;
            left: -2px;
            color: #ffb703;
            font-size: 0.95rem;
            transform: rotate(-20deg);
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.15));
        }

        .member-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .period-text {
            font-size: 0.8rem;
            color: var(--blm-pink);
            font-weight: 500;
        }

        .member-name {
            margin: 0;
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cookie-amount {
            font-size: 0.88rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }

        .cookie-amount i {
            color: #ff85a2;
            font-size: 0.8rem;
        }

        .box-right-side {
            flex-shrink: 0;
        }

        .view-thanks-btn {
            background: var(--blm-light-pink);
            color: var(--blm-pink);
            border: 1px solid rgba(255, 133, 162, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s ease;
        }

        .view-thanks-btn:hover {
            background: var(--blm-pink);
            color: white;
        }

        /* 💫 Skeleton Row */
        .skeleton-row {
            background: white;
            border-radius: 16px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .skeleton-anim {
            background: linear-gradient(90deg, #f3f3f3 25%, #eaeaea 37%, #f3f3f3 63%);
            background-size: 400% 100%;
            animation: skeleton-loading 1.4s ease infinite;
            border-radius: 4px;
        }

        @keyframes skeleton-loading {
            0% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeInRow {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }
      
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50px;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            border-bottom: 1px solid #ffe4e8;
            z-index: 999;
            padding-top: env(safe-area-inset-top); /* รองรับรอยบากด้านบน */
          }

      .back-btn {
          background: none;
          border: none;
          color: #ff85a2;
          font-size: 1.2rem;
          cursor: pointer;
        }

      .header-title {
          font-weight: bold;
          color: #333;
          font-size: 1rem;
        }

      /* เพิ่ม padding-top ให้เนื้อหาในหน้าย่อยเพื่อไม่ให้โดน Header บัง */
      body {
        padding-top: 60px;
      }
    </style>
</head>
<body>

    <div class="app-header">
  <button class="back-btn" onclick="history.back()">
    <i class="fa-solid fa-chevron-left"></i>
  </button>
  <div class="header-title"> Champ of the Month</div>
  <div class="header-right"></div> </div>

    <div class="main-container">
        <div class="champ-list-container" id="champ-list-wrapper">
            
            <div class="skeleton-row">
                <div style="display:flex; align-items:center; gap:14px; flex:1;">
                    <div class="skeleton-anim" style="width:65px; height:65px; border-radius:50%;"></div>
                    <div style="display:flex; flex-direction:column; gap:6px; flex:1;">
                        <div class="skeleton-anim" style="width:40%; height:12px;"></div>
                        <div class="skeleton-anim" style="width:60%; height:16px;"></div>
                        <div class="skeleton-anim" style="width:30%; height:12px;"></div>
                    </div>
                </div>
                <div class="skeleton-anim" style="width:85px; height:28px; border-radius:20px;"></div>
            </div>

        </div>
    </div>

    <script>
      const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec';
let globalChampData = [];

async function loadChampHistoryData() {
    // 1. ดึงข้อมูลจาก Cache มาโชว์ก่อนทันที ถ้ามี! (Cache-First)
    const cachedData = sessionStorage.getItem('blm_champ_history');
    if (cachedData) {
        globalChampData = JSON.parse(cachedData);
        renderChampRows(globalChampData); // แสดงผลทันทีไม่ต้องรอโหลด
    }

    try {
        // 2. ดึงข้อมูลอัปเดตจากหลังบ้านเงียบๆ
        const response = await fetch(`${scriptURL}?action=getChampOfTheMonth`);
        const result = await response.json();

        if (result.status === "success") {
            // เช็กว่าข้อมูลใหม่กับข้อมูลใน Cache ต่างกันไหม ถ้าต่างกันค่อย Render ใหม่
            if (JSON.stringify(globalChampData) !== JSON.stringify(result.data)) {
                globalChampData = result.data;
                sessionStorage.setItem('blm_champ_history', JSON.stringify(globalChampData));
                renderChampRows(globalChampData);
            }
        } else {
            if (!cachedData) {
                document.getElementById('champ-list-wrapper').innerHTML = `<div class="empty-state">โหลดข้อมูลล้มเหลว: ${result.message}</div>`;
            }
        }
    } catch (error) {
        console.error("Fetch Error:", error);
        if (!cachedData) {
            document.getElementById('champ-list-wrapper').innerHTML = `<div class="empty-state">ระบบขัดข้อง กรุณาลองใหม่อีกครั้งงับ</div>`;
        }
    }
}

function renderChampRows(champArray) {
    const container = document.getElementById('champ-list-wrapper');
    container.innerHTML = ''; 

    if (!champArray || champArray.length === 0) {
        container.innerHTML = `<div class="empty-state">ยังไม่มีประวัติทำเนียบแชมป์ในขณะนี้ค่ะ 🌟</div>`;
        return;
    }

    // 3. ใช้ DocumentFragment เพื่อความเร็วในการสร้าง DOM
    const fragment = document.createDocumentFragment();

    champArray.forEach((champ, index) => {
        const row = document.createElement('div');
        row.className = 'champ-row-box';
        row.style.animationDelay = `${index * 0.05}s`;

        const formatCookieCount = Number(champ.totalCookie).toLocaleString();
        const avatarImg = champ.profileImage ? champ.profileImage : 'https://lh3.googleusercontent.com/d/1rebp2F8vyP0nyvsEOFD9Nw2mPcRtVqtG=s400';

        row.innerHTML = `
            <div class="box-left-side">
                <div class="avatar-frame">
                    <i class="fa-solid fa-crown crown-mini"></i>
                    <img class="member-avatar" loading="lazy" src="${avatarImg}" alt="${champ.name}" onerror="this.src='https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=150'">
                </div>
                <div class="member-details">
                    <span class="period-text"><i class="fa-regular fa-calendar" style="margin-right:3px;"></i> ${champ.monthYear}</span>
                    <h2 class="member-name">${champ.name}</h2>
                    <span class="cookie-amount"><i class="fa-solid fa-cookie"></i> ${formatCookieCount} Cookies</span>
                </div>
            </div>
            <div class="box-right-side">
                <a href="specialthanks.html?index=${index}" class="view-thanks-btn">
                    View special thanks <i class="fa-solid fa-arrow-right" style="font-size:0.7rem; margin-left:1px;"></i>
                </a>
            </div>
        `;
        fragment.appendChild(row);
    });
    
    // โยน Fragment ลงไปที่หน้าจอในครั้งเดียว
    container.appendChild(fragment);
}

window.addEventListener('DOMContentLoaded', loadChampHistoryData);
    </script>
</body>
  
</html>
