<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - BLM48 Membership</title>
   <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
    <meta name="theme-color" content="#ffc0cb">
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s180">
    <link rel="icon" sizes="192x192" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s192">
    <meta name="apple-mobile-web-app-title" content="BLM48">   
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Quicksand:wght@400;500;600;700&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      /* 🌟 ใช้ฟอนต์คู่ Quicksand (Eng) + Kanit (ไทย) */
      font-family: 'Quicksand', 'Kanit', sans-serif;
      background: linear-gradient(135deg, #ffe5ec 0%, #fff0f3 50%, #f0e6ff 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* 📦 กล่องคอนเทนเนอร์หลัก ยึดสไตล์มินิมอลฟรุ้งฟริ้งตามเรฟ */
    .login-container {
      width: 90%;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      padding: 40px 30px;
      border-radius: 30px;
      /* เงาฟุ้งแบบละมุน (Soft Dreamy Shadow) ไม่หนาเทอะทะ */
      box-shadow: 0 15px 35px rgba(255, 141, 161, 0.15);
      text-align: center;
    }

    .btn-login-main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      height: 45px;
      text-decoration: none;
      background: #ff85a2;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3);
      font-size: 16px;
      box-sizing: border-box;
      transition: transform 0.2s, opacity 0.2s;
      margin-top: 10px;
    }

    .btn-login-main:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .btn-login-main:active {
      transform: translateY(0);
    }
    
     .divider {
      margin: 25px 0;
      display: flex;
      align-items: center;
      color: #ccc;
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #ffe5ec;
      margin: 0 10px;
    }

     .note-text {
      font-size: 12px;
      color: #999;
      margin-top: 20px;
      line-height: 1.6;
    }

    /* 🌸 ส่วนหัวของหน้าจอ */
    .brand-logo {
      width: 65px;
      height: 65px;
      background: linear-gradient(135deg, #ff85a2, #ffb3c6);
      color: white;
      font-size: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 22px;
      margin-bottom: 18px;
      box-shadow: 0 8px 20px rgba(255, 133, 162, 0.3);
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      color: #4a4a4a;
      margin: 0 0 6px 0;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 13px;
      color: #9b9b9b;
      margin: 0 0 30px 0;
      font-weight: 400;
    }

    /* ✏️ การจัดฟอร์มและองค์ประกอบ Input */
    .form-group {
      text-align: left;
      margin-bottom: 20px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #ff85a2;
      margin-left: 14px;
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #ffc2d1;
      font-size: 16px;
      transition: color 0.3s;
    }

    .cute-input {
      width: 100%;
      height: 48px;
      background: rgba(255, 255, 255, 0.9);
      border: 1.5px solid #ffe5ec;
      border-radius: 24px;
      padding: 0 20px 0 46px;
      font-family: 'Quicksand', 'Kanit', sans-serif;
      font-size: 14px;
      color: #555;
      outline: none;
      transition: all 0.3s ease;
    }

    /* เอฟเฟกต์ตอนกดพิมพ์ */
    .cute-input:focus {
      border-color: #ff85a2;
      background: #ffffff;
      box-shadow: 0 5px 15px rgba(255, 133, 162, 0.1);
    }

    .cute-input:focus + i {
      color: #ff85a2;
    }

    /* 💗 ปุ่มกดแบบ Rounded และมีความวาวกระจายตัว */
    .btn-login {
      width: 100%;
      height: 48px;
      background: linear-gradient(90deg, #ff85a2, #ff9bb5);
      color: white;
      border: none;
      border-radius: 24px;
      font-family: 'Quicksand', 'Kanit', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(255, 133, 162, 0.35);
      margin-top: 10px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(255, 133, 162, 0.45);
      opacity: 0.95;
    }

    .btn-login:active {
      transform: translateY(0);
    }

    /* 🔙 ปุ่มย้อนกลับลิงก์ด้านล่าง */
    .back-to-home {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 25px;
      font-size: 13px;
      color: #b5b5b5;
      text-decoration: none;
      transition: color 0.3s;
      font-weight: 500;
    }

    .back-to-home:hover {
      color: #ff85a2;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="brand-logo">
      <i class="fas fa-heart animate__animated animate__heartBeat animate__infinite"></i>
    </div>
    
    <h1 class="title">BLM48 Login</h1>
    <p class="subtitle"></p>

    <form id="loginForm">
      
      <div class="form-group">
        <label for="username">Membership ID</label>
        <div class="input-wrapper">
          <input type="text" id="username" class="cute-input" placeholder="กรอกรหัสสมาชิก" required autocomplete="username">
          <i class="fas fa-id-badge"></i>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" class="cute-input" placeholder="กรอกรหัสผ่าน" required autocomplete="current-password">
          <i class="fas fa-lock"></i>
        </div>
      </div>

      <button type="submit" class="btn-login">
        Sign In <i class="fas fa-arrow-right"></i>
      </button>

    </form>
    <div class="divider">หรือถ้ายังไม่มีบัญชี</div>

    <a href="https://line.me/R/ti/p/@569rnpsj?from=page&liff.referrer=https%3A%2F%2Flinktr.ee%2F&searchId=569rnpsj" 
       target="_blank" 
       class="btn-login-main" 
       style="background: #06C755; box-shadow: 0 4px 10px rgba(6, 199, 85, 0.3);">
      <i class="fab fa-line" style="font-size: 20px;"></i> สมัครสมาชิกผ่าน LINE ฟรี
    </a>

    <p class="note-text">
      หมายเหตุ : ติดต่อสมัคร BLM48 Membership ฟรี<br>
      ได้ทาง BLM48 Line ID : @569rnpsj
    </p>

  </div>

 <script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const userVal = document.getElementById('username').value;
      const passVal = document.getElementById('password').value;

      // URL ของ Web App Google Apps Script ของพี่เอ็มมี่
      const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec';

      Swal.fire({
        title: 'กำลังตรวจสอบข้อมูล...',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); }
      });

      // ส่ง Request ไปตรวจสอบล็อกอินที่ Sheets
      fetch(`${scriptURL}?action=login&username=${encodeURIComponent(userVal)}&password=${encodeURIComponent(passVal)}`)
        .then(response => response.json())
        .then(result => {
          if (result.success) {
            
            // 👑 ตั้งเวลาหมดอายุเซสชัน 90 วัน ให้แมตช์กับระบบหลักของพี่เอ็มมี่
            const expireTime = new Date().getTime() + (90 * 24 * 60 * 60 * 1000); 
            
            // 🎯 จัดโครงสร้าง Object (data และ expiry) ให้ตรงกับฟังก์ชัน getUserSession() เป๊ะๆ
            const sessionData = {
              data: result.data,   
              expiry: expireTime   
            };

            // บันทึกลง localStorage ในคีย์ bnl_session เพื่อให้อินเด็กซ์เอาไปแกะใช้งานต่อได้
            localStorage.setItem('bnl_session', JSON.stringify(sessionData));

            Swal.fire({
              icon: 'success',
              title: 'ยินดีต้อนรับ',
              text: `สวัสดีค่ะคุณ ${result.data.name}`,
              showConfirmButton: false,
              timer: 1500,
              didOpen: () => {
                Swal.getPopup().style.fontFamily = "'Quicksand', 'Kanit', sans-serif";
                Swal.getPopup().style.borderRadius = "20px";
              }
            }).then(() => {
              // 🎯 หมายเหตุ: ถ้าไฟล์หน้าหลักชื่อ index (1).html ให้เปลี่ยนตรงนี้เป็น 'index (1).html' นะครับ
              window.location.href = 'index.html'; 
            });
          } else {
            Swal.fire({
              icon: 'error',
              title: 'ล็อกอินล้มเหลว',
              text: result.message || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง',
              confirmButtonColor: '#ff85a2',
              didOpen: () => {
                Swal.getPopup().style.fontFamily = "'Quicksand', 'Kanit', sans-serif";
                Swal.getPopup().style.borderRadius = "20px";
              }
            });
          }
        })
        .catch(err => {
          console.error(err);
          Swal.fire({
            icon: 'error',
            title: 'Error',
            text: 'ไม่สามารถเชื่อมต่อระบบฐานข้อมูลได้',
            confirmButtonColor: '#ff85a2'
          });
        });
  });
</script>
</body>
</html>
