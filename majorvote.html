<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta charset="UTF-8">
  <title>BLM48 Major Vote</title>
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
  <meta name="theme-color" content="#ffc0cb">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    /* =========================================
       1. Base Styles & Layout
       ========================================= */
    :root {
      --primary-pink: #ff85a2;
      --soft-pink: #ffe4e1;
      --bg-color: #fff5f6;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body { 
      font-family: 'Quicksand', 'Kanit', sans-serif; 
      background-color: var(--bg-color); 
      margin: 0; padding: 0;
      min-height: 100vh;
      padding-top: 70px; padding-bottom: 30px;
    }

    /* Navbar */
    .navbar {
      position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
      background-color: #ffffff;
      box-shadow: 0 2px 10px rgba(255, 133, 162, 0.08);
      padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
    }
    .logo-container { display: flex; align-items: center; gap: 10px; }
    .btn-back { color: var(--primary-pink); font-size: 1.2rem; text-decoration: none; }
    .logo-text { font-size: 20px; font-weight: bold; color: var(--primary-pink); letter-spacing: 1px; }

    /* =========================================
       2. Wallet Section (image_272ffb.jpg)
       ========================================= */
    .wallet-container {
      background: white; margin: 15px 20px; padding: 15px; border-radius: 20px;
      box-shadow: 0 4px 15px rgba(255, 133, 162, 0.1);
      display: flex; justify-content: space-between; align-items: center;
      border: 2px solid var(--soft-pink);
    }
    .wallet-balance { display: flex; align-items: center; gap: 10px; }
    .wallet-icon { font-size: 28px; color: #ffb3c1; }
    .wallet-amount { font-size: 24px; font-weight: 700; color: #444; line-height: 1; }
    .wallet-label { font-size: 11px; color: #888; font-weight: 600; }
    .wallet-actions { display: flex; gap: 8px; }
    .btn-action {
      padding: 8px 12px; border-radius: 12px; font-size: 12px; font-weight: 600;
      text-decoration: none; display: flex; align-items: center; gap: 5px;
      border: none; cursor: pointer; transition: 0.2s;
    }
    .btn-redeem { background: #4dabf7; color: white; box-shadow: 0 4px 10px rgba(77,171,247,0.2); }
    .btn-history { background: #f0f0f0; color: #555; }

    /* =========================================
       3. Cover Banner (image_272fdd.jpg)
       ========================================= */
    .vote-cover-section {
      margin: 0 20px 20px 20px; background: white; border-radius: 24px;
      overflow: hidden; box-shadow: 0 6px 20px rgba(255, 133, 162, 0.15);
      position: relative;
    }
    .vote-cover-img { width: 100%; height: 200px; object-fit: cover; display: block; background: #eee; }
    .vote-info { padding: 20px; text-align: center; }
    .vote-status-badge {
      position: absolute; top: 15px; right: 15px;
      background: rgba(255, 107, 139, 0.9); color: white;
      padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 700;
      backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .vote-status-closed { background: rgba(100, 100, 100, 0.9) !important; }
    .vote-title { font-size: 22px; font-weight: 700; color: var(--primary-pink); margin: 0 0 10px 0; }
    .vote-desc { font-size: 13px; color: #666; margin-bottom: 15px; line-height: 1.5; }
    .countdown-box {
      background: #fff0f3; padding: 10px; border-radius: 15px;
      display: inline-block; border: 1px dashed var(--primary-pink);
    }
    .countdown-text { font-size: 14px; font-weight: 700; color: var(--primary-pink); }

    /* =========================================
       4. Candidates Grid 3 Columns (image_272fc1.jpg)
       ========================================= */
    .section-title {
      font-family: 'Kanit', sans-serif; font-weight: 600; color: #444; 
      margin: 30px 0 15px 20px; font-size: 18px; 
      border-left: 5px solid var(--primary-pink); padding-left: 12px; 
    }
    .candidates-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 0 20px; }
    .candidate-card {
      background: white; border-radius: 20px; padding: 15px 8px; text-align: center;
      box-shadow: 0 4px 12px rgba(255, 133, 162, 0.05); border: 1px solid #ffeef2;
      transition: transform 0.2s; cursor: pointer; position: relative;
    }
    .candidate-card:active { transform: scale(0.95); }
    .candidate-img-wrapper {
      width: 70px; height: 70px; margin: 0 auto 10px; border-radius: 50%; padding: 3px;
      background: linear-gradient(135deg, var(--primary-pink), #ffb3c1);
    }
    .candidate-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid white; }
    .candidate-name { font-size: 13px; font-weight: 700; color: #444; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .btn-vote-small {
      margin-top: 8px; background: var(--primary-pink); color: white; border: none;
      padding: 5px 10px; border-radius: 15px; font-size: 11px; font-weight: 600; width: 100%; cursor: pointer;
    }
    .ranking-score { font-size: 12px; color: var(--primary-pink); font-weight: 700; margin-top: 6px; display: none; }

    /* Shimmer Loading Effect */
    .shimmer { background: linear-gradient(90deg, #eff1f3 4%, #e2e6ea 25%, #eff1f3 36%); background-size: 1200px 100%; animation: shimmer 1.5s infinite linear; }
    @keyframes shimmer { 0% { background-position: -1200px 0; } 100% { background-position: 1200px 0; } }

    /* =========================================
       5. Modal Overlay & Thank You Card (image_272fbb.jpg / image_272d18.jpg)
       ========================================= */
    #modal-overlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 2000;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-box {
      background: #ffffff; width: 100%; max-width: 340px; border-radius: 32px;
      padding: 30px 25px; text-align: center; box-shadow: 0 20px 40px rgba(255, 107, 139, 0.2);
      position: relative; animation: popupScale 0.3s ease-out;
    }
    @keyframes popupScale { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .modal-close { position: absolute; top: 15px; right: 20px; font-size: 20px; color: #ccc; cursor: pointer; }
    
    .vote-target-img { width: 90px; height: 90px; border-radius: 50%; object-fit: cover; border: 4px solid var(--soft-pink); margin-bottom: 10px; }
    .vote-target-name { font-size: 20px; font-weight: 700; color: #444; margin-bottom: 20px; }
    
    .cute-input-group { position: relative; margin-bottom: 20px; }
    .cute-input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary-pink); font-size: 18px; }
    .cute-input {
      width: 100%; padding: 15px 15px 15px 45px; border: 2px solid #ffe3e8; border-radius: 16px;
      font-family: 'Quicksand', 'Kanit', sans-serif; font-size: 16px; font-weight: 600; color: #444;
      text-align: center; outline: none; transition: 0.3s;
    }
    .cute-input:focus { border-color: var(--primary-pink); box-shadow: 0 0 0 4px rgba(255, 133, 162, 0.15); }
    
    .btn-submit-vote {
      width: 100%; background: var(--primary-pink); color: white; border: none;
      padding: 15px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer;
      box-shadow: 0 6px 15px rgba(255, 133, 162, 0.3); transition: 0.2s;
    }
    .btn-submit-vote:active { transform: scale(0.96); }
    .btn-submit-vote:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

    .ty-card-img { width: 100%; border-radius: 16px; margin-top: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    .ty-message { font-size: 13px; color: #ff85a2; margin-top: 12px; font-weight: 600; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="logo-container">
    <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
    <span class="logo-text">Major Vote</span>
  </div>
  <a href="inventory.html" style="color: var(--primary-pink); font-size: 1.2rem;"><i class="fas fa-briefcase"></i></a>
</nav>

<!-- Wallet Container -->
<div class="wallet-container">
  <div class="wallet-balance">
    <i class="fas fa-coins wallet-icon"></i>
    <div>
      <div class="wallet-label">My Tokens</div>
      <div class="wallet-amount" id="user-tokens">...</div>
    </div>
  </div>
  <div class="wallet-actions">
    <button class="btn-action btn-history" onclick="window.location.href='history.html'"><i class="fas fa-history"></i></button>
    <button class="btn-action btn-redeem" onclick="window.location.href='redeem.html'"><i class="fas fa-gift"></i> Redeem</button>
  </div>
</div>

<!-- Cover Banner กิจกรรม -->
<div class="vote-cover-section">
  <div class="vote-status-badge" id="vote-status">LOADING</div>
  <img src="" alt="Vote Cover" class="vote-cover-img" id="vote-cover">
  <div class="vote-info">
    <h2 class="vote-title" id="vote-title">Loading...</h2>
    <p class="vote-desc" id="vote-desc">กำลังโหลดข้อมูลกิจกรรมโหวต กรุณารอสักครู่...</p>
    <div class="countdown-box">
      <i class="fas fa-clock" style="color: var(--primary-pink); margin-right: 5px;"></i>
      <span class="countdown-text" id="vote-time">-- : --</span>
    </div>
  </div>
</div>

<!-- รายชื่อ Candidate -->
<div class="section-title">Candidates</div>
<div class="candidates-grid" id="candidates-container">
  <!-- Shimmer Loading ตัวอย่างตอนรอข้อมูล -->
  <div class="candidate-card"><div class="candidate-img-wrapper shimmer"></div><div style="height:15px; width:60%; margin:0 auto;" class="shimmer"></div></div>
  <div class="candidate-card"><div class="candidate-img-wrapper shimmer"></div><div style="height:15px; width:60%; margin:0 auto;" class="shimmer"></div></div>
  <div class="candidate-card"><div class="candidate-img-wrapper shimmer"></div><div style="height:15px; width:60%; margin:0 auto;" class="shimmer"></div></div>
</div>

<!-- Pop-up Modal การโหวต -->
<div id="modal-overlay">
  <div class="modal-box">
    <i class="fas fa-times modal-close" onclick="closeModal()"></i>
    
    <!-- Step 1: ฟอร์มกรอกโหวต -->
    <div id="vote-form-area">
      <img src="" id="modal-target-img" class="vote-target-img">
      <h3 class="vote-target-name" id="modal-target-name">Member</h3>
      <div class="cute-input-group">
        <i class="fas fa-ticket-alt"></i>
        <input type="number" id="vote-amount" class="cute-input" placeholder="ใส่จำนวน Token" min="1">
      </div>
      <button class="btn-submit-vote" id="btn-confirm" onclick="submitVote()">ยืนยันการโหวต</button>
    </div>

    <!-- Step 2: การ์ดขอบคุณ (Thank You Card) หลังจากโหวตสำเร็จ -->
    <div id="vote-success-area" style="display: none;">
      <h3 style="color: var(--primary-pink); margin: 0 0 5px 0;"><i class="fas fa-check-circle"></i> โหวตสำเร็จแล้ว!</h3>
      <div style="font-size: 13px; color: #666; margin-bottom: 15px;">ขอบคุณที่ร่วมโหวตให้กับ <span id="success-member-name" style="font-weight:bold;"></span></div>
      <img src="" id="ty-card-img" class="ty-card-img" alt="Thank You Card">
      <div class="ty-message"><i class="fas fa-heart"></i> ได้รับ Thank You Card เรียบร้อย!</div>
      <button class="btn-submit-vote" style="margin-top: 20px; background: #4dabf7; box-shadow: none;" onclick="closeModal()">ปิดหน้าต่าง</button>
    </div>

  </div>
</div>

<script>
  // เปลี่ยน URL ตรงนี้ให้เป็น Web App URL ของ Google Apps Script ของคุณเอ็มมี่
  const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec'; 
  
  // ดึง userId จาก URL Parameter อัตโนมัติ (เช่น majorvote.html?userId=U12345)
  const urlParams = new URLSearchParams(window.location.search);
  const userId = urlParams.get('userId') || 'GUEST_USER';

  let currentCandidateId = '';
  let currentCandidateName = '';
  let currentThankYouCard = '';
  let globalVoteStatus = 'OPEN';

  // 1. โหลดข้อมูลเมื่อเปิดหน้าเว็บ
  window.onload = function() {
    fetchWalletBalance();
    fetchMajorVoteData();
  };

  // 2. ฟังก์ชันดึง Token ของผู้ใช้งาน
  async function fetchWalletBalance() {
    try {
      const response = await fetch(`${SCRIPT_URL}?action=getUserTokens&userId=${userId}`);
      const data = await response.json();
      if(data.status === 'success') {
        document.getElementById('user-tokens').innerText = Number(data.tokens).toLocaleString();
      } else {
        document.getElementById('user-tokens').innerText = '0';
      }
    } catch (error) {
      console.error('Error fetching tokens:', error);
      document.getElementById('user-tokens').innerText = 'Error';
    }
  }

  // 3. ฟังก์ชันดึงข้อมูลแบนเนอร์กิจกรรมโหวต และ รายชื่อ Candidates ทั้งหมด
  async function fetchMajorVoteData() {
    try {
      const response = await fetch(`${SCRIPT_URL}?action=getVoteData`);
      const data = await response.json();
      
      if(data.status === 'success') {
        const collection = data.collection;
        globalVoteStatus = collection.status.toUpperCase(); // 'OPEN' หรือ 'CLOSED'

        // Render ส่วนของ Banner หน้ากิจกรรม
        document.getElementById('vote-cover').src = collection.coverUrl;
        document.getElementById('vote-title').innerText = collection.title;
        document.getElementById('vote-desc').innerText = collection.description;
        document.getElementById('vote-time').innerText = `ปิดโหวต: ${collection.endTime}`;
        
        const badge = document.getElementById('vote-status');
        badge.innerText = globalVoteStatus;
        if(globalVoteStatus === 'CLOSED') {
          badge.classList.add('vote-status-closed');
        }

        // Render ส่วนรายชื่อผู้สมัคร (Candidates)
        renderCandidates(data.candidates, globalVoteStatus);
      }
    } catch (error) {
      console.error('Error fetching vote data:', error);
      Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'ไม่สามารถโหลดข้อมูลกิจกรรมได้' });
    }
  }

  // 4. ฟังก์ชันเอาข้อมูล Candidate ไปแสดงผลบน Grid 3 คอลัมน์
  function renderCandidates(candidates, status) {
    const container = document.getElementById('candidates-container');
    container.innerHTML = ''; // ล้าง loading shimmer ออก

    candidates.forEach(cd => {
      const card = document.createElement('div');
      card.className = 'candidate-card';
      // ผูก Event เวลากดที่ตัวการ์ดเพื่อเปิด Modal โหวต
      card.onclick = () => openVoteModal(cd.candidateId, cd.name, cd.imgUrl, cd.thankYouCardUrl);

      card.innerHTML = `
        <div class="candidate-img-wrapper">
          <img src="${cd.imgUrl}" class="candidate-img" alt="${cd.name}">
        </div>
        <div class="candidate-name">${cd.name}</div>
        <button class="btn-vote-small" style="display: ${status === 'OPEN' ? 'block' : 'none'}">Vote</button>
        <div class="ranking-score" style="display: ${status === 'CLOSED' ? 'block' : 'none'}">
          ${Number(cd.currentVotes).toLocaleString()} Pts
        </div>
      `;
      container.appendChild(card);
    });
  }

  // 5. เปิดหน้าต่างป๊อปอัปกรอกคะแนนโหวต
  function openVoteModal(id, name, imgUrl, thankYouCardUrl) {
    if(globalVoteStatus === 'CLOSED') {
      Swal.fire({ icon: 'info', title: 'ปิดโหวตแล้ว', text: 'กิจกรรมนี้สิ้นสุดระยะเวลาการโหวตแล้วค่ะ', confirmButtonColor: '#ff85a2' });
      return;
    }

    currentCandidateId = id;
    currentCandidateName = name;
    currentThankYouCard = thankYouCardUrl;

    // รีเซ็ตหน้าต่างกลับไปที่ Step 1 (ฟอร์มโหวต)
    document.getElementById('vote-form-area').style.display = 'block';
    document.getElementById('vote-success-area').style.display = 'none';
    document.getElementById('vote-amount').value = '';

    // ใส่ข้อมูล Member ลงใน Modal
    document.getElementById('modal-target-img').src = imgUrl;
    document.getElementById('modal-target-name').innerText = `โหวตให้ ${name}`;

    document.getElementById('modal-overlay').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
  }

  // 6. ฟังก์ชันส่งข้อมูลการโหวตไปยัง Google Apps Script (ยิงเข้าชีต majorVoteLogs)
  async function submitVote() {
    const amountInput = document.getElementById('vote-amount');
    const amount = parseInt(amountInput.value);
    const btnConfirm = document.getElementById('btn-confirm');

    if(!amount || amount <= 0) {
      Swal.fire({ icon: 'warning', title: 'คำเตือน', text: 'กรุณากรอกจำนวน Token ให้ถูกต้องค่ะ', confirmButtonColor: '#ff85a2' });
      return;
    }

    // ปิดปุ่มระหว่างรอทำรายการเพื่อป้องกันการกดซ้ำ
    btnConfirm.disabled = true;
    btnConfirm.innerText = "กำลังประมวลผล...";

    try {
      // ส่งข้อมูลด้วย POST Method ไปที่ GAS แบบ text/plain เพื่อเลี่ยงปัญหาสิทธิ์ CORS ของ Apps Script
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors', // โหมดสำหรับคุยกับ Google Apps Script Web App
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'submitVote',
          userId: userId,
          candidateId: currentCandidateId,
          amount: amount
        })
      });

      // เนื่องด้วยโหมด no-cors จะอ่าน response ตัวเต็มไม่ได้ ให้ตั้งข้อสมมติว่ายิงเสร็จสมบูรณ์
      // สลับไปแสดงผล Step 2 (Thank You Card) ทันที
      document.getElementById('vote-form-area').style.display = 'none';
      document.getElementById('vote-success-area').style.display = 'block';
      
      document.getElementById('success-member-name').innerText = currentCandidateName;
      document.getElementById('ty-card-img').src = currentThankYouCard;

      // อัปเดตยอดคงเหลือบนหน้าเว็บใหม่หลังจากผ่านไป 2 วินาที (รอชีตอัปเดตข้อมูล)
      setTimeout(() => {
        fetchWalletBalance();
        fetchMajorVoteData();
      }, 2000);

    } catch (error) {
      console.error('Error submitting vote:', error);
      Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ระบบไม่สามารถส่งผลโหวตได้ กรุณาลองใหม่อีกครั้ง' });
    } finally {
      btnConfirm.disabled = false;
      btnConfirm.innerText = "ยืนยันการโหวต";
    }
  }
</script>

</body>
</html>
