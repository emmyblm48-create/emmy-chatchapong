<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLM48 | Major Vote</title>
    <meta name="theme-color" content="#ffc0cb">
    
    <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/0">
    <link rel="icon" sizes="192x192" href="https://lh3.googleusercontent.com/d/1">
    
    <meta name="apple-mobile-web-app-title" content="BLM48">   
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-pink: #ff85a2;
            --blm-pink: #ff85a2;
            --blm-light-pink: #fff0f5;
            --bg-dreamy: #ffffff;
            --text-dark: #4a4a4a;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Quicksand', 'Kanit', sans-serif;
            background-color: var(--bg-dreamy);
            color: var(--text-dark);
            margin: 0; padding: 0; padding-top: 70px;
            padding-bottom: 30px;
        }

        /* 📡 Top Navbar */
        .top-navbar {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center;
            padding: 0 20px; box-shadow: 0 2px 10px rgba(255, 133, 162, 0.06);
            z-index: 1000;
        }
        .nav-left-actions {
            position: absolute; left: 15px; display: flex; align-items: center; gap: 8px;
        }
        .nav-btn {
            color: var(--blm-pink); font-size: 1rem; text-decoration: none;
            width: 35px; height: 35px; display: flex;
            align-items: center; justify-content: center;
            border-radius: 50%; background: var(--blm-light-pink);
            border: none; cursor: pointer; transition: transform 0.2s;
        }
        .nav-btn:active { transform: scale(0.9); }
        .nav-title { font-weight: 600; font-size: 1.2rem; color: var(--text-dark); }

        /* กระเป๋าเงิน */
        .profile-wallet-card {
            background: #ffffff; border-radius: 20px; padding: 16px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04); border: 2px solid #ffeef2; margin: 15px 20px;
        }
        .wallet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .wallet-box { display: flex; align-items: center; gap: 10px; background: #fcf8f9; padding: 10px 12px; border-radius: 14px; }
        .wallet-icon-wrapper { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #ffffff; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03); overflow: hidden; }
        .wallet-token-img { width: 100%; height: 100%; object-fit: contain; padding: 2px; }
        .wallet-info { display: flex; flex-direction: column; }
        .wallet-title { font-size: 11px; color: #888888; font-weight: 500; }
        .wallet-value { font-size: 15px; color: #333333; font-weight: 600; font-family: 'Kanit', sans-serif; }

        /* แคมเปญโหวต */
        .section-title { font-family: 'Kanit', sans-serif; font-weight: 600; color: #444; margin: 30px 0 15px 20px; font-size: 18px; border-left: 5px solid var(--primary-pink); padding-left: 12px; }
        .ranking-wrapper {
            position: relative; 
            background-color: rgba(255, 255, 255, 0.45); /* โทนขาวโปร่งแสง */
            backdrop-filter: blur(8px);                  /* เอฟเฟกต์กระจกฝ้าละมุนๆ */
            -webkit-backdrop-filter: blur(8px);
            padding: 15px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.6); /* ขอบขาวบางเพื่อมิติกระจก */
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.02);
            overflow: hidden; 
            margin: 0 20px;
        }
        .major-vote-scroll { display: flex; gap: 16px; overflow-x: auto; padding: 5px 5px 15px; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .major-vote-scroll::-webkit-scrollbar { display: none; }
        
        .major-vote-card {
            min-width: 280px; max-width: 280px; background: white; border-radius: 20px;
            box-shadow: 0 8px 20px rgba(255, 133, 162, 0.08); scroll-snap-align: start; overflow: hidden;
            text-decoration: none; color: inherit; display: block; border: 1px solid rgba(255, 179, 193, 0.2); transition: transform 0.2s, box-shadow 0.2s; position: relative;
        }
        .major-vote-card:active { transform: scale(0.97); }
        
        .card-image-wrapper {
            position: relative; width: 100%; height: 155px; overflow: hidden;
            background-color: #ffeef2; display: flex; align-items: center; justify-content: center;
        }
        .major-vote-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; position: relative; z-index: 2; }
        
        /* 🎨 สร้าง CSS เปล่าเป็นภาพสำรอง 100% ไม่ยิงลิงก์นอกเว็บเมื่อรูปจริงเสีย */
        .image-fallback-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffeef2 0%, #ffd1dc 100%);
            display: flex; align-items: center; justify-content: center; z-index: 1;
        }
        .image-fallback-bg i { color: #ff85a2; font-size: 2.5rem; opacity: 0.5; }
        
        .status-badge-overlay { position: absolute; top: 12px; right: 12px; z-index: 5; }
        .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .status-open { background: #e6f9ed; color: #2e7d32; border: 1px solid rgba(46, 125, 50, 0.2); }
        .status-closed { background: #ffebee; color: #c62828; border: 1px solid rgba(198, 40, 40, 0.2); }

        .major-vote-info { padding: 16px; background: white; position: relative; z-index: 3; }
        .major-vote-title { font-weight: 600; font-size: 16px; margin: 0 0 6px 0; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-footer-action { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 12px; border-top: 1px dashed #f5f5f5; font-size: 12px; color: #888; }
        .go-vote-btn { color: var(--blm-pink); font-weight: 600; display: flex; align-items: center; gap: 4px; }
        .loading-text { text-align: center; width: 100%; color: #999; padding: 40px 20px; font-size: 14px; }
      
      /* 🧁 โครงสร้างโซนปุ่ม Action วงกลมใต้กระเป๋าเงิน */
.wallet-actions-container {
    display: flex;
    justify-content: center;
    gap: 32px; /* ระยะห่างระหว่าง 2 ปุ่ม */
    margin-top: 20px;
    margin-bottom: 15px;
}

.circle-action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: none;
    border: none;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    -webkit-tap-highlight-color: transparent;
}

.circle-action-btn:active {
    transform: scale(0.92); /* เอฟเฟกต์ตอนกดแล้วยุบตัวนิด ๆ */
}

.circle-action-btn .circle-icon {
    width: 52px;
    height: 52px;
    border-radius: 50%; /* บังคับวงกลมแท้ 100% */
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    color: #ffffff;
    transition: all 0.2s ease;
}

/* 🎟️ ปุ่ม Redeem Code (โทนสีชมพูพาสเทลหวาน ๆ เข้ากับธีมหลัก) */
.btn-redeem-code .circle-icon {
    background-color: #e6fcf5 !important; /* เขียวมิ้นท์อ่อนโปร่งแสง */
    color: #20c997 !important;            /* ไอคอนสีมิ้นท์สดใส เข้มพอให้เห็นชัด */
    box-shadow: 0 4px 12px rgba(32, 201, 151, 0.2);
}

/* 🎒 ปุ่ม Inventory (โทนสีฟ้าพาสเทลสดชื่น) */
.btn-inventory .circle-icon {
    background-color: #e7f5ff !important; /* ฟ้าอ่อนโปร่งแสง */
    color: #4dabf7 !important;            /* ไอคอนสีฟ้าสด */
    box-shadow: 0 4px 12px rgba(77, 171, 247, 0.2);
}

/* 📜 ปุ่ม History (โทนสีม่วงพาสเทลลาเวนเดอร์น่ารัก) */
.btn-history-log .circle-icon {
    background-color: #f3f0ff !important; /* ม่วงอ่อนโปร่งแสง */
    color: #9775fa !important;            /* ไอคอนสีม่วงสด */
    box-shadow: 0 4px 12px rgba(151, 117, 250, 0.2);
}

.circle-action-btn .circle-label {
    font-size: 12px;
    font-weight: 500;
    color: #3a3a3a;
    margin-top: 8px;
    font-family: 'Quicksand', 'Kanit', sans-serif;
}

    </style>
</head>
<body>

<div class="top-navbar">
    <div class="nav-left-actions">
        <button class="nav-btn" title="กลับ" onclick="history.back()" style="background: none; border: none; padding: 0; cursor: pointer;">
            <i class="fas fa-chevron-left"></i>
        </button>
        <button class="nav-btn" id="refresh-btn" onclick="handleManualRefresh()" title="รีเฟรชข้อมูล">
            <i class="fas fa-arrows-rotate"></i>
        </button>
    </div>
</div>

    <div class="profile-wallet-card">
        <div class="wallet-grid">
            <div class="wallet-box">
                <div class="wallet-icon-wrapper">
                    <img src="https://lh3.googleusercontent.com/d/1LxHGOclJIl4Xqxi0dI5_Y235t6lfAiCZ=s1000" class="wallet-token-img" alt="Token" onerror="this.src='https://placehold.co/40?text=TK'">
                </div>
                <div class="wallet-info">
                    <span class="wallet-title">Token</span>
                    <span class="wallet-value" id="token-balance">-</span>
                </div>
            </div>
            <div class="wallet-box">
                <div class="wallet-icon-wrapper">
                    <img src="https://lh3.googleusercontent.com/d/1Fiw60kJvy6QmIhzrkgzEjMj85POwcoiZ=s1000" class="wallet-token-img" alt="GE Token" onerror="this.src='https://placehold.co/40?text=GE'">
                </div>
                <div class="wallet-info">
                    <span class="wallet-title">GE Token</span>
                    <span class="wallet-value" id="getoken-balance">-</span>
                </div>
            </div>
        </div>
    </div>
  
<div class="wallet-actions-container">
    <button onclick="redeemCode()" class="circle-action-btn btn-redeem-code" type="button">
        <div class="circle-icon"><i class="fas fa-ticket-alt"></i></div>
        <span class="circle-label">Redeem</span>
    </button>
    
    <a href="inventory.html" class="circle-action-btn btn-inventory">
        <div class="circle-icon"><i class="fas fa-briefcase"></i></div>
        <span class="circle-label">Inventory</span>
    </a>
    
    <a href="history.html" class="circle-action-btn btn-history-log">
        <div class="circle-icon"><i class="fas fa-history"></i></div>
        <span class="circle-label">History</span>
    </a>
</div>

    <div class="section-title"> Major Vote</div>
    <div class="ranking-wrapper">
        <div class="major-vote-scroll" id="vote-container">
            <div class="loading-text">
                <i class="fa-solid fa-spinner fa-spin"></i> Loading...
            </div>
        </div>
    </div>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec'; 
    const APP_VERSION = '1.0.5'; 

    function getUsernameFromSession() {
        try {
            const sessionStr = localStorage.getItem('bnl_session');
            if (!sessionStr) return "";
            const session = JSON.parse(sessionStr);
            const expiryTime = session.expiry || session.expire;
            if (expiryTime && new Date().getTime() > expiryTime) {
                localStorage.removeItem('bnl_session');
                return "";
            }
            const userData = session.data || session.user || session;
            return userData ? (userData.username || "") : "";
        } catch (e) {
            console.error("Session Parse Error:", e);
            return "";
        }
    }

    function checkAppVersion() {
        const savedVersion = localStorage.getItem('bnl_app_version');
        if (savedVersion !== APP_VERSION) {
            localStorage.removeItem('blm48_major_votes_cache');
            localStorage.removeItem('bnl_vote_wallet_cache'); 
            localStorage.setItem('bnl_app_version', APP_VERSION);
        }
    }

    // 🌟 ตัวแปรหลักที่ใช้เก็บชื่อผู้ใช้ของหน้านี้คือ username
    const username = getUsernameFromSession(); 

    async function initPage() {
        if (!username) {
            alert("กรุณาเข้าสู่ระบบก่อนใช้งาน");
            window.location.href = "login.html";
            return;
        }
        checkAppVersion();
        
        loadWalletFromCache();
        
        await Promise.all([loadUserBalancesRealTime(), loadVoteCampaigns()]);
    }

    function loadWalletFromCache() {
        try {
            const cachedUserData = localStorage.getItem('bnl_vote_wallet_cache');
            if (cachedUserData) {
                const user = JSON.parse(cachedUserData);
                const tokenVal = user.Token !== undefined ? user.Token : (user.token || 0);
                const geTokenVal = user.GEToken !== undefined ? user.GEToken : (user.geToken || 0);
                document.getElementById("token-balance").textContent = Number(tokenVal).toLocaleString();
                document.getElementById("getoken-balance").textContent = Number(geTokenVal).toLocaleString();
            } else {
                const primaryCache = localStorage.getItem('bnl_user_data_cache');
                if (primaryCache) {
                    const user = JSON.parse(primaryCache);
                    const tokenVal = user.Token !== undefined ? user.Token : (user.token || 0);
                    const geTokenVal = user.GEToken !== undefined ? user.GEToken : (user.geToken || 0);
                    document.getElementById("token-balance").textContent = Number(tokenVal).toLocaleString();
                    document.getElementById("getoken-balance").textContent = Number(geTokenVal).toLocaleString();
                }
            }
        } catch (e) { console.error(e); }
    }

    async function loadUserBalancesRealTime() {
        try {
            const url = `${scriptURL}?action=getUserInfo&username=${encodeURIComponent(username)}&_=${new Date().getTime()}`;
            const response = await fetch(url);
            const result = await response.json();
            
            if (result.status === "success" && result.data) {
                const tokenValue = result.data.Token !== undefined ? result.data.Token : (result.data.token || 0);
                const geTokenValue = result.data.GEToken !== undefined ? result.data.GEToken : (result.data.geToken || 0);
                
                document.getElementById("token-balance").textContent = Number(tokenValue).toLocaleString();
                document.getElementById("getoken-balance").textContent = Number(geTokenValue).toLocaleString();
                
                localStorage.setItem('bnl_vote_wallet_cache', JSON.stringify(result.data));
            }
        } catch (error) { 
            console.error("โหลดยอดเงินเรียลไทม์ขัดข้อง:", error); 
        }
    }

    async function loadVoteCampaigns() {
        const container = document.getElementById("vote-container");
        const cachedVotes = localStorage.getItem('blm48_major_votes_cache');
        if (cachedVotes) {
            try {
                const localData = JSON.parse(cachedVotes);
                if (localData && localData.length > 0) renderCampaignCards(localData);
            } catch (e) { console.error(e); }
        }
        try {
            const url = `${scriptURL}?action=getMajorVoteCollections&_=${new Date().getTime()}`;
            const response = await fetch(url);
            const result = await response.json();
            if (result.status === "success" && result.data && result.data.length > 0) {
                localStorage.setItem('blm48_major_votes_cache', JSON.stringify(result.data));
                renderCampaignCards(result.data);
            } else if (!cachedVotes) {
                container.innerHTML = `<div class="loading-text">ไม่มีการกิจกรรมโหวตในขณะนี้</div>`;
            }
        } catch (error) {
            if (!cachedVotes) container.innerHTML = `<div class="loading-text">⚠️ ไม่สามารถเชื่อมต่อข้อมูลได้</div>`;
        }
    }

    function renderCampaignCards(campaignsList) {
        const container = document.getElementById("vote-container");
        container.innerHTML = ""; 
        
        const now = new Date().getTime();

        campaignsList.forEach(camp => {
            const status = (camp.Status || "Closed").trim().toUpperCase();
            const isOpen = status === "OPEN"; 
            
            if (camp.StartTime) {
                const startTimeParsed = new Date(camp.StartTime).getTime();
                if (!isNaN(startTimeParsed) && startTimeParsed > now) return; 
            }
            if (camp.EndTime) {
                const endTimeParsed = new Date(camp.EndTime).getTime();
                if (!isNaN(endTimeParsed) && endTimeParsed < now) return; 
            }

            let coverImgUrl = camp.CoverImage || camp["รูปจากไดร์ฟ"] || "";
            
            if (coverImgUrl && coverImgUrl.includes("http")) {
                const words = coverImgUrl.split(" ");
                words.forEach(w => {
                    if (w.startsWith("http")) coverImgUrl = w;
                });
            }

            const hasValidImage = coverImgUrl && coverImgUrl.trim() !== "" && !coverImgUrl.includes("placeholder");
            const imageSrc = hasValidImage ? coverImgUrl : "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7";
            
            const cardHtml = `
                <a href="majorvote_detail.html?id=${camp.VoteCollectionID}&status=${status.toLowerCase()}" class="major-vote-card">
                    <div class="card-image-wrapper">
                        <div class="image-fallback-bg">
                            <i class="fa-solid fa-star"></i>
                        </div>
                        <div class="status-badge-overlay">
                            <span class="status-badge ${isOpen ? 'status-open' : 'status-closed'}">
                            ${isOpen ? 'OPEN' : 'CLOSED'}
                            </span>
                        </div>
                        <img src="${imageSrc}" alt="Vote" style="${hasValidImage ? 'display:block;' : 'display:none;'}" onerror="this.style.display='none';">
                    </div>
                    <div class="major-vote-info">
                        <h4 class="major-vote-title">${camp.Title || 'Coming Soon'}</h4>
                        <div class="card-footer-action">
                            <span>${isOpen ? 'Voting Now' : 'สิ้นสุดกิจกรรมโหวตแล้ว'}</span>
                            <span class="go-vote-btn">
                                ${isOpen ? 'Vote' : 'Ranking'} <i class="fa-solid fa-chevron-right"></i>
                            </span>
                        </div>
                    </div>
                </a>
            `;
            container.insertAdjacentHTML('beforeend', cardHtml);
        });

        if (container.children.length === 0) {
            container.innerHTML = `<div class="loading-text">ไม่มีการกิจกรรมโหวตในขณะนี้</div>`;
        }
    }
  
    // 🎟️ ฟังก์ชัน Redeem Code ที่แก้ไขตัวแปรเรียบร้อยแล้วค่ะ
    async function redeemCode() {
        if (!username) { // ✨ แก้ไขจาก !user เป็น !username
            Swal.fire('ไม่พบเซสชัน', 'กรุณาเข้าสู่ระบบใหม่อีกครั้งนะคะ', 'error');
            return;
        }

        const { value: code } = await Swal.fire({ 
            title: 'Redeem Code', 
            input: 'text', 
            inputPlaceholder: 'กรอกรหัสโค้ดที่นี่...', 
            showCancelButton: true,
            confirmButtonColor: '#ff85a2',
            cancelButtonText: 'ยกเลิก',
            confirmButtonText: 'ยืนยัน'
        });

        if (code) {
            Swal.fire({ title: 'กำลังตรวจสอบโค้ด...', didOpen: () => Swal.showLoading(), allowOutsideClick: false });
            try {
                const resp = await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'redeemCode', username: username, code: code }) // ✨ เปลี่ยนเป็น username
                });
                const res = await resp.json();
              
                if (res.status === "success") { 
                    Swal.fire('สำเร็จ!', res.message, 'success').then(() => {
                        // ⚡ เรียกฟังก์ชันนี้เพื่อดึงยอดเงินล่าสุดมาแสดงทันทีโดยไม่ต้อง Refresh หน้าเว็บให้สะดุด
                        loadUserBalancesRealTime();
                    });
                } else { 
                    Swal.fire('ผิดพลาด', res.message, 'error'); 
                }
            } catch (e) { 
                console.error(e);
                Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ในขณะนี้งับ', 'error'); 
            }
        }
    }

    async function handleManualRefresh() {
        const refreshBtn = document.getElementById("refresh-btn");
        const icon = refreshBtn.querySelector("i");
        icon.classList.add("fa-spin");
        refreshBtn.disabled = true;
        document.getElementById("vote-container").innerHTML = `
            <div class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>
        `;
        await Promise.all([loadUserBalancesRealTime(), loadVoteCampaigns()]);
        setTimeout(() => {
            icon.classList.remove("fa-spin");
            refreshBtn.disabled = false;
        }, 400);
    }

    window.addEventListener("pageshow", function(event) {
        initPage();
    });
</script>
</body>
</html>
