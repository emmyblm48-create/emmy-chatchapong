<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BLM48 | Major Vote</title>
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
  <meta name="theme-color" content="#ffc0cb">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary-pink: #ff85a2;
      --soft-pink: #ffe4e1;
      --bg-color: #fff5f6;
      --text-main: #5a5a5a;
    }
    body {
      font-family: 'Kanit', 'Quicksand', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0; padding: 0; padding-bottom: 80px;
    }
    .header-title {
      text-align: center; padding: 20px; font-size: 24px; font-weight: 600; color: var(--primary-pink);
    }
    /* Wallet Section */
    .wallet-container {
      background: white; border-radius: 20px; padding: 20px; margin: 0 20px 20px;
      box-shadow: 0 4px 15px rgba(255, 133, 162, 0.1); display: flex; justify-content: space-around;
      border: 1px solid var(--soft-pink);
    }
    .wallet-item { text-align: center; }
    .wallet-item i { font-size: 24px; color: var(--primary-pink); margin-bottom: 8px; }
    .wallet-value { font-size: 20px; font-weight: 600; font-family: 'Quicksand'; }
    .wallet-label { font-size: 12px; color: #888; }
    
    /* Action Buttons */
    .action-menu {
      display: flex; gap: 15px; margin: 0 20px 30px;
    }
    .btn-action {
      flex: 1; background: white; border: 1px solid var(--primary-pink); color: var(--primary-pink);
      padding: 12px; border-radius: 15px; text-align: center; text-decoration: none;
      font-weight: 500; box-shadow: 0 2px 10px rgba(255, 133, 162, 0.1);
    }
    
    /* Horizontal Scroll Campaigns */
    .section-title { margin: 0 20px 10px; font-weight: 600; font-size: 18px; }
    .campaign-scroll {
      display: flex; overflow-x: auto; gap: 15px; padding: 0 20px 20px;
      scrollbar-width: none; /* Firefox */
    }
    .campaign-scroll::-webkit-scrollbar { display: none; } /* Chrome/Safari */
    
    .campaign-card {
      min-width: 260px; background: white; border-radius: 15px; overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-decoration: none; color: var(--text-main);
      display: flex; flex-direction: column;
    }
    .campaign-card img { width: 100%; height: 140px; object-fit: cover; }
    .campaign-info { padding: 15px; }
    .campaign-title { font-weight: 600; font-size: 16px; margin-bottom: 5px; }
    .status-badge {
      display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .status-open { background: var(--primary-pink); color: white; }
    .status-closed { background: #ddd; color: #666; }
  </style>
</head>
<body>

  <div class="header-title">Major Vote</div>

  <div class="wallet-container">
    <div class="wallet-item">
      <i class="fa-solid fa-coins"></i>
      <div class="wallet-value" id="balance-token">--</div>
      <div class="wallet-label">Token</div>
    </div>
    <div class="wallet-item">
      <i class="fa-solid fa-ticket"></i>
      <div class="wallet-value" id="balance-getoken">--</div>
      <div class="wallet-label">GE Token</div>
    </div>
  </div>

  <div class="action-menu">
    <a href="#" class="btn-action"><i class="fa-solid fa-gift"></i> Redeem Code</a>
    <a href="#" class="btn-action"><i class="fa-solid fa-clock-rotate-left"></i> History</a>
  </div>

  <div class="section-title">Active & Past Votes</div>
  <div class="campaign-scroll" id="campaign-list">
    <p style="text-align: center; width: 100%; color: #999;">กำลังโหลดข้อมูล...</p>
  </div>

  <script>
    const SCRIPT_URL = 'ใส่_URL_WEB_APP_ของคุณที่นี่'; // << อย่าลืมเปลี่ยน
    const username = localStorage.getItem('username') || '00-155'; // ทดสอบดึงจาก Local

    async function loadData() {
      try {
        // 1. ดึงข้อมูล Wallet (สมมติว่าคุณมีฟังก์ชัน getUserData ใน GAS อยู่แล้ว)
        // ถ้ายังไม่มี ให้สร้างแยก หรือจะดึงมาพร้อมกันก็ได้
        
        // 2. ดึงรายการ Major Vote
        const res = await fetch(`${SCRIPT_URL}?action=getMajorVoteCollections`);
        const result = await res.json();
        
        if(result.status === 'success') {
          renderCampaigns(result.data);
        }
      } catch(err) {
        console.error(err);
      }
    }

    function renderCampaigns(data) {
      const container = document.getElementById('campaign-list');
      container.innerHTML = '';
      
      data.forEach(item => {
        const isClosed = item.Status.toLowerCase().includes('close');
        const statusClass = isClosed ? 'status-closed' : 'status-open';
        const statusText = isClosed ? 'Closed' : 'Open';

        const card = `
          <a href="votedetail.html?id=${item.VoteCollectionID}" class="campaign-card">
            <img src="${item.CoverImage}" alt="Cover">
            <div class="campaign-info">
              <div class="campaign-title">${item.Title}</div>
              <div class="status-badge ${statusClass}">${statusText}</div>
            </div>
          </a>
        `;
        container.innerHTML += card;
      });
    }

    window.onload = loadData;
  </script>
</body>
</html>
