<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BLM48 | Major Vote</title>
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
  <meta name="theme-color" content="#ffc0cb">
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --primary-pink: #ff85a2;
      --soft-pink: #ffe4e1;
      --bg-color: #fff5f6;
      --text-main: #5a5a5a;
    }
    body {
      font-family: 'Kanit', 'Quicksand', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0; padding: 0; padding-bottom: 80px;
    }
    .header-title {
      text-align: center; padding: 20px; font-size: 24px; font-weight: 600; color: var(--primary-pink);
    }
    /* Wallet Section */
    .wallet-container {
      background: white; border-radius: 20px; padding: 20px; margin: 0 20px 20px;
      box-shadow: 0 4px 15px rgba(255, 133, 162, 0.1); display: flex; justify-content: space-around;
      border: 1px solid var(--soft-pink);
    }
    .wallet-item { text-align: center; }
    .wallet-item i { font-size: 24px; color: var(--primary-pink); margin-bottom: 8px; }
    .wallet-value { font-size: 20px; font-weight: 600; font-family: 'Quicksand'; }
    .wallet-label { font-size: 12px; color: #888; }
    
    /* Action Buttons */
    .action-menu {
      display: flex; gap: 15px; margin: 0 20px 30px;
    }
    .btn-action {
      flex: 1; background: white; border: 1px solid var(--primary-pink); color: var(--primary-pink);
      padding: 12px; border-radius: 15px; text-align: center; text-decoration: none;
      font-weight: 500; box-shadow: 0 2px 10px rgba(255, 133, 162, 0.1);
    }
    
    /* Horizontal Scroll Campaigns */
    .section-title { margin: 0 20px 10px; font-weight: 600; font-size: 18px; }
    .campaign-scroll {
      display: flex; overflow-x: auto; gap: 15px; padding: 0 20px 20px;
      scrollbar-width: none; /* Firefox */
    }
    .campaign-scroll::-webkit-scrollbar { display: none; } /* Chrome/Safari */
    
    .campaign-card {
      min-width: 260px; background: white; border-radius: 15px; overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-decoration: none; color: var(--text-main);
      display: flex; flex-direction: column;
    }
    .campaign-card img { width: 100%; height: 140px; object-fit: cover; }
    .campaign-info { padding: 15px; }
    .campaign-title { font-weight: 600; font-size: 16px; margin-bottom: 5px; }
    .status-badge {
      display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .status-open { background: var(--primary-pink); color: white; }
    .status-closed { background: #ddd; color: #666; }
  </style>
</head>
<body>

  <div class="header-title">Major Vote</div>

  <div class="wallet-container">
    <div class="wallet-item">
      <i class="fa-solid fa-coins"></i>
      <div class="wallet-value" id="balance-token">--</div>
      <div class="wallet-label">Token</div>
    </div>
    <div class="wallet-item">
      <i class="fa-solid fa-ticket"></i>
      <div class="wallet-value" id="balance-getoken">--</div>
      <div class="wallet-label">GE Token</div>
    </div>
  </div>

  <div class="action-menu">
    <a href="#" class="btn-action"><i class="fa-solid fa-gift"></i> Redeem Code</a>
    <a href="#" class="btn-action"><i class="fa-solid fa-clock-rotate-left"></i> History</a>
  </div>

  <div class="section-title">Active & Past Votes</div>
  <div class="campaign-scroll" id="campaign-list">
    <p style="text-align: center; width: 100%; color: #999;">กำลังโหลดข้อมูล...</p>
  </div>

  <script>
  // 1. URL ของ Apps Script (ใช้ตัวแปรพิมพ์ใหญ่ให้เหมือนกันทั้งไฟล์)
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec'; 
  
  // 2. ดึงข้อมูล User และ ID ตู้โหวต
  const urlParams = new URLSearchParams(window.location.search);
  const username = localStorage.getItem('username') || urlParams.get('userId') || 'GUEST_USER';
  const collectionId = urlParams.get('id'); // << อย่าลืม! เวลาลิงก์มาหน้านี้ ต้องพ่วง ?id=ชื่อตู้โหวต มาด้วยนะ

  let currentCandidateId = '';
  let currentCandidateName = '';
  let currentThankYouCard = '';
  let globalVoteStatus = 'OPEN';

  // โหลดข้อมูลเมื่อเปิดหน้าเว็บ
  window.onload = function() {
    if(!collectionId) {
       Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'ไม่พบ ID กิจกรรมโหวต กรุณาเข้าจากหน้าหลักค่ะ' });
       return;
    }
    fetchWalletBalance();
    fetchMajorVoteData();
  };

  // ดึง Token ของผู้ใช้งาน
  async function fetchWalletBalance() {
    try {
      const response = await fetch(`${SCRIPT_URL}?action=getUserTokens&userId=${username}`);
      const data = await response.json();
      if(data.status === 'success') {
        document.getElementById('user-tokens').innerText = Number(data.tokens).toLocaleString();
      } else {
        document.getElementById('user-tokens').innerText = '0';
      }
    } catch (error) {
      console.error('Error fetching tokens:', error);
      document.getElementById('user-tokens').innerText = 'Error';
    }
  }

  // ดึงข้อมูลแบนเนอร์กิจกรรมโหวต และ รายชื่อ Candidates
  async function fetchMajorVoteData() {
    try {
      // ดึงข้อมูลตาม id ของตู้โหวต
      const response = await fetch(`${SCRIPT_URL}?action=getMajorVoteDetail&id=${collectionId}`);
      const result = await response.json();
      
      if(result.status === 'success') {
        const collection = result.data.collection;
        
        // เช็คสถานะโหวตจากคำว่า close (รองรับทั้ง Close, closed, CLOSED)
        globalVoteStatus = collection.Status.toLowerCase().includes('close') ? 'CLOSED' : 'OPEN';

        // นำข้อมูลไปโชว์ที่ Banner (อิงตามชื่อคอลัมน์ใน Sheet)
        document.getElementById('vote-cover').src = collection.CoverImage;
        document.getElementById('vote-title').innerText = collection.Title;
        document.getElementById('vote-desc').innerText = collection.Description || `ปิดโหวต: ${collection.EndTime}`;
        
        const badge = document.getElementById('vote-status');
        badge.innerText = globalVoteStatus;
        if(globalVoteStatus === 'CLOSED') {
          badge.classList.add('vote-status-closed');
        }

        renderCandidates(result.data.candidates, globalVoteStatus);
      }
    } catch (error) {
      console.error('Error fetching vote data:', error);
      Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'ไม่สามารถโหลดข้อมูลกิจกรรมได้' });
    }
  }

  // เอาข้อมูล Candidate ไปแสดงผล
  function renderCandidates(candidates, status) {
    const container = document.getElementById('candidates-container');
    container.innerHTML = ''; 

    // ถ้าปิดโหวตแล้ว ให้เรียงคะแนนจากมากไปน้อยอัตโนมัติ 🏆
    if(status === 'CLOSED') {
        candidates.sort((a, b) => parseInt(b.CurrentVotes) - parseInt(a.CurrentVotes));
    }

    candidates.forEach(cd => {
      const card = document.createElement('div');
      card.className = 'candidate-card';
      
      // ส่งข้อมูลเข้า Modal เมื่อกดที่การ์ด
      card.onclick = () => openVoteModal(cd.CandidateID, cd.MemberName, cd.ProfileMember, cd.ThankYouCardURL);

      card.innerHTML = `
        <div class="candidate-img-wrapper">
          <img src="${cd.ProfileMember}" class="candidate-img" alt="${cd.MemberName}">
        </div>
        <div class="candidate-name">${cd.MemberName}</div>
        <button class="btn-vote-small" style="display: ${status === 'OPEN' ? 'block' : 'none'}">Vote</button>
        <div class="ranking-score" style="display: ${status === 'CLOSED' ? 'block' : 'none'}">
          ${Number(cd.CurrentVotes).toLocaleString()} Pts
        </div>
      `;
      container.appendChild(card);
    });
  }

  // เปิดหน้าต่างป๊อปอัปกรอกคะแนนโหวต
  function openVoteModal(id, name, imgUrl, thankYouCardUrl) {
    if(globalVoteStatus === 'CLOSED') {
      Swal.fire({ icon: 'info', title: 'ปิดโหวตแล้ว', text: 'กิจกรรมนี้สิ้นสุดระยะเวลาการโหวตแล้วค่ะ', confirmButtonColor: '#ff85a2' });
      return;
    }

    currentCandidateId = id;
    currentCandidateName = name;
    currentThankYouCard = thankYouCardUrl;

    document.getElementById('vote-form-area').style.display = 'block';
    document.getElementById('vote-success-area').style.display = 'none';
    document.getElementById('vote-amount').value = '';

    document.getElementById('modal-target-img').src = imgUrl;
    document.getElementById('modal-target-name').innerText = `โหวตให้ ${name}`;

    document.getElementById('modal-overlay').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal-overlay').style.display = 'none';
  }

  // ส่งข้อมูลการโหวตไปยัง Google Apps Script
  async function submitVote() {
    const amountInput = document.getElementById('vote-amount');
    const amount = parseInt(amountInput.value);
    const btnConfirm = document.getElementById('btn-confirm');

    if(!amount || amount <= 0) {
      Swal.fire({ icon: 'warning', title: 'คำเตือน', text: 'กรุณากรอกจำนวน Token ให้ถูกต้องค่ะ', confirmButtonColor: '#ff85a2' });
      return;
    }

    btnConfirm.disabled = true;
    btnConfirm.innerText = "กำลังประมวลผล...";

    try {
      // เลิกใช้ no-cors เพื่อให้แอพสามารถอ่าน response กลับมาได้ว่า Token พอไหม
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({
          action: 'submitMajorVote', // ต้องให้ตรงกับ GAS
          username: username,
          collectionId: collectionId,
          candidateId: currentCandidateId,
          amount: amount
        })
      });

      const data = await response.json();

      if(data.status === 'success') {
          // โชว์ Thank You Card ทันทีถ้าโหวตสำเร็จ
          document.getElementById('vote-form-area').style.display = 'none';
          document.getElementById('vote-success-area').style.display = 'block';
          
          document.getElementById('success-member-name').innerText = currentCandidateName;
          document.getElementById('ty-card-img').src = currentThankYouCard;

          setTimeout(() => {
            fetchWalletBalance();
            fetchMajorVoteData();
          }, 1500);
      } else {
          // โชว์แจ้งเตือนจากหลังบ้าน (เช่น Token ไม่พอ)
          Swal.fire({ icon: 'error', title: 'โหวตไม่สำเร็จ', text: data.message, confirmButtonColor: '#ff85a2' });
      }

    } catch (error) {
      console.error('Error submitting vote:', error);
      Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ระบบไม่สามารถส่งผลโหวตได้ กรุณาลองใหม่อีกครั้ง' });
    } finally {
      btnConfirm.disabled = false;
      btnConfirm.innerText = "ยืนยันการโหวต";
    }
  }
</script>
</body>
</html>
