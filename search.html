<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLM48 Membership | Search Members</title>
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
  <meta name="theme-color" content="#ffc0cb">
  <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s180">
  <link rel="icon" sizes="192x192" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s192">
  <meta name="apple-mobile-web-app-title" content="BLM48">   
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    :root {
      --blmem-pink: #ff85a2;
      --blmem-pink-light: #fff0f3;
      --blmem-yellow: #fff3cd;
      --blmem-yellow-dark: #ffc107;
      --dark-text: #111111;
      --gray-text: #666666;
      --border-color: #f0f0f0;
      --bg-soft: #f9f9f9;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Mitr', sans-serif;
    }

    /* พื้นหลังแบบไล่เฉดสีชมพู-เหลือง-ขาว นุ่มๆ ละมุนสายตา */
    body {
      background: linear-gradient(135deg, #fff5f7 0%, #ffffff 50%, #fffdf0 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 💻 โครงสร้างตู้คอนเทนเนอร์ใหญ่ (สำหรับแบ่งฝั่งบนจอ PC) */
    .app-container {
      display: flex;
      width: 100%;
      max-width: 100%;
      min-height: 100vh;
      background: #ffffff;
      position: relative;
    }

    /* ฝั่งซ้าย: สไลด์แสดงภาพ/แบนเนอร์ต้อนรับ (จะโชว์เฉพาะบนคอมและแท็บเล็ตจอใหญ่) */
    .app-sidebar-promo {
      display: none;
      flex: 1;
      background: linear-gradient(45deg, #ff85a2, #ffb3c6, #ffe066);
      position: relative;
      overflow: hidden;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      text-align: center;
      padding: 40px;
    }

    /* ลูกเล่นคลื่นและวงกลมสีขาว-เหลืองจางๆ ในแบนเนอร์ฝั่งซ้าย */
    .promo-bg-circle {
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      top: -100px;
      left: -100px;
    }
    .promo-bg-circle-2 {
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255, 253, 224, 0.2);
      border-radius: 50%;
      bottom: -50px;
      right: -50px;
    }

    .promo-content {
      position: relative;
      z-index: 2;
    }
    .promo-title {
      font-size: 42px;
      font-weight: 600;
      text-shadow: 0 4px 10px rgba(0,0,0,0.15);
      margin-bottom: 10px;
    }
    .promo-subtitle {
      font-size: 18px;
      font-weight: 300;
      opacity: 0.95;
      background: rgba(0, 0, 0, 0.05);
      padding: 6px 20px;
      border-radius: 20px;
      display: inline-block;
      color: #fff;
    }

    /* 📱 โครงสร้างแอปพลิเคชันหลัก (ฝั่งขวา) */
    .app-layout {
      width: 100%;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 💻 ปรับการแสดงผลเมื่อเปิดบน Desktop PC / iPad จอใหญ่ */
    @media (min-width: 900px) {
      body {
        padding: 30px;
        background: radial-gradient(circle, #ffffff 0%, #fff0f3 70%, #fff9db 100%);
      }
      .app-container {
        max-width: 950px;
        height: 750px;
        min-height: 750px;
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 25px 50px rgba(255, 133, 162, 0.15);
        border: 4px solid #ffffff;
      }
      .app-sidebar-promo {
        display: flex; /* เปิดใช้งานแบนเนอร์ฝั่งซ้ายบนจอคอม */
      }
      .app-layout {
        width: 420px; /* ล็อกหน้าจอค้นหาฝั่งขวาให้มีขนาดเท่าสมาร์ทโฟนพอดี */
        min-height: 100%;
        border-left: 1px solid var(--border-color);
      }
    }

    /* --- ส่วนหัว (Header) --- */
    .header {
      display: flex;
      align-items: center;
      padding: 24px 24px 14px 24px;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 20px;
      color: var(--dark-text);
      cursor: pointer;
      margin-right: 16px;
      padding: 5px;
      transition: 0.2s;
    }
    .back-btn:active { transform: scale(0.9); }

    /* ช่องค้นหาแบบมินิมอล */
    .search-box {
      flex: 1;
      display: flex;
      align-items: center;
      background: #fdfdfd;
    }
    .search-input {
      border: none;
      background: transparent;
      outline: none;
      width: 100%;
      font-size: 16px;
      color: var(--dark-text);
      font-weight: 500;
    }
    .search-input::placeholder { color: #cccccc; font-weight: 300; }

    /* เส้นแบ่งใต้ Header สีทูโทน ชมพู-เหลือง บางๆ มินิมอล */
    .header-divider {
      height: 3px;
      background: linear-gradient(90deg, var(--blmem-pink) 0%, var(--blmem-yellow-dark) 100%);
      margin: 0 24px;
      border-radius: 2px;
      opacity: 0.7;
    }

    /* --- ส่วนรายการเมมเบอร์ (List View) --- */
    .member-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px 0 30px 0;
      overflow-y: auto;
    }

    .member-item {
      display: flex;
      align-items: center;
      padding: 14px 24px;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border-bottom: 1px solid var(--border-color);
    }
    .member-item:hover, .member-item:active {
      background: linear-gradient(90deg, var(--blmem-pink-light) 0%, #fffdf0 100%);
      padding-left: 28px; /* ขยับเยื้องขวาเวลาเอาเมาส์ชี้ดูมีมิติ */
    }
    .member-item:last-child {
      border-bottom: none;
    }

    /* รูปโปรไฟล์วงกลมพร้อมกรอบสีชมพูขอบทองไฮโซ */
    .member-avatar-wrapper {
      position: relative;
    }
    .member-avatar {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      background: #f3f3f3;
      border: 2px solid var(--blmem-pink);
      box-shadow: 0 0 0 2px #fffdf0;
    }

    /* ข้อมูลชื่อ */
    .member-info {
      flex: 1;
      padding-left: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .member-nickname {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark-text);
      text-transform: uppercase;
      line-height: 1.2;
    }
    .member-fullname {
      font-size: 13px;
      color: var(--gray-text);
      font-weight: 300;
      margin-top: 4px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 230px;
    }

    /* ลูกศรด้านขวา */
    .chevron-icon {
      color: var(--blmem-pink);
      opacity: 0.5;
      font-size: 14px;
      transition: 0.2s;
    }
    .member-item:hover .chevron-icon {
      transform: translateX(4px);
      opacity: 1;
    }

    /* สถานะโหลด */
    .loading-state, .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999999;
      font-size: 15px;
    }
    .loading-spinner {
      color: var(--blmem-pink);
      font-size: 28px;
      margin-bottom: 14px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

</style>
</head>
<body>

  <div class="app-container">
    
    <div class="app-sidebar-promo">
      <div class="promo-bg-circle"></div>
      <div class="promo-bg-circle-2"></div>
      <div class="promo-content">
        <h1 class="promo-title">BLM48</h1>
        <p class="promo-subtitle">SEARCH</p>
      </div>
    </div>

    <div class="app-layout">
      
      <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">
          <i class="fas fa-chevron-left"></i>
        </button>
        <div class="search-box">
          <input type="text" id="searchInput" class="search-input" placeholder="ค้นหาเมมเบอร์..." onkeyup="filterMembers()">
        </div>
      </div>
      <div class="header-divider"></div>

      <div class="member-list" id="memberList">
        <div class="loading-state" id="loadingState">
          <i class="fas fa-circle-notch loading-spinner"></i>
          <p>กำลังโหลดข้อมูลเมมเบอร์...</p>
        </div>
      </div>

    </div>

  </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec';
    
    let allMembers = [];

    function getImg(url) {
        if (!url || url.trim() === "") {
            return 'assets/images/default-profile.png'; 
        }
        if (url.includes('googleusercontent.com')) {
            return url + '=s200';
        }
        return url;
    }

    async function fetchAllMembers() {
      try {
        const resp = await fetch(`${scriptURL}?action=getAllMembers&_=${Date.now()}`);
        const res = await resp.json();
        
        if (res.status === "success" && res.data) {
          allMembers = res.data;
          renderMembers(allMembers);
        } else {
          document.getElementById('memberList').innerHTML = '<div class="empty-state">ไม่พบฐานข้อมูลเมมเบอร์</div>';
        }
      } catch (e) {
        console.error("Error fetching members:", e);
        document.getElementById('memberList').innerHTML = '<div class="empty-state">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
      }
    }

    function renderMembers(membersData) {
      const listContainer = document.getElementById('memberList');
      listContainer.innerHTML = ''; 

      if (membersData.length === 0) {
        listContainer.innerHTML = '<div class="empty-state">ไม่พบเมมเบอร์ที่คุณค้นหา 😥</div>';
        return;
      }

      membersData.forEach(m => {
        const item = document.createElement('a');
        item.className = 'member-item';
        item.href = `member.html?name=${encodeURIComponent(m.name)}`;
        
        const fullNameText = m.full_name ? m.full_name : "BLM48 Member";

        item.innerHTML = `
          <div class="member-avatar-wrapper">
            <img src="${getImg(m.profile_img)}" class="member-avatar" onerror="this.src='assets/images/default-profile.png'">
          </div>
          <div class="member-info">
            <div class="member-nickname">${m.name}</div>
            <div class="member-fullname">${fullNameText}</div>
          </div>
          <i class="fas fa-chevron-right chevron-icon"></i>
        `;
        listContainer.appendChild(item);
      });
    }

    function filterMembers() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allMembers.filter(m => 
        (m.name || "").toLowerCase().includes(searchTerm) || 
        (m.full_name || "").toLowerCase().includes(searchTerm)
      );
      renderMembers(filtered);
    }

    window.onload = fetchAllMembers;
</script>
</body>
</html>
