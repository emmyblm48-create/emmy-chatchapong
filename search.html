<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BLM48 Membership | Search Members</title>
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
  <meta name="theme-color" content="#ffc0cb">
  <link rel="apple-touch-icon" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s180">
  <link rel="icon" sizes="192x192" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s192">
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="BLM48">   
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
      --blmem-pink: #ff85a2;
      --blmem-pink-light: #fff0f3;
      --blmem-yellow: #fff3cd;
      --blmem-yellow-dark: #ffc107;
      --dark-text: #3a3a3a;
      --gray-text: #666666;
      --border-color: #f0f0f0;
      --bg-soft: #f9f9f9;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Quicksand', 'Kanit', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #fff5f7 0%, #ffffff 50%, #fffdf0 100%);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--dark-text);
    }

    .app-container {
      display: flex;
      width: 100%;
      max-width: 100%;
      min-height: 100vh;
      background: #ffffff;
      position: relative;
    }

    .app-sidebar-promo {
      display: none;
      flex: 1;
      background: linear-gradient(45deg, #ff85a2, #ffb3c6, #ffe066);
      position: relative;
      overflow: hidden;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      text-align: center;
      padding: 40px;
    }

    .promo-bg-circle {
      position: absolute;
      width: 400px;
      height: 400px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      top: -100px;
      left: -100px;
    }
    .promo-bg-circle-2 {
      position: absolute;
      width: 300px;
      height: 300px;
      background: rgba(255, 253, 224, 0.2);
      border-radius: 50%;
      bottom: -50px;
      right: -50px;
    }

    .promo-content {
      position: relative;
      z-index: 2;
    }
    .promo-title {
      font-size: 42px;
      font-weight: 600;
      text-shadow: 0 4px 10px rgba(0,0,0,0.15);
      margin-bottom: 10px;
    }
    .promo-subtitle {
      font-size: 18px;
      font-weight: 300;
      opacity: 0.95;
      background: rgba(0, 0, 0, 0.05);
      padding: 6px 20px;
      border-radius: 20px;
      display: inline-block;
      color: #fff;
    }

    .app-layout {
      width: 100%;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    @media (min-width: 900px) {
      body {
        padding: 30px;
        background: radial-gradient(circle, #ffffff 0%, #fff0f3 70%, #fff9db 100%);
      }
      .app-container {
        max-width: 950px;
        height: 750px;
        min-height: 750px;
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 25px 50px rgba(255, 133, 162, 0.15);
        border: 4px solid #ffffff;
      }
      .app-sidebar-promo {
        display: flex;
      }
      .app-layout {
        width: 420px;
        min-height: 100%;
        border-left: 1px solid var(--border-color);
      }
    }

    /* --- ส่วนหัวค้นหา (Header Search) --- */
    .header {
      display: flex;
      align-items: center;
      padding: 24px 24px 14px 24px;
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .back-btn {
      background: none;
      border: none;
      font-size: 20px;
      color: var(--dark-text);
      cursor: pointer;
      margin-right: 16px;
      padding: 5px;
      transition: 0.2s;
    }
    .back-btn:active { transform: scale(0.9); }

    .search-box {
      flex: 1;
      display: flex;
      align-items: center;
      background: #fdfdfd;
    }
    .search-input {
      border: none;
      background: transparent;
      outline: none;
      width: 100%;
      font-size: 16px;
      color: var(--dark-text);
      font-weight: 500;
    }
    .search-input::placeholder { color: #cccccc; font-weight: 300; }

    .header-divider {
      height: 3px;
      background: linear-gradient(90deg, var(--blmem-pink) 0%, var(--blmem-yellow-dark) 100%);
      margin: 0 24px;
      border-radius: 2px;
      opacity: 0.7;
    }

    /* --- ส่วนรายการแถวเมมเบอร์ (List Items) --- */
    .member-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px 0 30px 0;
      overflow-y: auto;
    }

    .list-section-title {
      font-size: 13px;
      font-weight: 600;
      color: #666;
      padding: 18px 24px 8px 24px;
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: #ffffff;
      letter-spacing: 0.5px;
    }
    .list-section-title i {
      color: var(--blmem-pink);
    }
    
    .graduated-title-section {
      margin-top: 15px;
      border-top: 6px solid #fdfdfd;
      padding-top: 20px;
    }
    .graduated-title-section i {
      color: #94a3b8;
    }

    .member-item {
      display: flex;
      align-items: center;
      padding: 14px 24px;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border-bottom: 1px solid var(--border-color);
      background: #ffffff;
    }
    .member-item:hover, .member-item:active {
      background: linear-gradient(90deg, var(--blmem-pink-light) 0%, #fffdf0 100%);
      padding-left: 28px;
    }

    .member-avatar-wrapper {
      position: relative;
    }
    .member-avatar {
      width: 55px;
      height: 55px;
      border-radius: 50%;
      object-fit: cover;
      background: #fdfdfd;
      border: 2px solid var(--blmem-pink);
      box-shadow: 0 0 0 2px #fffdf0;
    }

    .member-info {
      flex: 1;
      padding-left: 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .member-nickname {
      font-size: 16px;
      font-weight: 600;
      color: var(--dark-text);
      text-transform: uppercase;
      line-height: 1.2;
      display: flex;
      align-items: center;
    }
    .member-fullname {
      font-size: 13px;
      color: var(--gray-text);
      font-weight: 300;
      margin-top: 4px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 230px;
    }

    .chevron-icon {
      color: var(--blmem-pink);
      opacity: 0.5;
      font-size: 14px;
      transition: 0.2s;
    }
    .member-item:hover .chevron-icon {
      transform: translateX(4px);
      opacity: 1;
    }

    .member-item.graduated-item {
      background: #fafafa;
    }
    .member-item.graduated-item .member-avatar {
      border: 2px solid #b0bec5;
      filter: grayscale(15%);
      opacity: 0.85;
    }
    .member-item.graduated-item .member-nickname {
      color: #555555;
    }
    .member-item.graduated-item .chevron-icon {
      color: #94a3b8;
    }

    .loading-state, .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999999;
      font-size: 15px;
    }
    .loading-spinner {
      color: var(--blmem-pink);
      font-size: 28px;
      margin-bottom: 14px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>
<body>

  <div class="app-container">
    
    <div class="app-sidebar-promo">
      <div class="promo-bg-circle"></div>
      <div class="promo-bg-circle-2"></div>
      <div class="promo-content">
        <h1 class="promo-title">BLM48</h1>
        <p class="promo-subtitle">SEARCH</p>
      </div>
    </div>

    <div class="app-layout">
      
      <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">
          <i class="fas fa-chevron-left"></i>
        </button>
        <div class="search-box">
          <input type="text" id="searchInput" class="search-input" placeholder="ค้นหาเมมเบอร์..." onkeyup="filterMembers()">
        </div>
      </div>
      <div class="header-divider"></div>

      <div class="member-list" id="memberList">
        <div class="loading-state" id="loadingState">
          <i class="fas fa-circle-notch loading-spinner"></i>
          <p>กำลังโหลดข้อมูลเมมเบอร์...</p>
        </div>
      </div>

    </div>

  </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec';
    
    let allMembers = [];

    // 🔗 ตั้งค่าลิงก์รูปภาพสำรองตามที่เอ็มมี่ระบุ
    const fallbackAvatarURL = 'https://lh3.googleusercontent.com/d/1rebp2F8vyP0nyvsEOFD9Nw2mPcRtVqtG=s1000';

    function getImg(url) {
        if (!url || url.trim() === "") {
            return fallbackAvatarURL; 
        }
        if (url.includes('googleusercontent.com')) {
            return url + '=s200';
        }
        return url;
    }

    async function fetchAllMembers() {
      try {
        const resp = await fetch(`${scriptURL}?action=getAllMembers&_=${Date.now()}`);
        const res = await resp.json();
        
        if (res.status === "success" && res.data) {
          // 🌟 [จุดสำคัญแก้ปัญหาแกรดหน่วง] ทำการกรองเอาเฉพาะแถวที่มีชื่อเมมเบอร์จริง ๆ (ไม่เป็นค่าว่าง)
          // แถวว่างเปล่าท้ายชีตจะถูกตัดทิ้งทั้งหมดตรงนี้ ทำให้วนลูปเร็วขึ้นมาก ไม่หน่วงเครื่องแน่นอนครับ
          allMembers = res.data.filter(m => m.name && m.name.toString().trim() !== "");
          renderMembers(allMembers);
        } else {
          document.getElementById('memberList').innerHTML = '<div class="empty-state">ไม่พบฐานข้อมูลเมมเบอร์</div>';
        }
      } catch (e) {
        console.error("Error fetching members:", e);
        document.getElementById('memberList').innerHTML = '<div class="empty-state">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
      }
    }

    function renderMembers(membersData) {
      const listContainer = document.getElementById('memberList');
      listContainer.innerHTML = ''; 

      if (membersData.length === 0) {
        listContainer.innerHTML = '<div class="empty-state">ไม่พบเมมเบอร์ที่คุณค้นหา</div>';
        return;
      }

      // 🔍 ตรวจสอบคำว่า Graduated ทั้งพิมพ์เล็กและพิมพ์ใหญ่
      const activeMembers = membersData.filter(m => String(m.status || '').trim().toLowerCase() !== 'graduated');
      const graduatedMembers = membersData.filter(m => String(m.status || '').trim().toLowerCase() === 'graduated');

      // 1. หมวดหมู่แสดงผลเมมเบอร์ปัจจุบัน (Active Members)
      if (activeMembers.length > 0) {
        if (graduatedMembers.length > 0) {
          const activeTitle = document.createElement('div');
          activeTitle.className = 'list-section-title';
          activeTitle.innerHTML = `<i class="fas fa-users"></i> Members`;
          listContainer.appendChild(activeTitle);
        }

        activeMembers.forEach(m => {
          const item = document.createElement('a');
          item.className = 'member-item';
          item.href = `member.html?name=${encodeURIComponent(m.name)}`;
          
          // 🔒 ป้องกันความต่างของชื่อคีย์เก่าและใหม่จากหลังบ้าน
          const imgUrl = m.profile || m.profile_img || '';
          const fullNameText = m['Full Name(EN)'] || m.full_name || "BLM48 Member";

          item.innerHTML = `
            <div class="member-avatar-wrapper">
              <img src="${getImg(imgUrl)}" class="member-avatar" onerror="this.onerror=null; this.src='${fallbackAvatarURL}';">
            </div>
            <div class="member-info">
              <div class="member-nickname">${m.name}</div>
              <div class="member-fullname">${fullNameText}</div>
            </div>
            <i class="fas fa-chevron-right chevron-icon"></i>
          `;
          listContainer.appendChild(item);
        });
      }

      // 2. หมวดหมู่แสดงผลกลุ่มที่จบการศึกษาแล้ว (Graduated)
      if (graduatedMembers.length > 0) {
        const gradTitle = document.createElement('div');
        gradTitle.className = 'list-section-title graduated-title-section';
        gradTitle.innerHTML = `<i class="fas fa-graduation-cap"></i> Graduated`;
        listContainer.appendChild(gradTitle);

        graduatedMembers.forEach(m => {
          const item = document.createElement('a');
          item.className = 'member-item graduated-item';
          item.href = `member.html?name=${encodeURIComponent(m.name)}`;
          
          // 🔒 ป้องกันความต่างของชื่อคีย์เก่าและใหม่จากหลังบ้าน
          const imgUrl = m.profile || m.profile_img || '';
          const fullNameText = m['Full Name(EN)'] || m.full_name || "BLM48 Member";

          item.innerHTML = `
            <div class="member-avatar-wrapper">
              <img src="${getImg(imgUrl)}" class="member-avatar" onerror="this.onerror=null; this.src='${fallbackAvatarURL}';">
            </div>
            <div class="member-info">
              <div class="member-nickname">
                ${m.name} 
                <i class="fas fa-graduation-cap" style="color: #94a3b8; font-size: 14px; margin-left: 6px;" title="Graduated"></i>
              </div>
              <div class="member-fullname">${fullNameText}</div>
            </div>
            <i class="fas fa-chevron-right chevron-icon"></i>
          `;
          listContainer.appendChild(item);
        });
      }
    }

    function filterMembers() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allMembers.filter(m => 
        (m.name || "").toLowerCase().includes(searchTerm) || 
        (m.full_name || "").toLowerCase().includes(searchTerm) ||
        (m['Full Name(EN)'] || "").toLowerCase().includes(searchTerm)
      );
      renderMembers(filtered);
    }

    window.onload = fetchAllMembers;
</script>
</body>
</html>
