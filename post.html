<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Post | BLM48</title>
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1p6lV8bD6VVjR-Ys2EnpcQH1AOsnahQSp=s32">
  <meta name="theme-color" content="#ffc0cb">
  <meta name="apple-mobile-web-app-title" content="BLM48">   
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    body { font-family: 'Quicksand', 'Kanit', sans-serif;  background-color: #fff0f5; padding: 20px; }
    .post-container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(255, 133, 162, 0.2); }
   .header {
  position: relative;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  color: #ff85a2;
  margin-bottom: 15px;
}
    .back-icon {
  position: absolute;
  left: 5px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 28px; /* ตัวลูกศรใหญ่พอดีมือจิ้ม */
  color: #ff85a2;
  cursor: pointer;
  padding: 0 10px;
  line-height: 1;
}
    .back-icon:hover {
  opacity: 0.7;
}
    textarea { width: 100%; height: 120px; border: 1px solid #ffc0cb; border-radius: 10px; padding: 10px; font-family: inherit; resize: none; box-sizing: border-box;}
    textarea:focus { outline: none; border-color: #ff85a2; }
    .upload-btn-wrapper { margin-top: 10px; overflow: hidden; position: relative; }
    .btn-upload { border: 2px dashed #ffc0cb; color: #ff85a2; background-color: white; padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
    .upload-btn-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
    #preview-img { width: 100%; border-radius: 10px; margin-top: 10px; display: none; object-fit: cover; max-height: 300px; }

/* ปุ่มแชร์แบบเดี่ยว ยาวเต็มกล่อง ดูเรียบร้อยและลงตัว */
.btn-submit-full {
  width: 100%;
  height: 44px;
  background-color: #ff85a2;
  color: white;
  border: none;
  border-radius: 22px;
  font-weight: bold;
  font-size: 16px;
  margin-top: 20px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn-submit-full:hover {
  background-color: #ff6b8b;
}
  </style>
</head>
<body>

<div class="post-container">
  <div class="header">
    <span class="back-icon" onclick="window.location.href='index.html'">‹</span>
    New Post
  </div>
  
  <textarea id="post-content" placeholder="Text"></textarea>
  
  <div class="mb-3">
  <label for="post-image" class="form-label" style="font-weight: 600; color: #ff85a2;"> Add Image</label>
  <input type="file" id="post-image" class="form-control" accept="image/*" multiple onchange="previewMultipleImages(this)" style="border-radius: 12px; border: 1px solid #ffc0cb;">
  
  <div id="image-preview-container" style="display: flex; gap: 10px; overflow-x: auto; margin-top: 12px; padding: 4px;"></div>
  </div>
  
  <div style="margin-top: 15px;">
  <label style="font-weight: bold; color: #ff85a2;">🎥 แนบคลิปวิดีโอ:</label>
  <input type="file" id="video-input" accept="video/*" style="margin-top: 5px; display: block;">
</div>

<div style="margin-top: 15px; background: #fff5f7; padding: 12px; border-radius: 12px; border: 1px dashed #ff85a2;">
  <label style="font-weight: bold; color: #ff85a2; display: block; margin-bottom: 5px;">🎙️ อัดเสียง Voice Note:</label>
  <button type="button" id="btn-record" style="background: #ff85a2; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer;">🔴 เริ่มอัดเสียง</button>
  <span id="record-status" style="font-size: 0.85rem; color: gray; margin-left: 10px;">ยังไม่ได้อัด</span>
  <audio id="audio-preview" controls style="display: none; margin-top: 10px; width: 100%; height: 30px;"></audio>
</div>

  <button class="btn-submit-full" onclick="submitPost()">Share Post</button>
</div>

<script type="module">
  // 1. นำเข้าฟังก์ชันจาก Firebase (เหลือแค่ตัวหลัก เพราะเรื่องรูปภาพเราจะโยนไปฝากที่ ImgBB ฟรีๆ งับ)
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";

  // Config ของวง BLM48 ของคุณเอ็มมี่
  const firebaseConfig = {
    apiKey: "AIzaSyAx5JlVGm_IpuOhksQMTA6qli9vR-5rNas",
    authDomain: "blm48-official-site.firebaseapp.com",
    projectId: "blm48-official-site",
    databaseURL: "https://blm48-official-site-default-rtdb.asia-southeast1.firebasedatabase.app/",
    storageBucket: "blm48-official-site.firebasestorage.app",
    messagingSenderId: "924510827472",
    appId: "1:924510827472:web:d2a5b5dcf0683a5c73ffd5"
  };

  const app = initializeApp(firebaseConfig);
  let selectedFile = null;

  // 🔑 API Key ของ ImgBB ที่คุณเอ็มมี่ส่งมาให้งับ
  const IMGBB_API_KEY = "80ad839da07973eeefee57af54fc9f6d";

  // 📸 ฟังก์ชันอัปโหลดรูปภาพไปที่ ImgBB แบบฟรีๆ 0 บาท
  async function uploadImageToImgBB(file) {
    const formData = new FormData();
    formData.append("image", file);

    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
      method: "POST",
      body: formData
    });

    const result = await response.json();
    if (result.success) {
      return result.data.url; // 🎉 ได้ลิ้งก์รูปภาพ https://i.ibb.co/... กลับมาใช้งานฟรีๆ
    } else {
      throw new Error("ImgBB Upload Failed: " + result.error.message);
    }
  }

  // 🔐 ฟังก์ชันแกะ Session ตัวเทพของคุณเอ็มมี่
  function getUserSession() {
    try {
      const sessionStr = localStorage.getItem('bnl_session');
      if (!sessionStr) return null;
      
      const session = JSON.parse(sessionStr);
      const expiryTime = session.expiry || session.expire;
      if (expiryTime && new Date().getTime() > expiryTime) {
        localStorage.removeItem('bnl_session');
        return null;
      }
      
      return session.data || session.user || session;
    } catch (e) {
      console.error("Session Parse Error ในหน้าโพสต์:", e);
      return null;
    }
  }
  
  let mediaRecorder;
let audioChunks = [];
let audioBase64 = "";
let videoBase64 = "";

const btnRecord = document.getElementById('btn-record');
const recordStatus = document.getElementById('record-status');
const audioPreview = document.getElementById('audio-preview');

// 🔴 ระบบอัดเสียงด้วยไมโครโฟน
btnRecord.addEventListener('click', async () => {
  if (!mediaRecorder || mediaRecorder.state === "inactive") {
    // ขอสิทธิ์ใช้ไมค์และเริ่มอัด
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];
    
    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
      audioPreview.src = URL.createObjectURL(audioBlob);
      audioPreview.style.display = "block";
      
      // แปลงไฟล์เสียงเป็น Base64 เตรียมส่งหลังบ้าน
      const reader = new FileReader();
      reader.readAsDataURL(audioBlob);
      reader.onloadend = () => { audioBase64 = reader.result; };
      recordStatus.innerText = "อัดเสร็จแล้วงับ 🎵";
    };
    
    mediaRecorder.start();
    btnRecord.innerText = "⏹️ หยุดอัด";
    btnRecord.style.background = "gray";
    recordStatus.innerText = "กำลังอัดเสียง...";
  } else {
    // สั่งหยุดอัด
    mediaRecorder.stop();
    btnRecord.innerText = "🔴 เริ่มอัดใหม่";
    btnRecord.style.background = "#ff85a2";
  }
});

// 🎥 ระบบดักฟังไฟล์วิดีโอเมื่อผู้ใช้เลือกไฟล์
document.getElementById('video-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if(file) {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onloadend = () => { videoBase64 = reader.result; };
  }
});

// ฟังก์ชันแสดงตัวอย่างรูปภาพหลายๆ รูปพร้อมกันอย่างสวยงาม
window.previewMultipleImages = function(input) {
  const container = document.getElementById('image-preview-container');
  container.innerHTML = ''; // ล้างรูปเก่าออกก่อนถ้ามีการเลือกใหม่
  
  if (input.files && input.files.length > 0) {
    Array.from(input.files).forEach(file => {
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = document.createElement('img');
        img.src = e.target.result;
        img.style.width = '85px';
        img.style.height = '85px';
        img.style.objectFit = 'cover';
        img.style.borderRadius = '12px';
        img.style.border = '2px solid #ffccd5'; // กรอบสีชมพูพาสเทลน่ารักๆ
        container.appendChild(img);
      }
      reader.readAsDataURL(file);
    });
  }
}

// ฟังก์ชันกดส่งโพสต์ (รวมระบบเช็ค User + อัปโหลดหลายรูป + ส่งเข้า Sheets)
window.submitPost = async function() {
  const content = document.getElementById('post-content').value.trim();
  const currentUser = getUserSession();
  console.log("🌸 ข้อมูล User จากล็อกอินที่ระบบตรวจเจอในหน้าโพสต์:", currentUser);

  // 1. ตรวจสอบว่าล็อกอินอยู่หรือไม่
  if (!currentUser || !currentUser.username) {
    Swal.fire({
      title: 'ไม่พบข้อมูลผู้ใช้งาน 😥',
      text: 'ระบบหาประวัติการล็อกอินไม่เจอ หรือเซสชันหมดอายุแล้ว กรุณาล็อกอินใหม่อีกครั้งนะงับ',
      icon: 'warning',
      confirmButtonColor: '#ff85a2'
    });
    return;
  }

  const activeUsername = currentUser.username;
  
  // 2. ดึงข้อมูลไฟล์รูปภาพทั้งหมดที่เลือกไว้
  const imageInput = document.getElementById('post-image'); // เช็คให้ชัวร์ว่า id ตรงกับช่อง input ใน HTML นะงับ
  const imageFiles = imageInput ? imageInput.files : [];

  // 3. ตรวจสอบว่ามีข้อความหรือรูปภาพอย่างน้อย 1 อย่างหรือไม่
  if (!content && imageFiles.length === 0) {
    Swal.fire('ข้อความว่างเปล่า', 'กรุณาพิมพ์ข้อความหรือเลือกรูปภาพก่อนแชร์น้า', 'info');
    return;
  }

  // 4. แสดงหน้าต่างกำลังโหลดมินิมอลตามสไตล์วง
  Swal.fire({
    title: 'กำลังส่งโพสต์... 🌸',
    text: 'ระบบกำลังนำโพสต์และรูปภาพขึ้นไทม์ไลน์นะงับ (ถ้าหลายรูปอาจจะใช้เวลาแป๊บนึงน้า)',
    allowOutsideClick: false,
    didOpen: () => Swal.showLoading()
  });

  let imageUrlString = ""; // ตัวแปรเก็บสายข้อความลิงก์รูปภาพทั้งหมด

  try {
    // 5. วนลูปอัปโหลดรูปภาพไป ImgBB ทีละรูป (ถ้ามีการเลือกรูปไว้)
    if (imageFiles.length > 0) {
      let uploadedUrls = [];
      for (let i = 0; i < imageFiles.length; i++) {
        try {
          const url = await uploadImageToImgBB(imageFiles[i]);
          if (url) {
            uploadedUrls.push(url);
            console.log(`📸 อัปโหลดรูปลำดับที่ ${i+1} สำเร็จ:`, url);
          }
        } catch (err) {
          console.error(`เกิดข้อผิดพลาดในการอัปโหลดรูปภาพตำแหน่งที่ ${i+1}:`, err);
        }
      }
      // นำลิงก์ทั้งหมดมารวมกัน คั่นด้วยเครื่องหมาย Comma (,)
      imageUrlString = uploadedUrls.join(',');
    }

    // 6. ส่งข้อมูลทั้งหมดไปบันทึกที่ Google Sheets ผ่าน Apps Script ตัวแรงตัวเดิม
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxF5G3E1HWhVTQOVGzWtsqSCZfXkq8ZrX6DqGKt_pcicYbi2_59B-ecEeeTU6-aqBEf/exec';
    
    const resp = await fetch(scriptURL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'createPost',
        username: activeUsername, 
        content: content,
        imageUrl: imageUrlString // ลิงก์รูปทั้งหมดจะถูกส่งไปแบบยาวๆ ในช่องเดียวงับ!
      })
    });

    const data = await resp.json();
    console.log("ผลลัพธ์จาก Google Sheets:", data);

    // 7. แจ้งเตือนผลลัพธ์การทำงาน
    if (data.status === "success") {
      Swal.fire({
        title: 'สำเร็จแล้ว',
        text: 'โพสต์ของคุณถูกส่งไปยังไทม์ไลน์เรียบร้อยแล้วงับ',
        icon: 'success',
        confirmButtonColor: '#ff85a2'
      }).then(() => {
        window.location.href = "index.html"; 
      });
    } else {
      Swal.fire('เกิดข้อผิดพลาดจากเซิร์ฟเวอร์', data.message || 'ไม่สามารถโพสต์ได้', 'error');
    }

  } catch (error) {
    console.error("Post Submission Error:", error);
    Swal.fire({
      icon: 'error',
      title: 'เกิดข้อผิดพลาด 😥',
      text: error.message || 'ระบบขัดข้องในการอัปโหลด กรุณาลองใหม่อีกครั้งนะงับ'
    });
  }
}
</script>
</body>
</html>
